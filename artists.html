间取得平衡的错综动态作品。","bi":"让-雅克·迪克洛（笔名Eko33）1980年生于瑞士，定居于阿尔卑斯山脉一处宁静偏远之地，那里既是灵感之源，也是他总要归来的港湾。从小对创意充满热情，在祖母的鼓励下参加绘画班，在初中的艺术比赛中以雕塑作品获奖。父母长时间工作之际，他自学编程，将其与创意热情融合，开始探索生成艺术。\n\n他的实践不断演化，融合代码、声音、传感器与人工智能，创作在精确几何与有机不可预测形态之间取得平衡的错综动态作品，持续突破技术与情感的边界。他在生成艺术社区中以将数学精准与感性表达融为一体的独特风格著称。","aw":[]},"ray-bernice-ray-alexandra-kaiser-eames":{"n":"Ray-Bernice \"Ray\" Alexandra Kaiser Eames","nc":"美国","ne":"American","b":"1912","d":"1988","i":"查尔斯·伊姆斯和雷·凯泽是一对富有远见的设计搭档，共同创立了伊姆斯工作室，以创新工程与艺术视野的融合设计出标志性家具、电影和展览。他们功能与美感兼备的作品至今仍是设计界的重要参照，由伊姆斯基金会传承保护。","bi":"雷-伯妮斯·亚历山德拉·凯泽·伊姆斯1912年生于萨克拉门托，在父亲经营当地杂耍剧院的成长环境中培养了对表演的热爱。1930年代移居纽约，师从汉斯·霍夫曼学习，成为美国抽象艺术家协会创始成员之一，展出充满动感、探索平衡、光线与空间张力的大胆抽象绘画。母亲去世后，她搬到密歇根州，在克兰布鲁克艺术学院与查尔斯·伊姆斯相遇，此后与他在加利福尼亚州定居，共同创立了伊姆斯工作室，开创了20世纪设计史上的标志性篇章。她的遗产由伊姆斯基金会保存与传承。","aw":[]},"charles-eames":{"n":"Charles Eames","nc":"美国","ne":"American","b":"1907","d":"1978","i":"查尔斯·伊姆斯和雷·凯泽是一对富有远见的设计搭档，共同创立了伊姆斯工作室，以创新工程与艺术视野的融合设计出标志性家具、电影和展览。他们功能与美感兼备的作品至今仍是设计界的重要参照，由伊姆斯基金会传承保护。","bi":"查尔斯·伊姆斯1907年生于密苏里州圣路易斯，离开华盛顿大学建筑系后在圣路易斯地区设计住宅和教堂，1938年加入克兰布鲁克艺术学院，在那里与埃利尔和埃罗·萨里宁合作设计了获得MoMA有机设计竞赛大奖的模压胶合板椅。二战期间，他为美国海军开发了模压胶合板腿部夹板，由此磨练出对材料性能与工业制造的深刻理解。随后移居洛杉矶，与雷·凯泽共同创立伊姆斯工作室，设计出伊姆斯躺椅等标志性家具，以及记录科学、艺术与人类思想的短片。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_House_of_Cards_Charles_Eames_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805156&s=ad6f18c871e4d67fd8726339f5cec474","l":["Computer House of Cards","Charles Eames","1970","Mixed Media"]}]},"ernest-edmonds":{"n":"Ernest Edmonds","nc":"英国","ne":"British","b":"1942","d":"","i":"欧内斯特·埃德蒙兹是一位开创性艺术家，其生成与互动作品融合艺术、数学与计算。他的影响横跨数字艺术与人机交互领域，并荣获ACM SIGGRAPH终身成就杰出艺术家奖。","bi":"欧内斯特·埃德蒙兹1942年生于伦敦，从早期起便同时追求艺术与数学，尽管学校机会有限仍坚持两个方向的探索。这种双重专注塑造了他后来的创作方式。他对计算机产生兴趣，自学在一台只有8K内存的霍尼韦尔200大型机上编程，在这些约束条件下工作激发了他对系统和技术如何推动创造性工作的持续迷恋。\n\n他发展出融合艺术、数学与计算的生成与互动艺术实践，以时间性系统和互动环境为核心，探索观者参与如何改变艺术作品本身。他的研究影响横跨数字艺术与人机交互领域，被ACM SIGGRAPH授予终身成就杰出艺术家奖，并在德蒙福特大学等机构执教，对数字艺术的学术化产生了重要影响。","aw":[]},"david-em":{"n":"David Em","nc":"美国","ne":"American","b":"1952","d":"","i":"大卫·艾姆是美国艺术家，将计算机视为图像创作的媒介，其作品从早期数字图像延伸至沉浸式虚拟世界，展示了技术如何拓展视觉艺术的可能性，重新定义科学与想象力之间的空间。","bi":"大卫·艾姆1952年生于洛杉矶，一岁时举家移居南美，在哥伦比亚、委内瑞拉和阿根廷度过童年，青少年时期回到美国。在康涅狄格州，他在银矿公会参加夜间人体素描课，培养了对艺术的早期兴趣，周末前往纽约参观博物馆。他在宾夕法尼亚美术学院学习绘画，后在喷气推进实验室（JPL）等机构的计算机上创作早期数字图像，成为最早将计算机作为艺术媒介而非工具的艺术家之一，其作品从二维数字绘画延伸至沉浸式三维虚拟世界。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bug_3_Frontal_David_Em_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805646&s=00b01b506d5ccc0628852160289a8d3f","l":["Bug 3 Frontal Em","David Em","1977","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Transjovian_Pipeline_David_Em_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805527&s=4d7f082491292470c543feb41006737b","l":["Transjovian Pipeline Em","David Em","1979","Print"]}]},"susumu-endo":{"n":"Susumu Endo","nc":"日本","ne":"Japanese","b":"1933","d":"2024","i":"远藤享是一位版画家和平面设计师，将照片转化为石版画、胶版印刷和后来的计算机作品。早期主题是日常物件，1990年代中期转向风景，光成为后期系列的决定性元素。","bi":"远藤享1933年生于山梨县甲府，1960年开始在武藏野美术大学学习设计，1962年在桑泽设计研究所完成培训，先从事商业设计，1979年开始创作石版画。\n\n他通过处理摄影图像创作石版画，最初使用大型胶印机工作，早期作品聚焦于普通物件。1990年代中期，他的注意力转向风景，光逐渐成为其后期系列图像的决定性元素，并开始将计算机技术引入创作，以新的媒介延伸他对摄影、印刷与图像转化之间关系的持续探索。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Susumo_Endo_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805043&s=de311091478168451a4348858b957d18","l":["Untitled Susumo","Susumu Endo","1995","Print"]}]},"ertfgcvb":{"n":"ertfgcvb","nc":"","ne":"","b":"2025","d":"","i":"Email Newsletter\n\nSign up to receive the occasional news and stories from the world of computer art.","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/svg4.svg_ertfgcvb_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805131&s=e7c3a64593b9f76caf334c24fa62b7e9","l":["svg4.svg","ertfgcvb","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Towers_209_ertfgcvb_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059078&s=986010a7af1c90c0921e7267958ec719","l":["Towers 209","ertfgcvb","2022"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Device_1_115_ertfgcvb_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059440&s=cef604825310bcc345e947b83fb84328","l":["Device 1 115","ertfgcvb","2022"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Towers_172_ertfgcvb_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059532&s=5f79c856e48912a7a1641589a80ae048","l":["Towers 172","ertfgcvb","2022"]}]},"julien-espagnon":{"n":"Julien Espagnon","nc":"法国","ne":"French","b":"1992","d":"","i":"朱利安·埃斯帕尼翁是法国艺术家和设计师，其实践通过生成系统和实体绘图探索代码的创造潜力，在技术与艺术的交汇处工作，使用算法、绘图仪和参与性工具研究纹理、变化以及数字与物质形态之间的关系。","bi":"朱利安·埃斯帕尼翁1992年生于法国，在学习应用艺术后获得互动设计硕士学位，在学习过程中发现了代码的表达可能性。最初担任网页设计师，2015年加入传播机构Spintank，先后担任互动设计师和前端开发者。2020年起独立从事设计与开发工作，同时将越来越多的时间投入艺术实践，通过生成系统和实体绘图探索代码的创造潜力，使用算法、绘图仪和参与性工具研究纹理、变化以及数字与物质形态之间的关系。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Stella_Nova_6_Julien_Espagnon_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059206&s=b7e656754d43128c8aee1a7e0154a047","l":["Stella Nova 6","Julien Espagnon","2023","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Metakinetic_132_Julien_Espagnon_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059225&s=158557051f13b2fae2ad9e5eb561f701","l":["Metakinetic 132","Julien Espagnon","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Metakinetic_135_Julien_Espagnon_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059288&s=8bee5903b95a53927fa33bec6ba0b9dd","l":["Metakinetic 135","Julien Espagnon","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Metakinetic_133_Julien_Espagnon_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059336&s=23767f7478c1cf659ff591d16c51b82e","l":["Metakinetic 133","Julien Espagnon","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Crypsis_09_Julien_Espagnon_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059425&s=c48f5e41a1a4a9bcedfa0751f119e1ff","l":["Crypsis 09","Julien Espagnon","2024","Plotter Drawing"]}]},"experiments-in-art-and-technology-eat":{"n":"Experiments in Art and Technology (E.A.T.)","nc":"美国","ne":"American","b":"2001","d":"","i":"艺术与技术实验（E.A.T.）于1966年在纽约由工程师比利·克吕弗、弗雷德·瓦尔德豪尔与艺术家罗伯特·劳申伯格、罗伯特·惠特曼共同创立，旨在推动艺术家与工程师之间的直接合作，拓展了艺术与科学、工业和社会的关系，为以艺术实践探索新技术树立了先例。","bi":"艺术与技术实验（E.A.T.）于1966年在纽约由工程师比利·克吕弗、弗雷德·瓦尔德豪尔与艺术家罗伯特·劳申伯格、罗伯特·惠特曼共同创立，脱胎于「九个夜晚：剧场与工程」——1966年在69步兵团军械库举行的一系列演出，约翰·凯奇、伊冯·雷纳和劳申伯格等十位艺术家与来自贝尔实验室的三十位工程师携手合作，测试视频投影、无线麦克风和多普勒声音系统等新工具。\n\nE.A.T.此后成为推动艺术家与工程师直接合作的重要组织，建立了一个连接数百位艺术家与技术专家的网络，举办项目、出版物和工作坊，拓展了艺术与科学、工业和社会的关系，为以艺术实践探索新技术树立了先例，成为20世纪艺术技术融合史上最重要的组织之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/9_evenings_theatre_and_engineering_Experiments_in_Art_and_Technology_E.A.T._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058914&s=ed9d8c50b986650cb7931ef66ed2523b","l":["9 evenings theatre engineering in E.A.T.","Experiments in Art and Technology (E.A.T.)","1966","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/E.A.T_News_Vol_1_No_1_January_15_1967_Experiments_in_Art_and_Technology_E.A.T._11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059452&s=5a4942c963e2c64bd3654b85e78db1b0","l":["E.A.T News Vol 1 No 1 January 15 1967 in E.A.T.","Experiments in Art and Technology (E.A.T.)","1967","Ephemera"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Some_More_Beginnings_Experiments_in_Art_and_Technology_E.A.T._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059509&s=12f20261616e37ea479ea90e4047f235","l":["Some More Beginnings in E.A.T.","Experiments in Art and Technology (E.A.T.)","1968","Book"]}]},"henry-feinberg":{"n":"Henry Feinberg","nc":"美国","ne":"American","b":"1964","d":"","i":"亨利·费恩伯格是美国科技传播者，制作了教育影片、互动展览和公开演示，将复杂概念呈现给大众。他最著名的成就是设计了电影《E.T.外星人》中使用的通讯器，以及执导了1968年贝尔实验室探讨计算机能否思考的影片《思维机器》。","bi":"亨利·费恩伯格是以影片、互动展览和公开演示将复杂概念带入大众视野的美国科技传播者，1964年在纽约大学获得传播艺术学士学位。1950年代他在电视节目《魔法师先生》担任制作助理，擅长用日常物品设计简单的科学演示，同时是获得执照的业余无线电操作员。他在贝尔实验室担任科学传播者，制作了展示计算机能力的教育影片和互动展览，执导了1968年探讨计算机能否思考的影片《思维机器》，还设计了电影《E.T.外星人》中外星人使用的通讯器——这件标志性道具体现了他将科技知识转化为公众想象力的独特能力。","aw":[]},"manuel-felguerez":{"n":"Manuel Felguerez","nc":"墨西哥","ne":"Mexican","b":"1928","d":"","i":"曼努埃尔·费尔格雷斯发展出以几何与材料实验为核心的抽象创作体系，横跨绘画、雕塑、浮雕和公共艺术。1970年代初，他成为墨西哥计算机艺术的先驱，此后刻意退出以防机器主导艺术决策。","bi":"曼努埃尔·费尔格雷斯1928年生于墨西哥萨卡特卡斯州瓦尔帕莱索，在墨西哥城圣卡洛斯学院短暂学习后赴巴黎学习雕塑，后返回墨西哥研习人类学和历史。他在伊比利亚美洲大学和墨西哥国立自治大学执教，在那里与计算机科学家赫克托·加西亚·阿斯卡拉合作。\n\n1970年代初，他成为墨西哥计算机艺术的先驱，使用大型机和绘图仪研究构图变化，探索算法系统如何生成新的视觉形式。然而，他随后刻意退出这一探索，以防机器开始主导艺术决策而非服务于艺术决策。这种对技术与艺术家能动性之间关系的深刻反思，使他在拉丁美洲计算机艺术史上成为一个独特而耐人寻味的人物。","aw":[]},"william-alan-fetter":{"n":"William Alan Fetter","nc":"美国","ne":"American","b":"1928","d":"2002","i":"威廉·艾伦·费特在1960年代初于波音公司创作了首批计算机生成的三维人体图形，以研究飞行员在驾驶舱内的运动与视野范围，这些线框图形成为人机工程学分析的标准工具。","bi":"威廉·艾伦·费特1928年生于密苏里州独立市，在伊利诺伊大学学习艺术与平面设计，1952年获美术学士学位，毕业后担任芝加哥《家庭周刊》艺术总监，并开始试验自动页面排版。1959年加入波音公司威奇托分公司，担任高级设计图形主管，负责为飞行员操作图形开发显示方法。\n\n他的研究需要了解人体在驾驶舱内的运动方式，这促使他与工程师沃尔特·紫藤合作，用IBM 7094大型机和Cal Comp绘图仪创作了首批计算机生成的三维人体图形「波音人」。这些线框图形展示了飞行员如何在驾驶舱内移动，成为人机工程学分析的标准工具，也是计算机图形学史上的早期里程碑。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawings_by_Computer_Human-Figure_Studies_1555045_-_Human_Figure_Sitting_side_view_William_Alan_Fetter_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058778&s=a4ff3646b6aecb7491028f68834e40f4","l":["Drawings by Computer Human-Figure Studies 1555045 - Human Figure Sitting side view","William Alan Fetter","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawings_by_Computer_Human-Figure_Studies_1555044_-_Human_Figure_Sitting_front_view_William_Alan_Fetter_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058884&s=0b86917f45ba4a5926415ebc8a560cff","l":["Drawings by Computer Human-Figure Studies 1555044 - Human Figure Sitting front view","William Alan Fetter","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawings_by_Computer_Human-Figure_Studies_1555046_-_Human_Figure_Extreme_Reaching_Pose_William_Alan_Fetter_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058911&s=7994ff5a800b09347978bcf104917aaa","l":["Drawings by Computer Human-Figure Studies 1555046 - Human Figure Extreme Reaching Pose","William Alan Fetter","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Panel_of_Human_Figures_William_Alan_Fetter_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805206&s=a7ec053ebdd3cfc5b02f1584efe3bd53","l":["Panel of Human Figures","William Alan Fetter","1968","Print"]}]},"herbert-w-franke":{"n":"Herbert W. Franke","nc":"奥地利","ne":"Austrian","b":"1927","d":"2022","i":"赫伯特·W·弗兰克（被誉为「数字艺术的恐龙」）是科学严谨性与创意探索相融合的开拓性人物，创作了最早的计算机生成艺术作品之一，并共同创立了具有深远影响的林茨电子艺术节。他在控制论美学、科幻小说与洞穴探险学领域的跨学科工作，确立了他在数字与生成艺术领域的奠基地位。","bi":"赫伯特·W·弗兰克1927年生于维也纳，自幼对科学与艺术两个世界着迷，渴望探索它们的交汇之处。他在维也纳大学学习物理、数学、化学、心理学和哲学，1950年以电子光学论文获得理论物理学博士学位，这种多元教育背景为他此后的跨学科探索奠定了基础。\n\n1950年代，他将计算机引入艺术创作，成为数字生成图像的早期实验者之一。他以控制论美学为理论框架，发展出将科学方法应用于视觉创造的系统性方法，著有多部关于计算机艺术与赛博美学的重要著作。作为小说家，他在德语世界科幻文学中也占有重要地位。1979年，他参与共同创立了林茨电子艺术节，至今仍是全球最重要的数字艺术节庆之一。他于2022年辞世。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/1969_KAES_1-Kopie-1086x1536.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764450189&s=f4ca7631ba1e45348e171001ff3fcbf7","l":["1969 KAES 1-Kopie-1086x1536","Herbert W. Franke","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/oscill_LE-hertbert_franke-12292025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764450191&s=e35677b09b5d3ac39c8e5113d5e9f0e6","l":["oscill LE-hertbert -12292025","Herbert W. Franke","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/oscillo-herbert_franke-11292025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764450252&s=707f94cf406047d800883157b956bcb6","l":["oscillo- -11292025","Herbert W. Franke","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/drakula-hertbert_franke-12292025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764449850&s=977a0506ec16d6eb06ad819d37dc50dd","l":["drakula-hertbert -12292025","Herbert W. Franke","1970-1971","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Munich_Round_Up_MRU_No._119_Herbert_W._Franke_Waldemar_Kumming_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058685&s=5d8320f53b1266fac901046fab5c6ff6","l":["Herbert W. Franke / Waldemar  Kumming","1971","Ephemera"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Kleeblatt_Dibias_Herbert_W._Franke_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058708&s=ba47fea2b892172bbf93b50ec961771c","l":["Kleeblatt Dibias W.","Herbert W. Franke","1985","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Komet_Herbert_W._Franke_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802455&s=eb960cd6dbb2b05382008a595586ad74","l":["Komet W.","Herbert W. Franke","1985","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Fraktal_Herbert_W._Franke_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803939&s=e90a988f507db27d5a6f2215e6c01b85","l":["Fraktal W.","Herbert W. Franke","1985","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drakula_Herbert_W._Franke_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803376&s=fd155510d6cf98fb2a659870f381e3ed","l":["Drakula W.","Herbert W. Franke","2023 (from a 1971 drawing)","Print"]}]},"adam-fuhrer":{"n":"Adam Fuhrer","nc":"加拿大","ne":"Canadian","b":"1985","d":"","i":"亚当·富勒尔是驻多伦多的视觉艺术家兼软件工程师，以光学艺术创作著称。以笔式绘图仪为核心工具，他将形式、图形、线条和色彩转化为独特的纸上作品，在多种笔、纸和绘图技术的交融中探索数字与实体媒介的张力。","bi":"亚当·富勒尔是驻多伦多的视觉艺术家兼软件工程师，以光学艺术创作著称。他以形式、图形、线条和色彩为主要表达工具，探索全新的视觉观念，并以笔式绘图仪为核心工具将这些观念转化为独特的纸上作品，在多种笔、纸和绘图技术的交融中呈现数字与实体媒介的张力。他的作品在生成艺术社区中以将精密的视觉结构与手工制作的不可预测性相结合而著称。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Post-It_Plotter_Collection_Adam_Fuhrer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804023&s=376d6bb9db65bb15c5e80e662753417b","l":["Post-It Plotter Collection","Adam Fuhrer","2024","Plotter Drawing"]}]},"koji-fujino":{"n":"Koji Fujino","nc":"日本","ne":"Japanese","b":"1967","d":"","i":"藤野浩司是一位系统工程师，也是日本计算机技术小组（CTG）的核心成员，在那里帮助开创了计算机生成图像的早期实验，专注于利用编程和几何变换将视觉设计推向计算领域。","bi":"藤野浩司是日本系统工程师和计算机生成艺术早期先驱。1966年加入计算机技术小组（CTG）——这个驻东京、在IBM科学数据中心工作的艺术家、设计师和工程师集体，由河村政雄和土谷晴一创立，成为日本最有影响力的早期数字艺术团体之一，以将计算技术与视觉设计相结合而著称。\n\n藤野在CTG中专注于利用编程和几何变换将视觉设计推向计算领域，他的工程背景为团体的早期计算机生成图像实验提供了重要的技术支撑。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Running_Cola_is_Africa_Masao_Kohmura_Koji_Fujino_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059436&s=893454bbf6e89d13cd8aa4f2ffe19c66","l":["Masao Kohmura / Koji Fujino","1968","Print"]}]},"julien-gachadoat":{"n":"Julien Gachadoat","nc":"法国","ne":"aka v3ga","b":"1975","d":"","i":"朱利安·加沙多（笔名v3ga）是一位法国艺术家，其生成绘图实践以算法创造兼具精确性与偶然性的抽象形式，通常以绘图仪制作的独特实体版画呈现。","bi":"朱利安·加沙多（笔名v3ga）多年来持续探索生成绘图创作。他在1990年代的前卫计算机演示场景中成长，以代码制作视觉作品，此后编程语言一直是他的创意工具。他用算法创造独特作品，探索抽象形式的涌现，结合单色与几何形状，以随机运算进行重复实验，创作在精确性与偶然性之间取得平衡的图形。他的作品通常以绘图仪制作的实体版画呈现，在数字生成与手工印刷之间建立对话。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Radiance_Julien_Gachadoat_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803110&s=8de0bca9c775ac9f512fd7d5f4c1c19a","l":["Radiance","Julien Gachadoat","2020","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mineral_Prototype_01_Julien_Gachadoat_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805192&s=eec86b0a51b043a6af838feffe9490cb","l":["Mineral Prototype 01","Julien Gachadoat","2023","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Screenshot-2025-10-16-192101.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059401&s=979096250b2aaea6c6e9918ffc4f0ec1","l":["Screenshot-2025-10-16-192101","Julien Gachadoat","2025","Plotter Drawing"]}]},"francoise-gamma":{"n":"Francoise Gamma","nc":"加拿大","ne":"Canadian","b":"1980","d":"","i":"弗朗索瓦丝·伽玛是驻巴塞罗那的数字艺术家，以探索数字形式与人体之间张力的单像素线条故障GIF动画著称。作为互联网艺术界的长期人物和电脑俱乐部（Computers Club）成员，其作品以废弃软件和格式突破数字美学的边界。","bi":"弗朗索瓦丝·伽玛是驻巴塞罗那的数字艺术家，以单像素线条、扭曲人体和故障美学构建的GIF动画著称。作为具有影响力的网络艺术团体电脑俱乐部（Computers Club）成员，他自2000年代初起活跃于互联网艺术领域，自1995年起在网络上进行专业创作，并在Hell.com等早期平台上创作了一些最早的GIF艺术作品。他使用废弃的软件和格式探索数字美学的边界，以故障美学挑战数字形式的完美性，将数字图像的局限性与人体解剖之间的张力作为核心主题。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Fainting_Francoise_Gamma_20251111.gif?w=800&h=600&q=90&auto=format&fit=crop&dm=1762813680&s=f3ab56ca7bb1d4104d62b2e2e441d460","l":["Fainting","Francoise Gamma","2023"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Im32_Francoise_Gamma_11102025.gif?w=636&h=870&q=90&auto=format&fit=crop&dm=1762805149&s=41462dcec5d7802cf0308ea003bab521","l":["Im32","Francoise Gamma","2023","NFT/Digital"]}]},"darcy-gerbarg":{"n":"Darcy Gerbarg","nc":"美国","ne":"American","b":"1950","d":"","i":"达西·格尔巴格从1970年代末开始探索计算机作为艺术媒介，在技术刚刚兴起之际使用早期数字绘图系统和三维图形进行创作。此后她发展出将数字图像转化为丝网版画、投影、陶瓷以及大尺幅印刷和沉浸式光装置的创作体系。","bi":"达西·格尔巴格在纽约州赫利和金斯顿长大，在伍德斯托克跟随当地艺术家学习绘画，后在纽约工作室学校接受素描、绘画与雕塑的正规培训，并在纽约学习版画技术。这些经历为她跨媒介转化图像的能力奠定了技术基础。\n\n1970年代末，在技术刚刚兴起之际，她开始使用早期数字绘图系统和三维图形探索计算机作为艺术媒介的可能性。此后她发展出将数字图像转化为丝网版画、投影、陶瓷以及大尺幅印刷和沉浸式光装置的创作体系，成为美国最早系统探索数字图像与传统工艺之间关系的艺术家之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Digital_Visual_Image_Series_I_10_Darcy_Gerbarg_11212025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058883&s=164d7e4ecd3f6d6fd3ff6bb61477773f","l":["Digital Visual Image Series I 10","Darcy Gerbarg","1980","Print"]}]},"louis-j-gerstman":{"n":"Louis J. Gerstman","nc":"美国","ne":"aka Lou","b":"1930","d":"1992","i":"路易斯·「卢」·格斯特曼是美国神经心理学家和语音研究者，其工作帮助界定了早期计算机语音领域。在贝尔实验室，他共同开发了第一台计算机模拟「会说话的机器」，并在心理声学和交流障碍领域推进了合成语音的临床应用。","bi":"路易斯·「卢」·格斯特曼1930年生于纽约州布法罗，在布法罗大学、哈佛大学和纽约大学学习心理学与语音科学。完成研究生学业后，他在西方电气公司、贝尔电话实验室、哈斯金斯实验室和哥伦比亚大学担任研究员和顾问，专注于语音感知和交流研究。\n\n在贝尔实验室，他参与了早期计算机语音合成工作，共同开发了第一台计算机模拟「会说话的机器」，并研究人类如何感知和处理语音。他在心理声学领域的工作为临床语言治疗和人机语音交互的发展奠定了基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]}]},"copper-frances-giloth":{"n":"Copper Frances Giloth","nc":"美国","ne":"American","b":"1950","d":"","i":"科珀·弗兰西丝·吉洛思是第一位在伊利诺伊大学芝加哥分校电子可视化实验室获得美术硕士学位的女性，并帮助组织了第一届ACM SIGGRAPH实验艺术与科学评审展览。作为开创性的新媒体艺术家和教育者，她的作品横跨数字艺术、动画和沉浸式环境。","bi":"科珀·弗兰西丝·吉洛思是获奖新媒体艺术家和教育者，驻马萨诸塞州阿默斯特和法国艾克斯-普罗旺斯，工作横跨数字媒体、虚拟环境、动画、视频、绘画和装置。她的艺术实践由日常生活与以计算机为主要媒介的先驱性方法的交汇所塑造。\n\n她是第一位在伊利诺伊大学芝加哥分校电子可视化实验室获得美术硕士学位的女性，并帮助组织了第一届ACM SIGGRAPH实验艺术与科学评审展览，为早期数字艺术的展示与推广作出了重要贡献。她在该领域的教学与创作实践影响了数代数字艺术家。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/DES08X3_Copper_Frances_Giloth_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805621&s=b65c19e5da0a22a51613477febb3e72f","l":["DES08X3","Copper Frances Giloth","1980","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Valcros_Trees_set_of_12_Copper_Frances_Giloth_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059209&s=9ddc01e686ae26511343ec1fb567b0fe","l":["Valcros Trees set of 12","Copper Frances Giloth","2023","Print"]}]},"aldo-giorgini":{"n":"Aldo Giorgini","nc":"意大利","ne":"Italian","b":"1934","d":"1994","i":"阿尔多·焦尔吉尼是普渡大学意大利裔艺术家、工程师和教授，在1970年代帮助开创了计算机生成艺术。他使用定制的FORTRAN软件和笔式绘图仪，将算法精确性与手工技法相结合，创作架起科学严谨与艺术表达桥梁的视觉丰富作品。","bi":"阿尔多·焦尔吉尼是艺术家、工程师和普渡大学教授，其开创性工作架起了科学与艺术的桥梁。1934年生于意大利沃盖拉，在从事工程学学习之前，他在专注于雕塑、绘画和未来主义风格的艺术家门下学徒多年，后获得土木工程博士学位。尽管职业根植于科学，他在1970年代重返艺术，在普渡大学使用定制FORTRAN软件和笔式绘图仪探索计算机生成艺术。\n\n他的作品将算法精确性与手工技法相结合，探索数学结构与视觉美感的交汇，创作出架起科学严谨与艺术表达桥梁的丰富视觉作品。他的工作体现了1970年代工程师转型艺术家的独特现象，在早期计算机艺术史上留下了独特印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/chastique_aldo-giorgini_11202025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673169&s=a4f54e58fc84b658c7088390736da508","l":["Aldo Giorgini / Dan Cook","1972","Painting"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bicentennial_American_Flag_prototype_Aldo_Giorgini_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058826&s=25351ccad519072d9489f8b2cba86653","l":["Bicentennial American Flag prototype","Aldo Giorgini","1975","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/untitled_12222025_giorgini.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763910594&s=50fa09605c213f09179585b2c3347c13","l":["untitled 12222025","Aldo Giorgini","1975 (circa)","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_image_Aldo_Giorgini_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802001&s=38d2291abf856f37b619919010ef84c3","l":["Untitled image","Aldo Giorgini","1976","Print (Digital)"]}]},"alfred-gral":{"n":"Alfred Graßl","nc":"奥地利","ne":"Austrian","b":"1941","d":"","i":"阿尔弗雷德·格拉斯尔将对随机性与模拟-数字系统的深厚技术积累带入1960年代末的实验性计算机艺术前沿，与ars intermedia合作创造了工作室电脑a.i./70——一款让艺术家能够实时控制数字与模拟过程的开创性工具。","bi":"阿尔弗雷德·格拉斯尔1941年生于维也纳，学习工程后在维也纳技术大学低频技术研究所担任助理，后从事奥地利联邦铁路数据传输网络的开发工作。他在随机过程和马尔可夫生成器方面的深厚技术专长，为他参与实验性计算机艺术奠定了基础。\n\n与奥托·贝克曼的ars intermedia合作，他共同创造了工作室电脑a.i./70——一款让艺术家能够实时控制数字与模拟过程的开创性工具，重新定义了技术与创造力的交汇方式。这一工具使艺术家能够在无需编程背景的情况下参与计算机艺术实验，是奥地利早期计算机艺术史上的重要创新。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Elektronische_Computergrafik_Otto_Beckmann_Alfred_Gra%C3%9Fl_11102025_2026-03-21-021507_yppj.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059307&s=b2b8a1e7f55bf4789864241fe2ec184a","l":["Otto Beckmann / Alfred Graßl","1968","Oscilloscope/Light Photo"]}]},"april-greiman":{"n":"April Greiman","nc":"","ne":"","b":"2026","d":"","i":"Email Newsletter\n\nSign up to receive the occasional news and stories from the world of computer art.","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/april_greiman-does_it_make_sense.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1770776157&s=b670bbd14d5ff3cfae1b0394add5e370","l":["does it make sense","April Greiman","1986","Print"]}]},"pietro-grossi":{"n":"Pietro Grossi","nc":"意大利","ne":"Italian","b":"1917","d":"2002","i":"皮耶特罗·格罗西是意大利作曲家兼大提琴家，在意大利电子与计算机音乐的发展中发挥了核心作用。1960年代，他与通用电气和奥利维蒂合作，对GE-115大型机进行编程，创作了意大利最早的计算机生成作品之一。","bi":"皮耶特罗·格罗西1917年4月15日生于威尼斯，2002年2月21日在佛罗伦萨辞世。他在博洛尼亚音乐学院学习大提琴和作曲，19岁成为佛罗伦萨五月音乐节管弦乐团首席大提琴手，并担任这一职位长达三十年，同时在佛罗伦萨路易吉·凯鲁比尼音乐学院执教大提琴四十年。\n\n1960年代，他与通用电气和奥利维蒂合作，对GE-115大型机进行编程，创作了意大利最早的计算机生成作品之一，成为意大利电子与计算机音乐发展的核心推动者。他的工作将传统音乐演奏生涯与对新技术的先驱性探索融为一体，在意大利艺术技术交汇史上留下了独特印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Buon_Natale_1967_e_Felice_Anno_Nuovo_Merry_Christmas_1967_and_Happy_New_Year_Pietro_Grossi_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805334&s=becb403a3792df8149336aa72af3abb2","l":["Buon Natale 1967 e Felice Anno Nuovo Merry Christmas 1967 and Happy New Year","Pietro Grossi"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/GE-115_Computer_Concerto_Pietro_Grossi_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805425&s=8ad6fa188ae2ef13b7ed3b71e5b29f99","l":["GE-115 Computer Concerto","Pietro Grossi","1967"]}]},"guidance--control-division-nasa-manned-spacecraft-center":{"n":"Guidance & Control Division, NASA Manned Spacecraft Center","nc":"美国","ne":"American","b":"1965","d":"","i":"NASA-2的早期彩色像素图像将原始计算转化为极简主义的风景与几何形态，呼应了1960年代的硬边抽象和系统艺术运动，标志着算法成为新视觉语言的奠基时刻，架起了技术与艺术之间的桥梁。","bi":"美国国家航空航天局（NASA）实时视觉系统的历史始于NASA-2（也称电子场景生成器ESG），由通用电气公司在罗德·鲁热洛和罗伯特·A·舒马克的领导下于1965至1967年在锡拉丘兹建造，并安装在NASA约翰逊航天中心导航与控制模拟实验室。\n\nNASA-2最初为航天器模拟开发，其早期彩色像素图像将原始计算转化为极简主义的风景与几何形态，呼应了1960年代的硬边抽象和系统艺术运动，成为算法作为新视觉语言的奠基性视觉证据，将技术应用与艺术探索联结起来。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51970_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058692&s=1927f9fe97685bb7fec89bdfb195eebe","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51968_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058787&s=68f333bb4f4d55939e824ee7f7282271","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51969_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058796&s=da0de8969f64e8fd8cf1661570a89c29","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51971_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058800&s=91cafbbcd605cfcbcf07b5e27aaa1045","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-49238_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058815&s=c3aab5748c3250f9332dbe8dd8c12805","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/NASA-2_Electronic-Scene_Generator_Visual_Frame_Suite_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11112025.png.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058825&s=602f853f8865717cdd8451a7ab7a4d67","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51965_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059192&s=6614281df3a21230469c4b4bef435124","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51967_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059314&s=6a8665bf58d4cb5f6aadebcd940ccf33","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/S-71-51964_Guidance_and_Control_Division_NASA_Manned_Spacecraft_Center_11212025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059429&s=9d05391d3637ceb8332d622bed990f75","l":["Guidance &amp; Control Division, NASA Manned Spacecraft Center","1971","Print"]}]},"newman-guttman":{"n":"Newman Guttman","nc":"美国","ne":"American","b":"1927","d":"2018","i":"纽曼·古特曼是美国语言学家和心理声学家，其在贝尔电话实验室的研究帮助塑造了数字声音的最早实验。1957年，他使用马克斯·马修斯的MUSIC I程序在IBM 704计算机上创作了《银色音阶》，成为第一件由计算机数字合成的音乐作品。","bi":"纽曼·古特曼是美国语言学家和心理声学家，受过语言学和声学训练，1950年代加入贝尔实验室，在那里从事语音感知、音高识别和听觉建模研究。他对人类如何感知音调和音色的探究，促使他与马克斯·马修斯和约翰·R·皮尔斯合作进行早期计算机音乐实验。\n\n1957年，他使用马修斯开发的MUSIC I程序在IBM 704计算机上创作了《银色音阶》，这是第一件由计算机数字合成的音乐作品，标志着数字音乐史的重要起点。古特曼的工作将语音科学与音乐创新联结，为此后数字音乐和声音艺术的发展奠定了基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]}]},"andreas-gysin":{"n":"Andreas Gysin","nc":"瑞士","ne":"aka ertdfgcvb","b":"1975","d":"","i":"安德里亚斯·吉辛（笔名ertdfgcvb）与西迪·瓦内蒂是瑞士艺术家二人组，通过代码、设计和视觉实验探索现有硬件的创作可能性，不改变材料原始形态，以废弃显示器和技术元件创作将日常物件重新想象为动态视觉系统的装置。","bi":"安德里亚斯·吉辛1975年生于苏黎世，现驻卢加诺，是艺术家、设计师和程序员，其实践探索融合代码、机械、电子和视觉设计的动力与互动装置。\n\n他与西迪·瓦内蒂自2000年起在设计和研究领域合作，常常没有固定目的。他们创作临时和永久装置，以废弃显示器和技术元件为材料，不改变材料的原始形态，将日常物件重新想象为动态视觉系统。他们的作品探索技术的物质性，以及代码如何赋予现有硬件全新的生命与意义。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Recursive_Tile_20_Andreas_Gysin_Sidi_Vanetti_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058779&s=5b4c6c8a2f37f4405ffbb7cc9aaef3dd","l":["Andreas Gysin / Sidi Vanetti"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Wayfinder_128_Andreas_Gysin_Sidi_Vanetti_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059411&s=b217d81d665800993a62d960ae0a0f41","l":["Andreas Gysin / Sidi Vanetti","2023"]}]},"frederick-hammersley":{"n":"Frederick  Hammersley","nc":"美国","ne":"American","b":"1919","d":"2009","i":"弗雷德里克·哈默斯利是美国抽象艺术家，以硬边几何绘画和实验性数字素描著称，通过严谨的传统技法和计算机生成艺术探索形式、图案与空间关系。","bi":"弗雷德里克·哈默斯利1919年生于犹他州盐湖城，童年部分时光在爱达荷州度过，后随家人移居旧金山，开始学习美术。他在爱达荷州立大学就读后，1940年在洛杉矶庄纳德艺术学院接受培训，二战期间服役美国陆军，担任图形设计师。1945年复员后，他在巴黎美术学院继续深造，师从弗尔南·莱热，后返回美国定居。\n\n他发展出以硬边几何为特征的精密绘画风格，以严谨的传统技法与早期计算机生成素描探索形式、图案与空间关系，成为美国西海岸硬边抽象的重要代表人物之一。","aw":[]},"suzanne-l-hanauer":{"n":"Suzanne L. Hanauer","nc":"美国","ne":"","b":"1940","d":"","i":"苏珊娜·L·汉诺尔是程序员和研究者，1960年代在贝尔电话实验室的工作探索了计算机如何用于生成声音和图像，为语音合成和早期计算机艺术的进步作出贡献。","bi":"苏珊娜·L·汉诺尔是活跃于数字声音和图像研究形成期的程序员和研究者。1960年代，贝尔实验室雇用了许多女性程序员，支持语音、视觉和计算领域的研究；她便是其中之一，从数学和理科专业被招募而来，将实验性想法转化为可运行的程序，与物理学家、心理学家和工程师密切合作。\n\n她的工作探索计算机如何用于生成声音和图像，为语音合成和早期计算机艺术的进步作出贡献，是那个时代贝尔实验室推动数字艺术和声音科学发展的重要女性群体之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/One_Picture_Is_Worth_a_Thousand_Words_Suzanne_L._Hanauer_Manfred_Robert_Schroeder_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5249&fp-y=0.8398&dm=1774059212&s=c0da1fd2293c65a6db41448025d7ba26","l":["Suzanne L. Hanauer / Manfred Robert Schroeder","1968","Plotter Drawing"]}]},"leon-d-harmon":{"n":"Leon D. Harmon","nc":"美国","ne":"American","b":"1922","d":"1982","i":"利昂·D·哈蒙是计算机生成艺术的先驱，他在贝尔实验室的创新工作奠定了数字成像和视觉感知的基础。他在机器视觉和计算技术方面的实验对界定计算机艺术的可能性发挥了关键作用。","bi":"利昂·哈蒙1922年生，在纽约州东部的农场长大，早期从事无线电服务和电子业余爱好，后进入早期计算的核心场所。1950年加入普林斯顿高等研究院，担任接线员，在那里结识了约翰·冯·诺依曼和阿尔伯特·爱因斯坦等人。后加入贝尔电话实验室，在那里与肯·诺尔顿合作创作了《感知研究一号》——将林肯总统的照片转化为抽象像素马赛克的开创性作品，深刻探索了视觉感知与图像识别的本质，成为计算机生成艺术史上最重要的早期作品之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/knowlton-reclining_nude.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.0418&fp-y=0.4882&dm=1770208117&s=5a960efe471d9a471bddea8c53c89a7e","l":["Ken Knowlton / Leon D. Harmon","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Portrait_of_Abraham_Lincoln_block_portrait_Computer_Cubism_Leon_D._Harmon_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1773973015&s=780811d980164c57cd0056ba3cb1aa21","l":["Portrait of Abraham Lincoln block portrait Computer Cubism D.","Leon D. Harmon","1971","Print"]}]},"george-w-hart":{"n":"George W. Hart","nc":"美国","ne":"American","b":"1955","d":"","i":"乔治·W·哈特是美国雕塑家兼数学家，开创了计算机辅助设计和三维打印将复杂几何算法转化为实体雕塑的应用，是数学博物馆的联合创始人，作品被麻省理工学院、普林斯顿大学和惠特尼博物馆等主要机构收藏。","bi":"乔治·W·哈特1955年生，是美国雕塑家和几何学家，将抽象数学转化为令人惊叹的三维艺术。他持有麻省理工学院电气工程与计算机科学博士学位、印第安纳大学语言学硕士学位以及麻省理工学院数学学士学位，数十年来探索软件和数字技术如何驱动复杂几何雕塑的设计与制造。\n\n他是数学博物馆的联合创始人，以将计算机辅助设计和三维打印应用于复杂几何算法转化为实体雕塑而著称，作品被麻省理工学院、普林斯顿大学和惠特尼博物馆等主要机构收藏，在数学、技术与艺术的交汇处开创了独特的创作领域。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/People_2_George_W._Hart_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801973&s=8109e6a89f73771dfcb502e5b35cef07","l":["People 2 W.","George W. Hart","1982","Plotter Drawing"]}]},"jean-pierre-hbert":{"n":"Jean-Pierre Hébert","nc":"法国/美国","ne":"French-American","b":"1939","d":"2021","i":"让-皮埃尔·埃贝尔是算法绘图的早期先驱，1970年代开始用惠普实验室机器和绘图仪进行计算机生成艺术实验。以深厚的艺术史和科学知识为支撑，他发展出探索沙滩画、书法和宇宙形式的持续系列创作。","bi":"让-皮埃尔·埃贝尔1939年生于法国加来，青少年时代大部分时光在普罗旺斯旺斯度过，那里丰厚的艺术氛围——马蒂斯、毕加索和夏加尔的杰作环绕左右——滋养了他早期的审美感知力。1959年，还是学生的他便在暑期工作中用欧洲第一台商用计算机以FORTRAN编程。\n\n1970年代，他开始用惠普实验室机器和绘图仪实验计算机生成艺术，以深厚的艺术史和科学知识为基础，发展出探索沙滩画、书法和宇宙形式的持续系列创作。他的作品在精确性与冥想性之间寻求平衡，将东方书法传统与西方数学美学融为一体。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Etude_pour_Tiling_at_the_Fourth_Jean-Pierre_Hebert_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805460&s=18b5a6d4d4231098d38dc8eb4e97882e","l":["Etude pour Tiling at the Fourth","Jean-Pierre Hébert","1977","Plotter Drawing"]}]},"desmond-paul-henry":{"n":"Desmond Paul Henry","nc":"英国","ne":"English","b":"1921","d":"2004","i":"德斯蒙德·保罗·亨利（1921–2004）是英国艺术家和哲学家，1960年代以二战轰炸机模拟瞄准计算机的部件为核心，自行建造了三台机电绘图机器，创作出既令人惊叹又难以预测的有机线条图形。","bi":"德斯蒙德·保罗·亨利1921年生于英格兰哈德斯菲尔德，自幼对机器和艺术着迷，梦想成为现代的达·芬奇。二战期间他在英国皇家电气与机械工程师部队担任技术文员，接触到轰炸机模拟瞄准计算机——战争结束后这些设备成为他建造绘图机器的核心部件。\n\n1960年代，他以这些二战剩余模拟计算机的机械部件为基础，自行建造了三台独特的机电绘图机器，这些机器产生的有机线条图形既令人惊叹又难以预测，他无法精确预料将产生什么图案。他在英国多个城市展出这批作品，并在曼彻斯特大学执教哲学，以「机器诗意」的概念探索技术与美学的关系。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_from_Drawing_Machine_I_Desmond_Paul_Henry_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803119&s=ffb15859fc677c730fee2f293205e37e","l":["Untitled from Drawing Machine I","Desmond Paul Henry","1961","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Reid_Gallery_Invitation_One_Man_Show_Desmond_Paul_Henry_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058682&s=c1665f0e1c35ac96afcffbfc71537fb3","l":["Reid Gallery Invitation One Man Show","Desmond Paul Henry","1962","Ephemera"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ideographs_Exhibition_Brochure_Desmond_Paul_Henry_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805480&s=a1d0cf474e79aa540279b143037b1f44","l":["Ideographs Exhibition Brochure","Desmond Paul Henry","1962","Ephemera"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_from_Drawing_Machine_II_Desmond_Paul_Henry_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804042&s=efbe1e7af493d87faa2535c6ab631d40","l":["Untitled from Drawing Machine II","Desmond Paul Henry","1963","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Logic_of_Saint_Anslem_Desmond_Paul_Henry_11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762917141&s=31d387924a4e3ac5f00777083ba6fd38","l":["The Logic of Saint Anslem","Desmond Paul Henry","1963","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_from_Drawing_Machine_II_bandw_Desmond_Paul_Henry_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059456&s=a2242500fe9ecb36fd89ac8c09ace6cc","l":["Untitled from Drawing Machine II bandw","Desmond Paul Henry","1964","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_from_Drawing_Machine_III_Desmond_Paul_Henry_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803797&s=9c7b193a1f53259939c85ca0fe947937","l":["Untitled from Drawing Machine III","Desmond Paul Henry","1967","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cameraless_Photography_109_Desmond_Paul_Henry_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059353&s=681937458e4d65c9a1565bfaf99df8ca","l":["Cameraless Photography 109","Desmond Paul Henry","1977","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cameraless_Photography_Desmond_Paul_Henry_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805037&s=fa5a1655e15e3caf4bde844c7bb9fda5","l":["Cameraless Photography","Desmond Paul Henry","1979","Oscilloscope/Light Photo"]}]},"holly-herndon":{"n":"Holly Herndon","nc":"美国","ne":"American","b":"1980","d":"","i":"霍莉·赫恩顿是一位电子音乐家和作曲家，将人声与尖端技术相融合，探索身份认同与数字协作。她的作品包括《Spawn》和数字孪生《Holly+》等开创性的AI项目，重新定义了艺术家与机器之间的创作关系。","bi":"霍莉·赫恩顿1980年生于美国，在田纳西州约翰逊城长大。青少年时代作为交换生在柏林生活了几年，沉浸在这座城市充满活力的舞曲和技术音乐文化中。回到美国后，她在奥克兰米尔斯学院学习电子音乐，师从约翰·比绍夫和弗雷德·弗里斯等有影响力的作曲家，后获得斯图加特国立音乐与表演艺术大学艺术硕士学位，并在斯坦福大学音乐研究中心（CCRMA）获得博士学位。\n\n她以人声与尖端技术的融合探索身份认同与数字协作，创作了《Spawn》（一个在她的音乐上训练的AI实体）和数字孪生《Holly+》等开创性项目，重新定义了艺术家与机器之间的创作关系，以及人工智能在音乐创作中的可能性与伦理边界。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ronald_F._Bustamante_Mahler_by_Satie_by_Holly_Holly_Herndon_Roland_F._Bustamante_Medina_11102025.gif?w=500&h=500&q=90&auto=format&fit=crop&dm=1774058715&s=8fa8e0874b85c71552bba10c526786c4","l":["Ronald F. Bustamante Mahler by Satie by Roland F. Bustamante Medina"]}]},"grace-c-hertlein":{"n":"Grace C. Hertlein","nc":"美国","ne":"American","b":"1918","d":"1994","i":"格雷丝·C·赫特莱因以计算机技术创作将几何形状与有机形态相融合的构图，以数字手段探索自然与记忆。除艺术创作外，她以编辑和撰稿人身份积极参与早期数字艺术领域的讨论。","bi":"格雷丝·C·赫特莱因1918年生于俄亥俄州克利夫兰，在克利夫兰艺术学院和西部储备大学学习，1940至1950年代开始从事插画师和艺术总监的工作，在商业艺术与美术之间游刃有余，以强烈的图形感知力和对构图的把控力赢得早期认可。\n\n1970年代初，她开始探索计算机技术在艺术中的应用，以数字手段探索自然与记忆，创作将几何形状与有机形态相融合的构图。她不仅从事创作，还以编辑和撰稿人身份积极参与早期数字艺术领域的讨论，是推动计算机艺术理论建设的重要声音之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Beasts_in_a_Field_Grace_C._Hertlein_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805629&s=6244c388a9396f2f41e69cf5d4f84144","l":["Beasts in a Field C.","Grace C. Hertlein","1970","Plotter Drawing"]}]},"lejaren-arthur-hiller-jr":{"n":"Lejaren Arthur Hiller Jr","nc":"美国","ne":"American","b":"1924","d":"1994","i":"勒雅伦·亚瑟·希勒是计算机音乐先驱，在计算机生成作曲领域发挥了重要作用，最具代表性的是他参与创作了《伊利亚克组曲》——最早由计算机辅助创作的重要音乐作品之一，开创了算法作曲的新时代。","bi":"勒雅伦·亚瑟·希勒1924年生于纽约市，在音乐与图像深度交融的家庭中成长，其父希勒Sr.是以精心设计的历史场景著称的插画师和艺术摄影师。希勒自幼学习钢琴、单簧管、萨克斯管、双簧管、和声和作曲，并从小实验改变乐器音调。\n\n在伊利诺伊大学，他与伦纳德·艾萨克森合作，使用Illiac I计算机创作了《伊利亚克组曲》（1957）——最早由计算机辅助创作的重要音乐作品之一，开创了算法作曲的新时代。他后来与罗伯特·贝克合作创作了《计算机康塔塔》（1963），进一步推进了计算机作为音乐媒介的可能性。他在布法罗大学继续从事计算机音乐研究，成为这一领域最具影响力的学者和实践者之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_from_the_University_of_Illinois_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_Robert_Baker_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059434&s=5c2f313acd845d7a2c76c52c6e96e502","l":["Multiple Artists"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/HPSCHD_John_Cage_Lejaren_Arthur_Hiller_Jr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059499&s=e41f0272df198e9824a44ffc728bbb86","l":["John Cage / Lejaren Arthur Hiller Jr"]}]},"patrick-hladun":{"n":"Patrick Hladun","nc":"","ne":"","b":"2025","d":"","i":"Email Newsletter\n\nSign up to receive the occasional news and stories from the world of computer art.","bi":"","aw":[]},"herv--huitric":{"n":"Hervé Huitric","nc":"法国","ne":"French","b":"1945","d":"2025","i":"埃尔韦·惠特里克以编程、定制软件和早期三维系统创作计算机生成图像和动画，他与莫妮克·纳阿斯的长期合作标志着最早通过计算对色彩和形式进行持续探索的实践之一。","bi":"埃尔韦·惠特里克是法国艺术家和教育者，其工作帮助塑造了计算机生成图像的早期领域。1945年生于巴黎，在国立高等美术学院学习绘画，1969年完成艺术培训，后在文森大学学习计算机科学，1973年获硕士学位并完成博士学位。\n\n他与莫妮克·纳阿斯的长期合作是最早通过计算对色彩和形式进行持续探索的实践之一，以编程、定制软件和早期三维系统创作了具有开创性的计算机生成图像和动画，在法国计算机艺术史上留下了重要印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_punch_cards_Monique_Nahas_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059196&s=fef344686dd9ed6d1e9c82bbfa193a05","l":["Monique Nahas / Hervé  Huitric","1972","Painting"]}]},"karl-gunnar-vougt-pontus-hultn":{"n":"Karl Gunnar Vougt Pontus Hultén","nc":"瑞典","ne":"Swedish","b":"1924","d":"2006","i":"卡尔·冈纳尔·庞图斯·胡尔滕通过将艺术与技术联结、鼓励公众参与，重塑了博物馆呈现艺术的方式。他的开创性展览和合作挑战了传统博物馆模式，使艺术更易于接近，并在斯德哥尔摩、巴黎、洛杉矶等主要机构担任馆长，推动了艺术与技术的融合。","bi":"卡尔·冈纳尔·庞图斯·胡尔滕1924年生于斯德哥尔摩，在斯德哥尔摩大学学习艺术史和民族学，以维米尔与斯宾诺莎为题完成硕士论文。1940至1950年代在斯德哥尔摩和巴黎来回生活，结识了让·丁格利、马塞尔·杜尚和罗伯特·劳申伯格等当代艺术圈的重要人物。\n\n作为斯德哥尔摩现代美术馆（1960–1973）、巴黎蓬皮杜艺术中心（1974–1981）、洛杉矶当代艺术博物馆（1981–1987）等重要机构的馆长，他通过将艺术与技术联结、鼓励公众参与，从根本上重塑了博物馆的展示方式。他策划了多个具有历史意义的展览，将当代艺术、科学与技术并置，使艺术接触更广泛的受众，成为20世纪最有影响力的博物馆馆长之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Machine_as_Seen_at_the_End_of_the_Mechanical_Age_Karl_Gunnar_Vougt_Pontus_Hulte%CC%81n_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805136&s=eb5c275ee8fff11010ee737a90c10683","l":["The Machine as Seen at the End of the Mechanical Age Hulte%CC%81n","Karl Gunnar Vougt Pontus Hultén","1968","Book"]}]},"thomas-huston":{"n":"Thomas Huston","nc":"美国","ne":"American","b":"1971","d":"","i":"托马斯·约翰·休斯顿是1970年代《计算机与自动化》计算机艺术大赛的早期参与者，使用FORTRAN和笔式绘图仪进行创作，置身于艺术家、程序员和科学家组成的奠基性网络之中。","bi":"托马斯·约翰·休斯顿生于俄亥俄州谢尔比，1962至1964年在俄亥俄州立大学学习天文学和工程，后在泰勒大学获得宗教与哲学学士学位，1973至1975年在鲍尔州立大学攻读计算机科学研究生。\n\n1970年代初，他开始创作计算机艺术，向《计算机与自动化》杂志举办的年度计算机艺术大赛提交笔式绘图仪素描。这些比赛是早期最重要的计算机艺术公开展示渠道之一，他的参与使他置身于艺术家、程序员和科学家组成的早期数字艺术网络之中。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Reflections_7_Thomas_Huston_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058804&s=d2de08f086d46a34d68d29a4e22ad334","l":["Reflections 7","Thomas Huston","1972","Plotter Drawing"]}]},"international-times":{"n":"International Times","nc":"英国","ne":"English","b":"1968","d":"","i":"《国际时报》于1960年代作为伦敦最具影响力的地下报纸创刊，在反文化运动中发挥了关键作用。1968年8月9–22日号刊载了《控制论的奇缘》展览的封面艺术，彰显了该报将艺术与技术实验并置的独特方式。","bi":"《国际时报》（IT）是伦敦最具影响力的地下报纸，1966年在圆屋剧场以平克·弗洛伊德和软机器乐队的通宵活动为开篇创刊，迅速成为反文化思潮的汇聚地。该报刊载诗歌、实验性文章、政治写作和早期音乐新闻，艾伦·金斯堡、威廉·巴勒斯等人为其撰稿。\n\n1968年8月9–22日号以《控制论的奇缘》展览的艺术作品为封面，将这一开创性的计算机艺术展览带入了反文化读者的视野，彰显了该报将艺术、技术与社会反叛相联结的独特立场。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/International_Times_37_August_9_1968_v137_International_Times_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059511&s=9e7dded11f4d77c22618e6e23fc47d8b","l":["37 August 9 1968 v137","International Times","1968","Ephemera"]}]},"leonard-isaacson":{"n":"Leonard Isaacson","nc":"美国","ne":"American","b":"1925","d":"2018","i":"伦纳德·麦克斯韦尔·艾萨克森是化学家兼作曲家，将科学方法应用于音乐，成为计算机生成作曲的先驱，与希勒共同创作了《伊利亚克组曲》——最早由计算机辅助创作的重要音乐作品之一。","bi":"伦纳德·麦克斯韦尔·艾萨克森1925年生于伊利诺伊州芝加哥，是美国化学家兼作曲家，早年便形成了将化学知识与音乐作曲热情相结合的独特跨学科视角。他在伊利诺伊大学化学系全职工作，同时探索使用新兴计算机技术进行作曲的可能性。\n\n他与勒雅伦·希勒合作，使用Illiac I计算机创作了《伊利亚克组曲》（1957）——最早由计算机辅助创作的重要音乐作品之一。这部为弦乐四重奏而作的作品通过马尔可夫链和概率方法生成音乐材料，开创了算法作曲的新时代，成为计算机音乐史上的奠基性作品。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_from_the_University_of_Illinois_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_Robert_Baker_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059434&s=5c2f313acd845d7a2c76c52c6e96e502","l":["Multiple Artists"]}]},"sture-johannesson":{"n":"Sture Johannesson","nc":"瑞典","ne":"Swedish","b":"1935","d":"2018","i":"斯图尔·约翰尼松是一位瑞典艺术家，以频繁引发审查和警方干预的迷幻海报、电影和媒体行动挑战国家权威。他后来成为瑞典最早探索计算机辅助艺术的艺术家之一，以代码延伸其激进的视觉与政治探索。","bi":"斯图尔·约翰尼松1935年生于瑞典斯卡诺尔，孤儿出身，童年生活颇为动荡，后学习图形和摄影，同时从事摄影师、印刷工人和设计师等多种工作。1966年他与妻子、纺织艺术家夏洛特·约翰尼松移居哥德堡，开始以具有政治挑战性的迷幻海报和电影引发广泛关注。\n\n他的作品频繁遭到审查和警方干预，包括著名的《大麻画报》——一份由他在卧室打印机上制作的非法迷幻报纸。他后来成为瑞典最早探索计算机辅助艺术的艺术家之一，与斯滕·卡林合作，以代码延伸其激进的视觉与政治探索，将技术作为反抗传统权力结构的工具。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Paragraph_Sture_Johannesson_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764108890&s=bca9e72129e9b96f07171b615b0c9759","l":["Computer Paragraph","Sture Johannesson","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/For_Sweeden_with_the_Time_Sture_Johannesson_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805394&s=ae9f1718fec3d48ba8fbf4322ab822e7","l":["For Sweeden with the Time","Sture Johannesson","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computed_Art._Beraeknad_konst._Sture_Johannesson_Sten_Kallin_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059432&s=ca4562e9bd4a5c669da1bd8d7c6fc170","l":["Sture Johannesson / Sten Kallin","1974","Book"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Chip_Shadow_Sture_Johannesson_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805154&s=f275eabc0ec59ad6225b5e0ea0af9bfd","l":["Chip Shadow","Sture Johannesson","1981","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Chip_Challenge_Sture_Johannesson_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805627&s=b4a9435072a9d20425fa9a078c97bae5","l":["Chip Challenge","Sture Johannesson","1981","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Image_Handling_Facility_Edition_IBM_Malino_Sture_Johannesson_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805577&s=01c6cd02affd53da07cd8a62d488bd53","l":["Image Handling Facility Edition IBM Malino","Sture Johannesson","1989","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Aros_is_Aros_is_Aros_Sture_Johannesson_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805661&s=0b14fcf1f97cf5f8b81f5e804986c6d3","l":["Aros is Aros is Aros","Sture Johannesson","1989","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/IBM_Publishing_IVX_La_Hulpe_Sture_Johannesson_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058820&s=84de2df8af3e31c9b8055424da6ad3b1","l":["IBM Publishing IVX La Hulpe","Sture Johannesson","1990","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Sture_Johannesson_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805289&s=04efcba2e8be81af395a75efa0f10658","l":["Untitled","Sture Johannesson","1993","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Close_Code_Sture_Johannesson_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802839&s=08ae8567ee5f7c717a5cd5b0e9d0bcdd","l":["Close Code","Sture Johannesson","2005","Mixed Media"]}]},"bla-julesz":{"n":"Béla  Julesz","nc":"匈牙利/美国","ne":"Hungarian/American","b":"1928","d":"2003","i":"贝拉·朱莱斯是视觉神经科学家和实验心理学家，以发明随机点立体图而知名，这一发明揭示了大脑如何在没有传统视觉线索的情况下感知深度。除在贝尔实验室开展科学研究外，他还参与了计算机艺术和视觉感知研究的早期探索。","bi":"贝拉·朱莱斯1928年生于匈牙利布达佩斯，在布达佩斯技术大学获得电气工程文凭，1956年在匈牙利科学院以网络理论、微波系统和电视信号为题获得博士学位。同年，在匈牙利政治动荡中，他与妻子玛尔吉特一起移民美国，加入贝尔实验室，在那里以随机点立体图的发明彻底改变了视觉神经科学，揭示了大脑如何在没有单眼线索的情况下感知深度。\n\n他的研究处于感知科学与计算图形的交汇点，对早期计算机图像的美学探索产生了深远影响，成为视觉神经科学史上最重要的人物之一。","aw":[]},"martin-kahn":{"n":"Martin Kahn","nc":"美国","ne":"","b":"1981","d":"","i":"马丁·卡恩是艺术家兼程序员，以1980年代初创作的生成计算机图形和编写Apple II版本《印刷工坊》原始程序而知名，还是1981年出版的《计算机图像：一本着色书》的作者。","bi":"马丁·卡恩是有着加州大学伯克利分校数学和语言学背景的艺术家兼程序员。1980年代初，他首先担任北极星电脑的图形程序员，后在Broderbund软件公司工作，在那里编写了广受欢迎的Apple II版本《印刷工坊》的原始程序。1981年，他出版了《计算机图像：一本着色书》，这是一批由计算机程序生成的黑白设计图集，体现了他将计算机图形学与艺术表达相融合的早期探索。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Imagery_coloring_book_Martin_Kahn_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059328&s=2dd7d27230d832ed52d568e0c17c0331","l":["Computer Imagery coloring book","Martin Kahn","1981","Book"]}]},"sten-kallin":{"n":"Sten Kallin","nc":"瑞典","ne":"Swedish","b":"1928","d":"1998","i":"斯滕·卡林是瑞典计算机工程师，将计算机视为可视化工具，帮助艺术家从手工制图转向算法过程。他与阿斯特里德·桑佩、斯图尔和夏洛特·约翰尼松合作，在传统手工艺与计算机设计的连接中探索早期数字创作的可能。","bi":"斯滕·卡林1928年生于瑞典，在乌普萨拉大学学习数学和物理，后于1960年代在IBM瑞典担任计算机工程师，专注于传统商业用途之外的可视化与计算应用。在计算机还是庞大、难以接触且几乎没有屏幕显示的时代，他成为新兴技术与视觉创作之间的桥梁。\n\n他与多位艺术家合作，帮助他们从手工制图转向算法过程，包括纺织设计师阿斯特里德·桑佩，以及斯图尔和夏洛特·约翰尼松，将传统手工艺与计算机设计相连接，成为瑞典早期数字艺术探索的重要推动者。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computed_Art._Beraeknad_konst._Sture_Johannesson_Sten_Kallin_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059432&s=ca4562e9bd4a5c669da1bd8d7c6fc170","l":["Sture Johannesson / Sten Kallin","1974","Book"]}]},"gerhard-kammerer-luka":{"n":"Gerhard Kammerer-Luka","nc":"德国","ne":"German","b":"1929","d":"2023","i":"卡默勒-卢卡是计算机辅助艺术的先驱，以将编程与精神和语言主题相融合、创作架起美学与技术桥梁的算法作品著称。1970年代，他共同创立了「艺术与计算机」小组，推动了法国和德国计算机艺术的发展。","bi":"格尔哈德·弗里德里希·路德维希·卡默勒（艺术名卡默勒-卢卡）1929年6月9日生于德国根斯巴赫，早年对艺术的热情体现在他用法国占领军废弃表格纸创作第一批铅笔素描。1950至1957年间，他广泛学习哲学、历史、德语、神学和艺术，后来发展出以算法作品为核心的实践，将编程与精神和语言主题相融合。\n\n1970年代，他与他人共同创立了「艺术与计算机」小组，推动了法国和德国计算机艺术领域的发展，成为将神秘学与技术相联结的独特艺术声音。他的创作体现了将计算机视为探索意义与符号系统的哲学工具的独特视角。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_letters_Gerhard_Kammerer-Luka_11202025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058709&s=2c757c1a23a89c4bfdafa4263bddf3e4","l":["Untitled letters","Gerhard Kammerer-Luka","1978","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Calendrier_permanent_IV_Gerhard_Kammerer-Luka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801559&s=ed121e43deb77a9c677e1db73b3b9e73","l":["Calendrier permanent IV","Gerhard Kammerer-Luka","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Calendrier_permanent_III_Gerhard_Kammerer-Luka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801587&s=d1597bdfdcc27e91caad490720d03e53","l":["Calendrier permanent III","Gerhard Kammerer-Luka","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Calendrier_permanent_VI_Gerhard_Kammerer-Luka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801787&s=c381265ba21b943aa58db072072540ce","l":["Calendrier permanent VI","Gerhard Kammerer-Luka","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.c

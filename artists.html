纽约，为故事片预告片制作特效，积累了灯光、光学和摄影方面的专业知识。1930年代起与玛丽·艾伦·比特合作，探索电影技术如何将节奏、声音和运动可视化，共同创作了美国早期最重要的抽象动画作品，成为最早探索视觉音乐的电影先驱之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Oscilloscope-Generated_Photograph_Abstronic_1_Mary_Ellen_Bute_Ted_Nemeth_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059407&s=f131b666b99a5aa74f16422651c4164c","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/CVM_Bute_tnem_series-a_display_031c.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058715&s=6b9748b86edde11778275afce3f3360f","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/mary-bute_double-oscilloscope_11162025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763349270&s=a2e223a34df4acefc51fe27462b3e9b9","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/abstronic-02_11192025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608090&s=e008c667d6cbc39769b2d8cc546c1ac5","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/abstronic-01_11192025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608459&s=387181716c632ad459e7c60487f94c10","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251209_160620.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1765320011&s=b5e24ab0889affa8dd5f956d5e1589ce","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251209_161101.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1765320394&s=961718241cf6594b5733773cf93958f1","l":["Mary Ellen Bute / Ted Nemeth","1958-1959 (c.)","Oscilloscope/Light Photo"]}]},"barbara-nessim":{"n":"Barbara Nessim","nc":"美国","ne":"American","b":"1939","d":"","i":"芭芭拉·内西姆是驻纽约的艺术家，以横跨传统媒介和早期计算机生成艺术的创新工作著称，探索性别、身份认同和流行文化主题。她充满活力的创作影响了一代插画师和数字艺术家。","bi":"芭芭拉·内西姆1939年生于纽约，至今仍在那里生活和工作。1961年毕业于普拉特学院，专注于图形艺术和插画，母亲从事服装设计培养了她对视觉文化的早年兴趣。她在传统插画与早期计算机艺术之间架起桥梁，以探索性别、身份认同和流行文化主题的充满活力的创作，影响了一代插画师和数字艺术家，是美国数字艺术史上不可忽视的先驱人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Color_Veil_Head_series_Barbara_Nessim_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059458&s=1a6b84c64632ecb93080e2672d2be0e6","l":["Color Veil Head series","Barbara Nessim","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ear_Ache_Barbara_Nessim_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803604&s=8150ed4db1bb2327b6f63be3d8a90390","l":["Ear Ache","Barbara Nessim","1989","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Tea_Leaves_Barbara_Nessim_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805130&s=649504b6f494fe0c4a9bd2ad1192a3fc","l":["Tea Leaves","Barbara Nessim","1989","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Coffee_Break_Barbara_Nessim_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805098&s=8227fd34b7d212f0441d79b68a5e626c","l":["Coffee Break","Barbara Nessim","1996","Print"]}]},"a-michael-noll":{"n":"A. Michael Noll","nc":"美国","ne":"American","b":"1939","d":"","i":"A·迈克尔·诺尔是数字计算机艺术先驱，从1960年代初以算法和随机性创作了最早的计算机生成图像和动画之一，深入探索了计算能否产生具有审美价值的图像这一根本性问题。","bi":"A·迈克尔·诺尔1939年生于新泽西州纽瓦克，在纽瓦克工程学院获电气工程学士学位，在纽约大学获硕士学位，在纽约理工大学获电气工程博士学位。他在贝尔实验室工作期间，从1960年代初以算法和随机性创作了最早的计算机生成图像和动画之一。他设计了研究实验，要求受试者区分计算机生成的图像和人类艺术家的作品，探索了计算能否产生具有审美价值图像这一根本性问题，是数字计算机艺术史上的核心人物。","aw":[]},"hans-oesch":{"n":"Hans Oesch","nc":"瑞士","ne":"Swiss","b":"1926","d":"1992","i":"汉斯·罗尔夫·厄施是瑞士音乐学家，职业生涯在巴洛克学术研究和民族音乐学之间游走，编辑了科雷利的作品，在东南亚进行田野调查，并帮助将早期计算机音乐引入欧洲学术讨论。","bi":"汉斯·罗尔夫·厄施1926年生于瑞士沃尔夫哈尔登，1946至1951年在巴塞尔大学师从雅克·汉德申学习音乐学，后在巴洛克学术研究和民族音乐学之间发展职业生涯。他编辑了阿尔坎杰洛·科雷利的作品，在东南亚进行田野调查，并帮助将早期计算机音乐引入欧洲学术讨论，是横跨传统音乐学与新兴数字音乐领域的重要中间人。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_Musik_der_Senoi_Mayala_Native_Music_Max_Vernon_Mathews_Bell_Telephone_Labs_Hans_Oesch_Hermann_Scherchen_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059311&s=25063eec0db5b47527a49ae0fd6c451d","l":["Multiple Artists"]}]},"makoto-ohtake":{"n":"Makoto Ohtake","nc":"日本","ne":"Japanese","b":"1966","d":"","i":"大竹诚是航空建筑师，也是日本计算机技术小组（CTG）的重要成员，这个1960年代的集体探索了计算机在艺术与设计中的创造性运用。","bi":"大竹诚是航空建筑师，也是1966年创立的先驱性日本集体计算机技术小组（CTG）的成员，该团体汇聚艺术家、设计师和工程师，在IBM科学数据中心探索计算机的创造性运用，为日本计算机艺术的早期发展奠定了重要基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]}]},"okazz":{"n":"Okazz","nc":"日本","ne":"Japanese","b":"1980","d":"","i":"Okazz是东京生成艺术家兼创意程序员，以代码构建在控制与惊喜之间取得平衡的结构性动态视觉系统。受动漫和日本亚文化影响，在算法精确性与有机自发性之间探索独特的视觉语言。","bi":"Okazz是驻东京的生成艺术家兼创意程序员，在发现Processing平台后开始编程，迅速对代码作为视觉表达工具产生浓厚兴趣。受动漫和日本亚文化影响，自学发展出以代码构建结构性动态视觉系统的独特实践，在控制与惊喜之间探索算法精确性与有机自发性交汇的视觉语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Square_Symphony_66_Okazz_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058910&s=a14205162a7606498fbc9cf44626d990","l":["Square Symphony 66","Okaz 亚斯·劳1990年生，是探索人类与物质及数字环境动态关系的生成艺术家，主要以代码和电子元件创作涵盖互动装置和实时生成图像的作品，通过技术与感知的交汇探索数字与物质世界的边界。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Toccata_228_Marcelo_Soria-Rodriguez_Andreas_Rau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058678&s=be945d3997e5cc4566a878c45d672f07","l":["Marcelo Soria-Rodriguez / Andreas Rau"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Toccata_141_Marcelo_Soria-Rodriguez_Andreas_Rau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059302&s=b7f9485c8c052824712b848c74ed2d73","l":["Marcelo Soria-Rodriguez / Andreas Rau"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Toccata_83_Marcelo_Soria-Rodriguez_Andreas_Rau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059446&s=05440cdc8325f1476f16ea4c055cb371","l":["Marcelo Soria-Rodriguez / Andreas Rau"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Inventory_Numbers_60_Andreas_Rau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058814&s=18aa77a066179153e446caa02ea577fd","l":["Inventory Numbers 60","Andreas Rau","2025"]}]},"casey-reas":{"n":"Casey Reas","nc":"美国","ne":"American","b":"2004","d":"2010","i":"凯西·雷亚斯是美国艺术家，以软件为媒介，编写实时生成图像的系统——这些图像在画面组合、分解和重构的过程中不断演变。他与本·弗莱共同创建了Processing编程语言。","bi":"凯西·雷亚斯1972年生，是美国艺术家，在辛辛那提大学设计、建筑、艺术与规划学院学习平面设计。他以软件为媒介，编写实时生成图像的系统，并与本·弗莱共同创建了Processing编程语言，这一开放源代码语言彻底降低了视觉艺术家学习编程的门槛，对生成艺术和创意编码社区产生了深远影响。他在麻省理工学院媒体实验室获得硕士学位，此后执教于加州大学洛杉矶分校。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Process_Compendium_2004%E2%80%942010_A_Casey_Reas_11102025_2026-03-21-021652_encc.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059412&s=fb2333ca97173f93a93971f6c62e97ca","l":["Process Compendium 2004%E2%80%942010 A","Casey Reas","2004-2010","Pr duction/images/artwork/P13-A-P2_Casey_Reas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805104&s=d157d8b5c9a119f7a30d07ab06bfb8e8","l":["P13-A-P2","Casey Reas","2004-2010","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/P11-A-P5_Casey_Reas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803975&s=aec93c5d375c5f68f5f1c0d4a37f1f4c","l":["P11-A-P5","Casey Reas","2004-2010","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/P04-A-P11_Casey_Reas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803493&s=f09b572afb3d1bf9b8b7ae1e6fca918b","l":["P04-A-P11","Casey Reas","2004-2010","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/P08-A-P3_Casey_Reas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803385&s=03c38406f4c4377af19e6f37138211e2","l":["P08-A-P3","Casey Reas","2004-2010","Print"]}]},"jasia-reichardt":{"n":"Jasia Reichardt","nc":"波兰/英国","ne":"Polish/British","b":"1942","d":"","i":"贾西娅·莱哈特是开创性策展人、作家和编辑，在艺术、科学与技术交汇处的工作帮助界定了控制论与数字艺术领域。她策划了1968年具有里程碑意义的《控制论的奇缘》展览。","bi":"贾西娅·莱哈特（原名贾尼娜·查金）1933年生于华沙一个文化丰富的犹太家庭，二战期间在华沙犹太区幸存，1942年被秘密带出，以化名生活。战后移居伦敦，成为当代艺术学会（ICA）的核心人物，策划了1968年具有里程碑意义的《控制论的奇缘》展览，首次将计算机艺术引入主流公众视野，奠定了她在计算机艺术史上不可替代的地位。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity_the_computer_and_the_arts_Jasia_Reichardt_11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916829&s=2115bebd329ee8ce16d821e49f4ced06","l":["Cybernetic Serendipity the computer and the arts","Jasia Reichardt","1968","Book"]}]},"paul-rickards":{"n":"Paul Rickards","nc":"美国","ne":"American","b":"1975","d":"","i":"保罗·里卡兹是生成艺术家，使用1980年代的笔式绘图仪以档案墨水创作算法绘图，编写定制Python代码驱动每台机器，以机械约束与人工编程的精确性相融合探索独特的视觉语言。","bi":"保罗·里卡兹是使用复古笔式绘图仪和现代工具创作算法绘图的生成艺术家，以Python编写定制代码，操控1980年代制造的老式绘图仪，机械约束与人工编程的精确性相互作用，形成既有控制又有偶然性的独特视觉语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/PLOT_20200125220025_Paul_Rickards_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804032&s=189bb231823bf945096e062fb02d89e6","l":["PLOT 20200125220025","Paul Rickards","2020","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20210815201354_Paul_Rickards_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802561&s=af050932e3fb75fc31b74a72c3176d36","l":["20210815201354","Paul Rickards","2021","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/PLOT_20210902204731_Paul_Rickards_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803457&s=adabf9ac3244c0f1da0cf697b30eaed3","l":["PLOT 20210902204731","Paul Rickards","2021","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20240603141753_Paul_Rickards_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804175&s=28e584c644bc2c03c6ada2c1c7cd3638","l":["20240603141753","Paul Rickards","2023","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rulemart_Paul_Rickards_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802847&s=46be4f18246062bf108bfbe92c9ae1e1","l":["Rulemart","Paul Rickards","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/PLOT_20240122090830_Paul_Rickards_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805384&s=8dc08ac6e1f9e4309f8e589760592aa9","l":["PLOT 20240122090830","Paul Rickards","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Set_of_3_Generative_Plotter_Drawings_Paul_ 国计算机艺术家和工程师，在阿尔伯克基桑迪亚公司工作期间，于1960年代使用先进的大型机和精密绘图工具创作数学启发的艺术作品，将工程技术应用于美学探索，是早期计算机艺术史上的重要参与者。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/3D_Checkerboard_Pattern_Donald_K_Robbins_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803530&s=c05acd87d9451e098bdc2220218b595f","l":["3D Checkerboard Pattern K","Donald K Robbins","1968","Print"]}]},"arthur-roberts":{"n":"Arthur Roberts","nc":"美国","ne":"American","b":"1912","d":"2004","i":"亚瑟·罗伯茨是物理学家兼作曲家，将科学洞察与机智幽默带入音乐，创作使复杂概念易于理解和引人入胜的歌曲，是计算机音乐早期探索的先驱者之一。","bi":"亚瑟·罗伯茨1912年生于纽约，1933年在曼哈顿音乐学院获钢琴文凭，同年在哥伦比亚大学获物理学硕士学位，将科学与音乐的双重背景相融合，创作使复杂科学概念易于理解的歌曲，是计算机音乐早期探索的先驱者之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]}]},"arnold-rockman":{"n":"Arnold Rockman","nc":"英国/加拿大","ne":"British-born Canadian","b":"1930","d":"1992","i":"阿诺德·罗克曼是在多伦多约克大学执教传播与文化理论的社会学家，1960年代共同撰写了《作为艺术家的电子计算机》——最早将计算机艺术作为严肃学术研究对象的文章之一。","bi":"阿诺德·罗克曼是多伦多约克大学的加拿大社会学家和教授，教授传播与文化理论，探索机构和环境如何塑造文化与传播模式。1960年代共同撰写了《作为艺术家的电子计算机》，这是最早将计算机艺术作为严肃学术研究对象的文章之一，为计算机艺术的理论讨论奠定了基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Electronic_Computer_as_an_Artist_Canadian_Art_Magazine_Leslie_Mezei_Arnold_Rockman_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058668&s=f4d45f0e8b66cd60a724012157b9471a","l":["Leslie Mezei / Arnold Rockman","1964","Ephemera"]}]},"osvaldo-romberg":{"n":"Osvaldo Romberg","nc":"阿根廷","ne":"Argentinian","b":"1938","d":"2019","i":"奥斯瓦尔多·罗姆贝格发展出专注于分析艺术与艺术史的创作实践，考察图像、色彩和形式是如何被构建和组织的，1960年代末开始将计算机引入对视觉系统和艺术语言的研究。","bi":"奥斯瓦尔多·罗姆贝格1938年生于布宜诺斯艾利斯，父母是犹太移民，在布宜诺斯艾利斯大学学习建筑，1956至1962年在各大学教授绘画和色彩理论。艺术实践专注于分析艺术与艺术史，1960年代末开始将计算机引入对视觉系统和艺术语言的研究。","aw":[]},"sylvia-roubaud":{"n":"Sylvia Roubaud","nc":"德国","ne":"German","b":"1960","d":"1991","i":"西尔维亚·鲁博为梅塞施密特-伯尔科-布洛姆（MBB）计算机图形项目提供原创草图和艺术指导，对计算机生成艺术作出了重要贡献，是艺术培训与计算机技术融合的早期案例。","bi":"西尔维亚·鲁博1941年生于德国慕尼黑，艺术培训始于1960年代末在意大利非正式主义画家埃米利奥·韦多瓦指导下的工作坊。1967年进入慕尼黑艺术学院学习，后为MBB计算机图形项目提供原创草图和艺术指导，成为早期数字艺术史上艺术培训与计算机技术融合的独特案例。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Explosion_of_Ordered_Structures_Gerold_Weiss_Sylvia_Roubaud_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058710&s=8ec3fbe341b879046e8368cc24db16b7","l":["Gerold Weiss / Sylvia Roubaud","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/MBB_Computer_Graphics_portfolio_Rolf_Wo%CC%88lk_Frank_Bo%CC%88ttger_Sylvia_Roubaud_Gerold_Weiss_Aron_Warszawski_Johann_Willsberger_11102025_2026-03-21-020712_fbvf.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058832&s=9ae28c59656946c54a99aa95a5be0435","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Connections_of_Points_by_Arc_Sequences_Sylvia_Roubaud_Gerold_Weiss_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059349&s=c1a49aaf2c2066ad187eca412d75563a","l":["Sylvia Roubaud / Gerold Weiss","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Structures_Comprising_Superposed_Rectangles_Sylvia_Roubaud_Gerold_Weiss_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059453&s=b422cc50e5df8a38c7b0134526ac31dc","l":["Sylvia Roubaud / Gerold Weiss","1972","Print"]}]},"john-roy":{"n":"John Roy","nc":"美国","ne":"American","b":"1930","d":"2001","i":"约翰·罗伊是视觉艺术家，其作品探索色彩、系统和图像在媒介间的转换，横跨绘画、版画、数字艺术和光基雕塑，在阿尔伯斯的影响下发展出精密的色彩理论实践。","bi":"约翰·罗伊1930年生于马萨诸塞州斯普林菲尔德，在耶鲁大学艺术与设计学院学习，获美术学士和硕士学位，师从约瑟夫·阿尔伯斯。在阿尔伯斯的影响下发展出精密的色彩理论实践，横跨绘画、版画、数字艺术和光基雕塑探索色彩、系统和图像在媒介间的转换。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Segrid_John_Roy_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802771&s=aa6a5eb61de1896b10f0ce5c50ca93b6","l":["Segrid","John Roy","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/SDL_Portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Georg_Nees_John_Roy_Zdene%CC%8Ck_Sy%CC%81kora_Roger_Vilder_11102025_2026-03-21-021728_mnnn.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059448&s=56218910ce19af914f2bb8e7f42f590e","l":["Multiple Artists","1973","Print"]}]},"cb-rubenstein":{"n":"C.B. Rubenstein","nc":"美国","ne":"American","b":"1933","d":"2021","i":"查尔斯·B·鲁宾斯坦是贝尔实验室的电气工程师，工作涵盖视觉阈值研究、数字彩色视频编码以及人因工程部门的领导，在视觉感知与数字图像技术的交汇点上作出了重要贡献。","bi":"查尔斯·B·鲁宾斯坦1933年生于布朗克斯，在纽约城市学院和纽约大学学习电气工程后，1959年加入贝尔实验室。工作涵盖视觉阈值研究、数字彩色视频编码以及人因工程部门的领导，在视觉感知与数字图像技术的交汇点上作出了重要贡献。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Picturephone_Self_Portrait_Lillian_Feldman_Schwartz_C.B._Rubenstein_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059137&s=0f952b964f6d52bb5a516ae02ace6496","l":["Lillian Feldman Schwartz / C.B. Rubenstein","1979","Print"]}]},"rudxane":{"n":"rudxane","nc":"荷兰","ne":"Dutch","b":"2013","d":"","i":"Rudxane是荷兰视觉艺术家，其生成实践探索人类意图与计算过程之间的边界，以网格、变化和可控随机性在精确性与偶然性之间构建独特的视觉语言。","bi":"Rudxane是驻阿姆斯特丹的荷兰视觉艺术家，曾在海牙皇家艺术学院学习摄影，中断学业后从事摄影工作多年。后来对生成艺术产生兴趣，以网格、变化和可控随机性探索人类意图与计算过程之间的边界，在精确性与偶然性之间构建独特的视觉语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/grid_studies-rudxane_12012025png.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764634371&s=b3f0680a2d3b4c05f355ba68711d2d8c","l":["grid studies- 12012025png","rudxane","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bootleg_rudxane_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803778&s=ee65ab344e93d8fbd48f106b7909b315","l":["Bootleg","rudxane","2024"]}]},"kerim-safa":{"n":"Kerim Safa","nc":"土耳其","ne":"Turkish","b":"1985","d":"","i":"凯里姆·萨法是视觉艺术家兼音乐家，其作品将早期计算机美学与手绘像素动画、视听构图和实验声音相结合，探索数字遗产与当代创作方法的交汇。","bi":"凯里姆·萨法1985年生于土耳其伊兹密尔，是现居荷兰的视觉艺术家兼音乐家，在多库兹艾吕尔大学学习美术，后获全额奖学金赴海牙皇家艺术学院深造。作品将早期计算机美学与手绘像素动画、视听构图和实验声音相结合，以像素语言架起数字遗产与当代创作方法之间的桥梁。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_60_Kerim_Safa_Loi%CC%88c_Schwaller_11102025_2026-03-21-020843_nggo.gif?w=1260&h=900&q=90&auto=format&fit=crop&dm=1774058923&s=d7e8a1ce0e56c6458cbeb26e6589a499","l":["Kerim Safa / Loïc Schwaller","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_11_Kerim_Safa_Loi%CC%88c_Schwaller_11102025_2026-03-21-020931_dguq.gif?w=900&h=1080&q=90&auto=format&fit=crop&dm=1774058971&s=d48de0bc2eec4a4208ba07bb8d35f6a9","l":["Kerim Safa / Loïc Schwaller","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_19_Kerim_Safa_Loi%CC%88c_Schwaller_11102025.gif?w=1440&h=1440&q=90&auto=format&fit=crop&dm=1762805045&s=cbd72419f74abde16522a6de2b762dae","l":["Kerim Safa / Loïc Schwaller","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_29_Kerim_Safa_Loi%CC%88c_Schwaller_11102025.gif?w=1920&h=1080&q=90&auto=format&fit=crop&dm=1762805324&s=e34cb705287476e7ef3e155be862f4e6","l":["Kerim Safa / Loïc Schwaller","2024"]}]},"heliodro-helio-santos":{"n":"Heliodro \"Helio\" Santos","nc":"墨西哥","ne":"Mexican","b":"1980","d":"","i":"埃利奥多罗·「埃利奥」·桑托斯是墨西哥艺术家，实践架起传统绘画与尖端技术的桥梁，以机器学习和计算机视觉探索复杂的文化与身份关系。","bi":"埃利奥多罗（埃利奥）·桑托斯是墨西哥艺术家兼研究者，创作历程从绘画起步，逐渐深入数据、网络文化和技术领域。植根于传统艺术实践，将机器学习和计算机视觉引入创作，探索复杂的文化与身份关系，架起墨西哥传统视觉文化与当代数字艺术之间的桥梁。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Self-portrait_painted_by_machines_Heliodro_Helio_Santos_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802821&s=dc182633cf41b34a368e8d1c6da5ab85","l":["Heliodro &quot;Helio&quot; Santos","2024","Plotter Drawing"]}]},"hermann-scherchen":{"n":"Hermann Scherchen","nc":"德国","ne":"German","b":"1891","d":"1966","i":"赫尔曼·谢尔申是德国指挥家、出版商和研究者，在欧洲推广了现代与当代音乐，将积极的指挥生涯与对电子和计算机音乐的开创性支持相结合。","bi":"赫尔曼·谢尔申1891年生于柏林，幼年学习小提琴，后成为职业中提琴手。发展为指挥，在欧洲各地推广现代与当代音乐，在瑞士创立了ISCM（国际现代音乐协会）。将积极的指挥生涯与对电子和计算机音乐的开创性支持相结合，成为20世纪音乐与技术交汇史上的重要人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_Musik_der_Senoi_Mayala_Native_Music_Max_Vernon_Mathews_Bell_Telephone_Labs_Hans_Oesch_Hermann_Scherchen_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059311&s=25063eec0db5b47527a49ae0fd6c451d","l":["Multiple Artists"]}]},"peter-schmidt":{"n":"Peter Schmidt","nc":"英国","ne":"English","b":"1931","d":"1980","i":"彼得·施密特是英国艺术家兼教育者，发展出以音乐结构和可控变化为基础的规则性绘画方法，并与布莱恩·伊诺共同开发了广受欢迎的《斜略策略》卡片。","bi":"彼得·施密特1931年生于德国柏林，1938年随犹太父母移居英格兰逃离纳粹迫害，1945年入英国籍。在哥德史密斯学院和利兹艺术学院学习，后在桑德兰理工学院执教。发展出以音乐结构和可控变化为基础的规则性绘画方法，并与布莱恩·伊诺共同开发了广受欢迎的《斜略策略》卡片，对当代创作实践产生了持久影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity_Music_Peter_Schmidt_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803222&s=118ed31b9f27deb536633ce57a3b5bfc","l":["Cybernetic Serendipity Music","Peter Schmidt"]}]},"manfred-robert-schroeder":{"n":"Manfred Robert Schroeder","nc":"德国","ne":"German","b":"1926","d":"2009","i":"曼弗雷德·罗伯特·施罗德是德国物理学家，研究从声学和数学延伸至计算机可视化的新兴领域，在贝尔实验室开发了早期计算机图形技术，并将分形几何引入视觉艺术领域。","bi":"曼弗雷德·罗伯特·施罗德1926年生于德国阿伦，二战期间在德国空军服役接受雷达和电子技术培训，战后在哥廷根大学学习物理，在贝尔电话实验室发展职业生涯。研究从声学和数学延伸至计算机可视化的新兴领域，开发了早期计算机图形技术，并将分形几何引入视觉艺术领域，在科学与艺术交汇处作出了独特贡献。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/One_Picture_Is_Worth_a_Thousand_Words_Suzanne_L._Hanauer_Manfred_Robert_Schroeder_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5249&fp-y=0.8398&dm=1774059212&s=c0da1fd2293c65a6db41448025d7ba26","l":["Suzanne L. Hanauer / Manfred Robert Schroeder","1968","Plotter Drawing"]}]},"loc-schwaller":{"n":"Loïc Schwaller","nc":"法国","ne":"aka loackme","b":"2018","d":"","i":"洛伊克·施瓦勒（笔名loackme）创作专注于单色几何设计和动画循环的生成艺术，以抖动算法在有限色盘中创造复杂的阴影效果，形成独特而精确的视觉语言。","bi":"洛伊克·施瓦勒（笔名loackme）是驻阿姆斯特丹的法国生成艺术家，持有统计学博士学位，曾任研究员，2018年离开学术界转向艺术创作。以抖动算法在有限色盘中创造复杂阴影效果，专注于单色几何设计和动画循环，在生成艺术社区中以数学严谨性与视觉优雅的结合著称。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_60_Kerim_Safa_Loi%CC%88c_Schwaller_11102025_2026-03-21-020843_nggo.gif?w=1260&h=900&q=90&auto=format&fit=crop&dm=1774058923&s=d7e8a1ce0e56c6458cbeb26e6589a499","l":["Kerim Safa / Loïc Schwaller","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_11_Kerim_Safa_Loi%CC%88c_Schwaller_11102025_2026-03-21-020931_dguq.gif?w=900&h=1080&q=90&auto=format&fit=crop&dm=1774058971&s=d48de0bc2eec4a4208ba07bb8d35f6a9","l":["Kerim Safa / Loïc Schwaller","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_19_Kerim_Safa_Loi%CC%88c_Schwaller_11102025.gif?w=1440&h=1440&q=90&auto=format&fit=crop&dm=1762805045&s=cbd72419f74abde16522a6de2b762dae","l":["Kerim Safa / Loïc Schwaller","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/nullMachines_29_Kerim_Safa_Loi%CC%88c_Schwaller_11102025.gif?w=1920&h=1080&q=90&auto=format&fit=crop&dm=1762805324&s=e34cb705287476e7ef3e155be862f4e6","l":["Kerim Safa / Loïc Schwaller","2024"]}]},"lillian-feldman-schwartz":{"n":"Lillian Feldman Schwartz","nc":"美国","ne":"American","b":"1927","d":"2024","i":"莉莲·费尔德曼·施瓦茨是计算机生成艺术的先驱，在贝尔实验室开发了突破性的软件和技术，创作了最早的数字动画和图形之一，横跨绘画、雕塑、电影和电子媒介。","bi":"莉莲·费尔德曼·施瓦茨1927年生于俄亥俄州辛辛那提，婚后随丈夫移居战后日本，在那里患病复元期间发展出绘画实践。回美国后1960年代末开始与贝尔实验室合作，开发突破性的软件和技术，创作了最早的数字动画和图形之一，横跨绘画、雕塑、电影和电子媒介，界定了计算机艺术的早期可能性。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Seated_Nude_AP_Ken_Knowlton_Lillian_Feldman_Schwartz_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059400&s=8bb550b48b00cfbee495d7074dfde24d","l":["Ken Knowlton / Lillian Feldman Schwartz","1969","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Picturephone_Self_Portrait_Lillian_Feldman_Schwartz_C.B._Rubenstein_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059137&s=0f952b964f6d52bb5a516ae02ace6496","l":["Lillian Feldman Schwartz / C.B. Rubenstein","1979","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/BIG_MOMA_Poster_super-sized_edition_Lillian_Feldman_Schwartz_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059008&s=fcb14e88db95493d23b31a6800f4eb0d","l":["BIG MOMA Poster super-sized edition","Lillian Feldman Schwartz","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Self-Portrait_Lillian_Feldman_Schwartz_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805278&s=f953fac59dd6afcf7c8da6baf1a9ae3c","l":["Untitled Self-Portrait","Lillian Feldman Schwartz","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/MOMA_Poster_1984_Lillian_Feldman_Schwartz_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059228&s=6b3035a832d8d3677f302a50adbf65ba","l":["MOMA Poster 1984","Lillian Feldman Schwartz","198 在规则约束下的涌现。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/H18799-L422756655_original.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975562&s=c9873bed11cdb6b2ea9e97b97c527b74","l":["Multiple Artists","1978","Book"]}]},"johan-severtson":{"n":"Johan Severtson","nc":"美国","ne":"American","b":"1964","d":"","i":"约翰·塞沃特森是美国艺术家、设计师和教育者，早期工作探索了使用计算机为雕塑生成结构系统，后成为数字艺术教育领域的领军人物。","bi":"约翰·塞沃特森生于明尼苏达州德卢斯，在明尼苏达大学德卢斯分校学习艺术和艺术史，1964年毕业后开始探索计算机生成雕塑结构系统，成为数字艺术教育领域的早期先驱。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_computer_generated_sculpture_1_Johan_Severtson_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059351&s=4e8009a29fc63ea3d7f431ed38805e46","l":["Untitled computer generated sculpture 1","Johan Severtson","1966","Sculpture"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_computer_generated_sculpture_2_Johan_Severtson_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058687&s=8fb14fb8f28837dfb2350b258dc16ca6","l":["Untitled computer generated sculpture 2","Johan Severtson","1967","Sculpture"]}]},"james-shaffer":{"n":"James Shaffer","nc":"美国","ne":"American","b":"1927","d":"2018","i":"詹姆斯·沙弗是一位开创性程序员，通过与艺术家查尔斯·楚里的合作，帮助创作了计算机生成图像的最早范例之一，为早期数字艺术的视觉可能性奠定了基础。","bi":"詹姆斯·沙弗是程序员和技术专家，其工作帮助界定了计算机生成图像在最早阶段的可能性，在俄亥俄州立大学与艺术家查尔斯·楚里合作，为早期数字艺术提供了关键技术支撑。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Hummingbird_II_1967_Charles_Chuck_Csuri_James_Shaffer_11202025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058728&s=057f1bf787556ebdf8cabe59c33857a5","l":["Charles &quot;Chuck&quot; Csuri / James Shaffer","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Random_War_Charles_Chuck_Csuri_James_Shaffer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059133&s=302567344d2daab03ae324e4d59b06c7","l":["Charles &quot;Chuck&quot; Csuri / James Shaffer","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bearded_Man_Charles_Chuck_Csuri_James_Shaffer_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059518&s=5807c9092a2cab78e469b6c6b469d50d","l":["Charles &quot;Chuck&quot; Csuri / James Shaffer","1968","Plotter Drawing"]}]},"mary-elizabeth-moore-shannon":{"n":"Mary Elizabeth Moore Shannon","nc":"美国","ne":"aka Betty","b":"1922","d":"2017","i":"玛丽·伊丽莎白·「贝蒂」·摩尔·香农是美国数学家、研究者和大师级织工，她在贝尔实验室的工作帮助为算法作曲和数字艺术的早期发展奠定了基础。","bi":"玛丽·伊丽莎白·「贝蒂」·摩尔·香农1922年生于纽约市，在新泽西女子学院学习数学，毕业后在贝尔实验室工作，在那里的工作帮助为算法作曲和数字艺术的早期发展奠定了基础，同时她也是一位大师级织工，将数学思维与传统工艺相结合。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]}]},"jeffrey-shaw":{"n":"Jeffrey Shaw","nc":"澳大利亚","ne":"Australian","b":"1944","d":"","i":"杰弗里·肖是澳大利亚艺术家，其实践通过互动环境、扩展电影和沉浸式可视化定义了新媒体艺术，作为多家研究机构的创始主任塑造了数字艺术的学术与实践格局。","bi":"杰弗里·肖1944年生于澳大利亚墨尔本，在墨尔本大学学习建筑和艺术史后赴欧洲深造，在布雷拉学院和圣马丁艺术学院学习雕塑。实践通过互动环境、扩展电影和沉浸式可视化定义了新媒体艺术，作为ZKM和香港城市大学创意媒体学院等机构的创始主任，塑造了数字艺术的学术与实践格局。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Conversations_Jeffrey_Shaw_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802975&s=4360d4678ae441be5a8c15bb4a2e6964","l":["Conversations","Jeffrey Shaw","1984","Print (Digital)"]}]},"roger-newland-shepard":{"n":"Roger Newland Shepard","nc":"美国","ne":"American","b":"1929","d":"2022","i":"罗杰·N·谢帕德是认知科学家，研究从心理旋转和心理空间到音符的计算表征，变革了对感知与想象的研究，其对视觉认知的贡献也影响了计算机图形学的早期发展。","bi":"罗杰·纽兰德·谢帕德是1929年生的美国认知科学家，早年对谜题和感知幻觉着迷，后在斯坦福大学学习心理学。关于心理旋转、心理空间和音符计算表征的研究不仅开辟了认知科学的新路径，也对计算机图形学的早期发展产生了影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Voice_of_the_Computer_Max_Vernon_Mathews_Jean-Claude_Raoul_Olivier_Risset_James_Tenney_Wayne_Slawson_Roger_Newland_Shepard_John_Robinson_Pierce_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058676&s=9a12a9ebf5941ff34860ed9773d3f2f2","l":["Multiple Artists","1970"]}]},"sonia-landy-sheridan":{"n":"Sonia Landy Sheridan","nc":"美国","ne":"American","b":"1925","d":"2021","i":"索尼娅·兰迪·谢里丹是美国艺术家和教育者，其工作探索了成像技术的创造潜力，从施乐复印机到早期计算机系统，在芝加哥艺术学院创立了「生成系统」项目。","bi":"索尼娅·兰迪·谢里丹1925年生于俄亥俄州纽瓦克，在俄亥俄州立大学获美术学士学位，后在加州大学伯克利分校获艺术硕士学位。在芝加哥艺术学院创立了「生成系统」项目，系统探索成像技术的创造潜力，从施乐复印机延伸至早期计算机系统，是数字艺术教育领域的早期奠基者之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Body-Print-of-Mary_Sonia-Sheridan_011202025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673009&s=da4166c48f4ccaf1e1a904c8c1f71615","l":["Body-Print-of-Mary - 011202025","Sonia Landy Sheridan","1974","Textile"]}]},"joan-shogren":{"n":"Joan Shogren","nc":"美国","ne":"American","b":"1932","d":"2020","i":"琼·肖格伦于1963年在圣何塞州立大学发起了促成有记录以来最早的计算机生成艺术公开展览的项目，为计算机艺术从纯技术领域向公众视野的扩展作出了重要贡献。","bi":"琼·肖格伦1932年7月5日生于华盛顿州芒特弗农，在圣何塞州立大学学习化学，1950年代初毕业后留校担任秘书。1963年发起了一个项目，促成了有记录以来最早的计算机生成艺术公开展览，为计算机艺术进入公众视野作出了重要贡献。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/ClickArt_Personal_Graphics_for_the_Macintosh_Joan_Shogren_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805273&s=421dc020bb6a2410082d26516459b9fe","l":["ClickArt Personal Graphics for the Macintosh","Joan Shogren","1984","Algorithm/Software"]}]},"john-f-simon-jr":{"n":"John F. Simon Jr.","nc":"美国","ne":"American","b":"1997","d":"2021","i":"小约翰·F·西蒙以定制软件创作数字作品，探索代码、色彩与形式之间的关系，作品随时间演化，反映了他对数字系统如何在时间中展开的持续兴趣。","bi":"小约翰·F·西蒙1963年生于路易斯安那州什里夫波特，在布朗大学学习地质学和美术，1985年获学士学位，后获地球与行星科学硕士学位及纽约大学互动电信项目硕士学位。以定制软件创作数字作品，探索代码、色彩与形式之间的关系，作品随时间演化，反映了他对数字系统如何在时间中展开的持续兴趣。","aw":[]},"wayne-slawson":{"n":"Wayne Slawson","nc":"美国","ne":"American","b":"1932","d":"2022","i":"韦恩·斯劳森是美国作曲家和理论家，1960年代的实验使他成为最早将数字计算机用作音乐乐器的人之一，开发了探索音色感知与合成音乐新语言的工具。","bi":"韦恩·斯劳森1932年生于底特律，在密歇根大学学习数学和作曲，获学士和硕士学位，后获心理学博士学位。1960年代的实验使他成为最早将数字计算机用作音乐乐器的人之一，开发了探索音色感知与合成音乐新语言的工具，为计算机音乐的理论与实践发展作出了重要贡献。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Voice_of_the_Computer_Max_Vernon_Mathews_Jean-Claude_Raoul_Olivier_Risset_James_Tenney_Wayne_Slawson_Roger_Newland_Shepard_John_Robinson_Pierce_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058676&s=9a12a9ebf5941ff34860ed9773d3f2f2","l":["Multiple Artists","1970"]}]},"travess-smalley":{"n":"Travess Smalley","nc":"美国","ne":"American","b":"1986","d":"","i":"特拉维斯·斯莫利通过绘图、扫描、编码、打印和再数字化的循环进行创作，每个阶段都产生图像的新变体，汲取了版画、绘画和软件的传统。","bi":"特拉维斯·斯莫利1986年生于西弗吉尼亚州亨廷顿，是驻罗德岛沃威克的艺术家兼教育者，在弗吉尼亚联邦大学学习绘画。通过绘图、扫描、编码、打印和再数字化的循环进行创作，每个阶段都产生图像的新变体，汲取版画、绘画和软件的传统，发展出在数字与物质过程之间持续往返的独特实践。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Crawl_MULTI_LEVEL484319_Travess_Smalley_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058809&s=71f5bf9e48d15b2f5a7affbeb5f6ab66","l":["Crawl MULTI LEVEL484319","Travess Smalley","2024"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/06_05_25_Pixel_Rug_01_Travess_Smalley_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803559&s=a5c7a9bb398a2edee36cf8856c30844c","l":["06 05 25 Pixel Rug 01","Travess Smalley","2025","NFT/Digital"]},{"s":"https://ragnar-digi 算机由保罗·安东尼·文森特等人领导，在格拉斯哥大学与巴尔-斯特劳德有限公司合作下，于1958至1963年间建造，是苏格兰第一台固态小型计算机。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/A_Small_Computer_Plays_Some_Examples_of_Mozarts_Dice-Composition_Music_Solidac_Experimental_Computer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059219&s=828b77f03d6d5733ed35901dabe7b4a8","l":["A Small Plays Some Examples of Mozarts Dice-Composition Music","Solidac Experimental Computer"]}]},"cornelia-sollfrank":{"n":"Cornelia Sollfrank","nc":"德国","ne":"German","b":"2006","d":"2007","i":"科内利亚·索尔弗兰克是驻柏林的艺术家和网络女性主义者，通过《女性网络延伸》等项目挑战数字文化中的作者身份、版权和权力关系，以批判性艺术实践探索网络文化的政治。","bi":"科内利亚·索尔弗兰克1960年生于德国费勒斯哈默，在慕尼黑美术学院学习绘画，后以优异成绩在汉堡美术学院完成学业。是驻柏林的艺术家和网络女性主义者，通过《女性网络延伸》等项目挑战数字文化中的作者身份、版权和权力关系，以批判性艺术实践探索网络文化的政治。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/OG_flowers_13_Cornelia_Sollfrank_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058881&s=5c9f650a705e13de0996358db99d7b00","l":["OG flowers 13","Cornelia Sollfrank","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/OG_flowers_68_Cornelia_Sollfrank_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059099&s=b6ad3a8a81f0d6831391e945c1dbcd12","l":["OG flowers 68","Cornelia Sollfrank","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/OG_flowers_15_Cornelia_Sollfrank_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059102&s=2cc074e023d045e9a64b0bae73c087e8","l":["OG flowers 15","Cornelia Sollfrank","2010","NFT/Digital"]}]},"charlotte-sommer-landgraf":{"n":"Charlotte Sommer-Landgraf","nc":"德国","ne":"German","b":"1924","d":"2021","i":"夏洛特·索默-兰德格拉夫是德国雕塑家，其实践在传统形式与新技术之间流畅游走，从大型公共作品延伸至早期计算机艺术实验，将数字工具引入雕塑探索。","bi":"夏洛特·索默-兰德格拉夫1924年生于德国德累斯顿，在战争和社会动荡的时代成长，1947年高中毕业后开始学习艺术。发展出在传统雕塑形式与新技术之间游走的实践，从大型公共作品延伸至早期计算机艺术实验，将数字工具引入雕塑创作。","aw":[]},"chino-soria":{"n":"Chino Soria","nc":"阿根廷","ne":"Argentinian","b":"1964","d":"","i":"奇诺·索里亚构建反思不稳定、生存与转变主题的雕塑与数字作品，以建筑训练为基础，建立既扎根于物质现实又探索数字可能的视觉系统。","bi":"奇诺·索里亚1964年生于布宜诺斯艾利斯，在布宜诺斯艾利斯大学学习建筑，现在伦敦、洛杉矶和布宜诺斯艾利斯之间生活和工作。以建筑训练为基础，构建反思不稳定、生存与转变主题的雕塑与数字作品，发展出既扎根于物质现实又探索数字可能的视觉系统。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Abstract_Digital_Animation_Chino_Soria_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801569&s=141bfc76c5c05586143ba3b98c485cff","l":["Abstract Digital Animation","Chino Soria","2000","Print"]}]},"marcelo-soria-rodriguez":{"n":"Marcelo Soria-Rodriguez","nc":"西班牙","ne":"Spanish","b":"1977","d":"","i":"马塞洛·索里亚-罗德里格斯是驻马德里的艺术家，实践横跨生成艺术、绘画、音乐和摄影，探索人类与技术不断演变的关系，以电信工程和信号处理训练为基础在算法系统与人类表达之间寻求平衡。","bi":"马塞洛·索里亚-罗德里格斯1977年生于西班牙阿尔梅里亚，是驻马德里的艺术家兼策略师，在西班牙学习电信工程和信号处理。以技术背景发展出横跨生成艺术、绘画、音乐和摄影的创作实践，探索人类与技术不断演变的关系，在算法系统与人类表达之间寻求平衡。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Toccata_228_Marcelo_Soria-Rodriguez_Andreas_Rau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058678&s=be945d3997e5cc4566a878c45d672f07","l":["Marcelo Soria-Rodriguez / Andreas Rau"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/entretiempos_470_Marcelo_Soria-Rodriguez_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059190&s=c588a63ffb591b6153d9aa36d901cbb5","l":["entretiempos 470","Marcelo Soria-Rodriguez","2022"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Toccata_141_Marcelo_Soria-Rodriguez_Andreas_Rau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059302&s=b7f9485c8c052824712b848c74ed2d73","l":["Marcelo Soria-Rodriguez / Andreas Rau"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Toccata_83_Marcelo_Soria-Rodriguez_Andreas_Rau_11102025.p 0744190924fb43f32ba5f","l":["The Expanding Universe 2018 reissue","Laurie Spiegel"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/donnie-and-laurie_120520205_spiegel.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975604&s=9e5c1410c263d88196b52bb4abe8654c","l":["Laurie Spiegel / Don Christensen"]}]},"norton-starr":{"n":"Norton Starr","nc":"美国","ne":"American","b":"1936","d":"2025","i":"诺顿·斯塔尔是数学家，1970年代初开始使用计算机图形，以编程和绘图仪系统生成数学结构的视觉表达，是最早在学术数学背景中探索计算机图形美学可能的人之一。","bi":"诺顿·斯塔尔1936年生于密苏里州堪萨斯城，在哈佛大学学习数学获文学学士学位，后在麻省理工学院获得博士学位。1970年代初开始使用计算机图形，以编程和绘图仪系统生成数学结构的视觉表达，是最早在学术数学背景中探索计算机图形美学可能的人之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/archimedes-spiral_norton-star_2022222025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763859104&s=d6e155e79190d9406598c847245d8022","l":["archimedes-spiral -star 2022222025","Norton Starr","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/k-43_norton-star_20222025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763859318&s=e11779609b35f19a64e17b644d860cad","l":["k-43 -star","Norton Starr","1973","Print"]}]},"john-stehura":{"n":"John Stehura","nc":"美国","ne":"American","b":"1952","d":"2023","i":"约翰·斯特胡拉创作了最早的计算机动画电影之一，以代码探索机器如何生成视觉形式，1960至1965年间制作的《控制论5.3》是计算机动画史上的早期里程碑。","bi":"约翰·斯特胡拉1943年生，1961年在UCLA学习计算机编程，在博尔特大厅的IBM系统和圣莫尼卡学院工作。以代码探索机器如何生成视觉形式，1960至1965年间制作的《控制论5.3》是计算机动画史上的早期里程碑，展示了算法系统产生有机视觉形式的可能性。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cibernetik_5.3_John_Stehura_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805007&s=d334836e2499dbfe0c8bb2e5286f4c00","l":["Cibernetik 5.3","John Stehura","1960-1965"]}]},"george-stibitz":{"n":"George Stibitz","nc":"美国","ne":"American","b":"1904","d":"1995","i":"乔治·斯蒂比茨是开创性的美国发明家，1937年用电话继电器建造了第一台数字计算机，1940年著名地演示了远程计算，是现代计算史上的重要里程碑。","bi":"乔治·罗伯特·斯蒂比茨1904年4月20日生于宾夕法尼亚州约克，童年对事物的工作原理充满好奇。在贝尔电话实验室工作期间，1937年在家用电话继电器、电灯泡、金属条和纸板建造了第一台数字计算机模型（后称「Model K」）。1940年著名地演示了远程计算——通过电传打字机从纽约远程操控贝尔实验室的机器，标志着现代计算史的重要里程碑。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Johnny_Von_Neuman_George_Stibitz_11192025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763584956&s=1ee14a2627a7359c12cf1e4bf87cd70f","l":["Johnny Von Neuman","George Stibitz","1988","Photocopy"]}]},"robert-stoiber":{"n":"Robert  Stoiber","nc":"德国","ne":"German","b":"1976","d":"","i":"罗伯特·斯托伊贝尔是驻慕尼黑的艺术家，其在赖纳·施尼伯格计算机图形项目中的作品在1970年代末至1980年代初赢得了广泛认可。","bi":"罗伯特·斯托伊贝尔是驻慕尼黑的艺术家，活跃于1970年代末至1980年代初，在慕尼黑大学计算机图形项目中工作，作品在重要出版物中得到收录，赢得了对早期计算机艺术的广泛认可。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sechs_Computergrafiken_six_computer_graphics_Portfolio_Christian_Cavadia_Friedrich_Lu%CC%88bbecke_Robert_Stoiber_Fromund_Kloppe_Wolfgang_Beyer_11102025_2026-03-21-021322_mmvb.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059202&s=9d9ed5db3708a4f149913676fb77cba2","l":["Multiple Artists","1980","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Pink_arrow_tessellation_Robert_Stoiber_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805412&s=034d216d2fd388b4a41ee889538881a9","l":["Pink arrow tessellation","Robert  Stoiber","1980","Print"]}]},"rolling-stone":{"n":"Rolling Stone","nc":"美国","ne":"American","b":"1967","d":"","i":"《滚石》杂志1967年在旧金山创办，以严肃的新闻报道关注音乐驱动的文化变革，1968年对《控制论的奇缘》展览进行了具有开创意义的媒体报道，将计算机艺术引入更广泛的反文化读者群。","bi":"《滚石》杂志1967年由记者简·温纳和爵士评论家拉尔夫·J·格利森创办于旧金山，以音乐为文化变革的核心进行严肃的新闻报道，迅速成为反文化运动的重要声音。1968年对《控制论的奇缘》展览进行了具有开创意义的媒体报道，将计算机艺术引入了更广泛的反文化读者群。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rolling_Stone_February_1_1969_Rolling_Stone_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059052&s=87a775ee48a8dc70e0617026c9cf9713","l":["February 1 1969","Rolling Stone","1969","Ephemera"]}]},"kerry-strand":{"n":"Kerry Strand","nc":"美国","ne":"American","b":"1940","d":"","i":"克里·斯特兰德是计算机生成艺术的先驱，以工程和编程技能创作由算法规则驱动的图像，探索规则系统产生的视觉复杂性，是CalComp支持的重要早期数字艺术家之一。","bi":"克里·斯特兰德1940年生，是美国计算机生成艺术先驱，在华盛顿大学学习工程和物理。以算法规则驱动的图像创作专注于探索规则系统产生的视觉复杂性，受到CalComp公司支持，作品出现在《控制论的奇缘》等里程碑展览中。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Snail_Kerry_Strand_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804987&s=638df6a21e0ca9c2f1cc86881a6d746b","l":["The Snail","Kerry Strand","1968","Print"]}]},"gerald-strang":{"n":"Gerald Strang","nc":"美国/加拿大","ne":"American/Canadian","b":"1908","d":"1983","i":"杰拉尔德·斯特朗是作曲家和教育者，创作从早期现代主义音乐演变为开创性的电子和计算机作品，受阿诺德·勋伯格影响，将先锋精神延伸至数字音乐的早期探索。","bi":"杰拉尔德·斯特朗1908年生于加拿大艾伯塔省，在美国接受音乐教育，深受阿诺德·勋伯格影响，将先锋精神延伸至创作实践。创作从早期现代主义音乐演变为开创性的电子和计算机作品，成为20世纪先锋音乐与早期数字音乐探索之间的重要桥梁。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]}]},"peter-struycken":{"n":"Peter Struycken","nc":"荷兰","ne":"Dutch","b":"1939","d":"","i":"彼得·斯特鲁肯是荷兰艺术家，以程序化系统探索色彩与形式随时间和空间的演化，自1960年代末将计算机应用于绘画和公共设计，包括为荷兰邮政系统创作的标志性作品。","bi":"彼得·斯特鲁肯1939年生于海牙，至今仍定居于此，在海牙皇家艺术学院学习。1960年代末开始以程序化系统探索色彩与形式随时间和空间的演化，是最早将计算机系统性应用于艺术创作的荷兰艺术家之一，并为荷兰邮政系统创作了标志性的公共设计作品。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Vormgeving_en_Exacte_Discipline_%E2%80%93_1_jaar_Peter_Struycken_aan_de_Rijksuniversiteit_Utrecht_Peter_Struycken_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801633&s=1a8e22c791565dc0da06299803f5c634","l":["Vormgeving en Exacte Discipline %E2%80%93 1 jaar aan de Rijksuniversiteit Utrecht","Peter Struycken","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Hoek_II_Corner_II_Peter_Struycken_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058696&s=3498c63bd8cc9ff3dbff1796e9a97a2f","l":["Hoek II Corner II","Peter Struycken","1977","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Plotter_Peter_Struycken_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804288&s=a0edc77db1a0f1fba465f3a194284b75","l":["Untitled Plotter","Peter Struycken","1980","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plyons_Peter_Struycken_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801708&s=7cf06fe2aafcea250bc1a7282029c83f","l":["Plyons","Peter Struycken","1983","Book"]}]},"morton-subotnick":{"n":"Morton Subotnick","nc":"美国","ne":"American","b":"1933","d":"","i":"莫顿·苏博特尼克通过《月亮的银苹果》等作品改变了电子音乐——这是第一部专为唱片公司委托创作的长篇电子作品，标志着电子音乐作为独立艺术形式走向大众市场的历史时刻。","bi":"莫顿·苏博特尼克1933年生于洛杉矶，在丹佛大学和朱莉亚音乐学院学习古典音乐，对传统之外的声音世界充满好奇。1967年创作了《月亮的银苹果》——第一部专为唱片公司委托创作的长篇电子作品，标志着电子音乐作为独立艺术形式走向大众市场的历史时刻，成为电子音乐史上不可绕过的先驱人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Touch_Morton_Subotnick_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804993&s=94d9534c2e4b9b4bb7e3af0c00e8cd50","l":["Touch","Morton Subotnick","1969"]}]},"julian-sullivan":{"n":"Julian Sullivan","nc":"英国","ne":"British","b":"1938","d":"1093","i":"朱利安·沙利文是英国艺术家、版画家和工程师，其工作为英国计算机艺术的早期发展作出了贡献，在斯莱德艺术学院等机构将工程专业知识与艺术实践相融合。","bi":"朱利安·沙利文是英国艺术家、版画家和工程师，与英国计算机艺术的早期发展相关联，原本接受工程师培训，后将工程专业知识与艺术实践相融合，在斯莱德艺术学院等机构探索计算机在艺术创作中的应用。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/H18799-L422756655_original.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975562&s=c9873bed11cdb6b2ea9e97b97c527b74","l":["Multiple Artists","1978","Book"]}]},"lloyd-sumner":{"n":"Lloyd Sumner","nc":"美国","ne":"American","b":"1943","d":"1996","i":"劳埃德·萨姆纳是计算机生成艺术的早期先驱，以定制编程创作以数学原理驱动的精确优雅绘图仪绘图，探索算法系统如何在精确约束下产生视觉美感。","bi":"劳埃德·萨姆纳1943年生，在弗吉尼亚大学学习侧重艺术的工程，将工程技术与艺术兴趣相融合，开发定制编程创作以数学原理驱动的精确绘图仪绘图，是最早系统探索算法系统如何在精确约束下产生视觉美感的计算机艺术家之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sole_of_Star_Lloyd_Sumner_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805529&s=31a92ed8e09eec92cc35532225a3b969","l":["Sole of Star","Lloyd Sumner","1967","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_and_the_Human_Response_Lloyd_Sumner_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805078&s=0ecf4376bcaead44c234b5c34f2e573b","l":["Computer Art and the Human Response","Lloyd Sumner","1968","Book"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Designs_of_the_Free_Lloyd_Sumner_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805187&s=798b94b0419f188d12e840435ed2babc","l":["Designs of the Free","Lloyd Sumner","1968","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/A_Tree_for_Sharing_Lloyd_Sumner_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805653&s=21afb41b181064d87c4a4fd8ffb102fe","l":["A Tree for Sharing","Lloyd Sumner","1969","Plotter Drawing"]}]},"joel-swartz":{"n":"Joel Swartz","nc":"美国","ne":"American","b":"1944","d":"","i":"乔尔·施瓦茨是最早以施乐技术作为创作媒介的艺术家之一，将摄影、绘图和文字组合成层叠构图，探索复制技术作为艺术媒介的可能性。","bi":"乔尔·施瓦茨1944年生于纽约州罗彻斯特，在罗彻斯特理工学院获美术学士学位，后获美术硕士学位。以施乐技术作为创作媒介，将摄影、绘图和文字组合成层叠构图，是最早探索复制技术作为艺术媒介可能性的艺术家之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Two-Tone_Joel_Swartz_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805029&s=d631204fe6c173e07b6cb43ef4553d14","l":["Two-Tone","Joel Swartz","1969","Photocopy"]}]},"zdenk-skora":{"n":"Zdeněk Sýkora","nc":"捷克","ne":"Czech","b":"1920","d":"2011","i":"泽德内克·西科拉是捷克画家，创作从战后风景画演变为最早的计算机辅助抽象作品之一，探索随机生成模式的系统秩序与精心规划的视觉形式之间的张力。","bi":"泽德内克·西科拉1920年生于捷克斯洛伐克卢尼，在那里生活和工作了一生，二战后在布拉格进行艺术教育研究，发展出从战后风景画演变为最早计算机辅助抽象作品之一的创作轨迹。与数学家约日·布拉赫特合作，探索随机生成模式的系统秩序与精心规划的视觉形式之间的张力。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Red-Blue_Structure_Zdene%CC%8Ck_Sy%CC%81kora_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805016&s=b60550cdc41adaebbe92e3324cf8a403","l":["Red-Blue Structure Zdene%CC%8Ck Sy%CC%81kora","Zdeněk Sýkora","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_2_from_Folgende_Folge_aus_dem_Tschechischem_Zdene%CC%8Ck_Sy%CC%81kora_11102025_2026-03-21-021542_likq.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059342&s=66e191ca1e3c15a140f9e18d9b141e25","l":["Untitled 2 from Folgende Folge aus dem Tschechischem Zdene%CC%8Ck Sy%CC%81kora","Zdeněk Sýkora","1969","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_1_from_Folgende_Folge_aus_dem_Tschechischem_Zdene%CC%8Ck_Sy%CC%81kora_11102025_2026-03-21-021726_yzpw.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059446&s=f4ab4fd8142d0dddf49cbcb05ce25325","l":["Untitled 1 from Folgende Folge aus dem Tschechischem Zdene%CC%8Ck Sy%CC%81kora","Zdeněk Sýkora","1969","Print"]},{"s":"https://ra ":"Shunsuke Takawo","nc":"日本","ne":"Japanese","b":"1981","d":"","i":"高尾俊介是日本艺术家、创意程序员和教育者，创作横跨摄影、生成系统和日常编程作为诗意实践，是「每日编程」社区的重要声音，将代码编写转化为一种冥想和探索的日常仪式。","bi":"高尾俊介1981年生于日本，是艺术家、创意程序员和教育者，在九州产业大学学习摄影。发展出横跨摄影、生成系统和日常编程作为诗意实践的创作体系，是「每日编程」社区的重要声音，将代码编写转化为一种冥想和探索的日常仪式。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Marching_Resonances_36_Shunsuke_Takawo_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059101&s=90430d43dc25719960015b89827be6ba","l":["Marching Resonances 36","Shunsuke Takawo","2023","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Flows_of_Pattern_42_Shunsuke_Takawo_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058823&s=aa8ba6a920effe09efda43608b0d190c","l":["Flows of Pattern 42","Shunsuke Takawo","2024","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Flows_of_Pattern_36_Shunsuke_Takawo_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059230&s=94bf8b777e02d6d2e844233d56423c08","l":["Flows of Pattern 36","Shunsuke Takawo","2024","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Flows_of_Pattern_44_Shunsuke_Takawo_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059512&s=51572b383c82431d50d1b253a0171045","l":["Flows of Pattern 44","Shunsuke Takawo","2024","NFT/Digital"]}]},"kazuhiro-tanimoto":{"n":"Kazuhiro Tanimoto","nc":"日本","ne":"Japanese","b":"1983","d":"","i":"谷本和博将对计算机的终生热情与科学背景相结合，创作探索数字系统中隐藏图案与微妙美感的生成艺术，以代码构建在精确性与有机复杂性之间取得平衡的视觉世界。","bi":"谷本和博1983年生于日本，十岁时见到Macintosh LC 520后对计算机产生浓厚兴趣，将终生热情与科学背景相结合，发展出创作探索数字系统中隐藏图案与微妙美感的生成艺术实践，以代码构建在精确性与有机复杂性之间取得平衡的视觉世界。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Memories_of_Digital_Data_166_Kazuhiro_Tanimoto_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059055&s=eb6159a6c77b0ec63a2e171f30abbcde","l":["Memories of Digital Data 166","Kazuhiro Tanimoto"]}]},"jared-tarbell":{"n":"Jared Tarbell","nc":"美国","ne":"American","b":"1973","d":"","i":"贾里德·塔贝尔是将算法精确性与有机视觉形式相融合的生成艺术家兼程序员，作为Etsy的联合创始人在商业技术领域产生了重要影响，同时以数学、自然与数字艺术的交汇探索生成创作的边界。","bi":"贾里德·S·塔贝尔是以数学、自然与数字艺术交汇著称的生成艺术家、程序员和企业家，以Processing为工具探索算法系统的视觉可能，创作了一系列受自然形态启发的生成作品，同时作为Etsy的联合创始人在商业技术领域产生了重要影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ray_Marching_the_Full_Moon_September_17_2024_Jared_Tarbell_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059216&s=31473b677ae3db06efc089fa0ca71701","l":["Ray Marching the Full Moon September 17 2024","Jared Tarbell"]}]},"ivona-tau":{"n":"Ivona Tau","nc":"立陶宛","ne":"Lithuanian","b":"1990","d":"","i":"伊沃娜·陶是一位生成艺术家，将模拟摄影与人工智能相融合，探索记忆、情感与机器制造图像的诗意，以数学博士背景将算法严谨性与感性的视觉探索相结合。","bi":"伊沃娜·陶1990年生于立陶宛维尔纽斯，在华沙大学学习数学获学士和硕士学位，后在维尔纽斯大学和波兰科学院完成数学博士学位。以数学博士背景将算法严谨性与感性的视觉探索相结合，将模拟摄影与人工智能相融合，创作探索记忆、情感与机器制造图像诗意的生成艺术作品。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mythic_Latent_Glitches_172_Ivona_Tau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059195&s=d3be7cc3400741d8a0b89a2bfc30b496","l":["Mythic Latent Glitches 172","Ivona Tau","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mythic_Latent_Glitches_150_Ivona_Tau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059353&s=e423836f2a85dd2e317408df60ef843e","l":["Mythic Latent Glitches 150","Ivona Tau","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mythic_Latent_Glitches_198_Ivona_Tau_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059445&s=c197a842506153f3b2477b99481280fe","l":["Mythic Latent Glitches 198","Ivona Tau","2022","NFT/Digital e Artists","1970"]}]},"time-inc":{"n":"Time Inc.","nc":"美国","ne":"American","b":"1983","d":"","i":"1983年1月，《时代》杂志将个人计算机评选为「年度机器」，这是该头衔首次颁给非人类，成为计算机从技术工具向文化现象转变的标志性文化时刻。","bi":"《时代》杂志是美国发行量最广的新闻周刊之一，以一年一度的「年度人物」评选塑造公众舆论而著称。1983年1月，编辑们做出了历史性的决定，将个人计算机评选为「年度机器」——这是该头衔首次颁给非人类，成为计算机从技术工具向文化现象转变的标志性文化时刻。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Time_-_Machine_of_the_Year_The_Computer_Moves_In_Jan_3_1983_Time_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059526&s=c0094eb9e2d97dec3425473532b71669","l":["Machine of the Year The Computer Moves In Jan 3 1983","Time Inc.","1983","Ephemera"]}]},"tokico-armstar-painting-robot":{"n":"Tokico ARMSTAR Painting Robot","nc":"日本","ne":"Japanese","b":"1255","d":"","i":"Tokico ARMSTAR绘画机器人由Tokico有限公司开发，是1982年诺克斯维尔世博会日本馆的核心展品，展示了机器人技术在创意应用方面的前沿可能，将机械精确性与绘画行为相结合。","bi":"Tokico ARMSTAR绘画机器人由专注于液压、汽车系统和自动化的日本工程公司Tokico有限公司开发，在1982年田纳西州诺克斯维尔世博会日本馆作为核心展品亮相，展示了机器人技术在创意应用方面的前沿可能，将机械精确性与绘画行为相结合，成为那个时代技术与艺术交汇的象征性展示。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Kanji_%E6%97%A5%E6%9C%AC_Japan_Tokico_ARMSTAR_Painting_Robot_11102025_2026-03-21-020432_zzfp.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058672&s=3fb45c144eff652128a147b8161edd28","l":["Kanji %E6%97%A5%E6%9C%AC Japan","Tokico ARMSTAR Painting Robot","1982","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/1982_Worlds_Fair_Japanese_Pavilion_Painting_Robot_Tokico_ARMSTAR_Painting_Robot_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059130&s=9e40acb64ae18ecb752b8e984ed94b9e","l":["1982 Worlds Fair Japanese Pavilion","Tokico ARMSTAR Painting Robot","1982","Machine/Robot Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Crescent_Moon_Face_Tokico_ARMSTAR_Painting_Robot_11102025.jpg?w=400&q=80&auto=format&fit=crop& "sidi-vanetti":{"n":"Sidi Vanetti","nc":"瑞士","ne":"aka ertdfgcvb","b":"1975","d":"","i":"西迪·瓦内蒂（笔名ertdfgcvb）与安德里亚斯·吉辛组成瑞士艺术家二人组，通过代码、设计和视觉实验探索现有硬件的创作可能性，以废弃显示器和技术元件创作将日常物件重新想象为动态视觉系统的装置。","bi":"西迪·瓦内蒂1975年生于瑞士提契诺州并定居于此，是设计师兼艺术家，其作品融合概念严谨性与对材料的游戏性探索。与安德里亚斯·吉辛长期合作，以废弃显示器和技术元件创作装置，不改变材料的原始形态，将日常物件重新想象为动态视觉系统。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Recursive_Tile_20_Andreas_Gysin_Sidi_Vanetti_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058779&s=5b4c6c8a2f37f4405ffbb7cc9aaef3dd","l":["Andreas Gysin / Sidi Vanetti"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Wayfinder_128_Andreas_Gysin_Sidi_Vanetti_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059411&s=b217d81d665800993a62d960ae0a0f41","l":["Andreas Gysin / Sidi Vanetti","2023"]}]},"various-artists":{"n":"Various Artists","nc":"多位艺术家","ne":"","b":"1982","d":"","i":"由多位艺术家共同参与创作或展示的计算机音乐作品，呈现了1970至1980年代计算机音乐实验的群体面貌。","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/computer-music_11192025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763584813&s=26de88a36df056e1d4f3d76a3fa53ea6","l":["computer-music","Various Artists","1978"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer-Musik_Vertonung_im_Zeitalter_der_Proze%C3%9Frechner_Sound_in_the_Age_of_the_Micro-processor_Various_Artists_11102025_2026-03-21-021119_gktd.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059079&s=3aab7c5ec83ee5a8ce6c0f4f404cff91","l":["Computer-Musik Vertonung im Zeitalter der Proze%C3%9Frechner Sound in the Age of the Micro-processor","Various Artists"]}]},"jeanpierre-vasarely":{"n":"Jean‑Pierre Vasarely","nc":"法国","ne":"aka Yvaral","b":"1934","d":"2002","i":"让-皮埃尔·瓦萨雷利（笔名Yvaral）是发展「数字艺术」的艺术家，将算法、网格和计算机过程引入Op Art传统，延伸和重新阐释了父亲维克多·瓦萨雷利开创的视觉语言。","bi":"让-皮埃尔·瓦萨 erre","Jean‑Pierre Vasarely","1981","Print"]}]},"iskra-velitchkova":{"n":"Iskra Velitchkova","nc":"保加利亚","ne":"Bulgarian","b":"1988","d":"","i":"伊斯克拉·维利奇科娃是生成艺术家，其作品在算法与实体材料之间游走，融合数字系统与手绘形态、声音和纺织品，探索计算与感官体验的交汇。","bi":"伊斯克拉·维利奇科娃1988年生于保加利亚，现在马德里生活和工作，是自学成才的艺术家，拥有扎实的技术和人工智能基础。作品在算法与实体材料之间游走，融合数字系统与手绘形态、声音和纺织品，探索计算与感官体验的交汇，发展出在数字精确性与手工温度之间寻求平衡的独特创作语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Uninhabitable_3_Iskra_Velitchkova_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058723&s=41d66efe9dbbef4bed54dbf4624ea939","l":["Uninhabitable 3","Iskra Velitchkova","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Uninhabitable_76_Iskra_Velitchkova_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058897&s=769beb80eaf6b0814418f90353ca0515","l":["Uninhabitable 76","Iskra Velitchkova","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Uninhabitable_148_Iskra_Velitchkova_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059233&s=295934209779fec364fa0442648e1b7d","l":["Uninhabitable 148","Iskra Velitchkova","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/horizontes_63_Iskra_Velitchkova_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059219&s=caf495f9f43006a2b55cd92851f91717","l":["horizontes 63","Iskra Velitchkova","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/horizontes_207_Iskra_Velitchkova_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059230&s=75ac3953e43bc635cc199e4c216e9098","l":["horizontes 207","Iskra Velitchkova","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/horizontes_63_print_Iskra_Velitchk 人工智能研究的重要中心，对艺术与技术领域的系统思维产生了深远影响。","bi":"海因茨·冯·福尔斯特1911年生于奥地利，在维也纳技术大学学习物理，在布雷斯劳大学完成理论物理博士学位。在伊利诺伊大学创立的生物计算机实验室成为控制论、认知科学和人工智能研究的重要中心，其工作对艺术与技术领域的系统思维产生了深远影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]}]},"gerhard-friedrich-wilhelm-von-graevenitz":{"n":"Gerhard Friedrich Wilhelm von Graevenitz","nc":"德国","ne":"German","b":"1934","d":"1983","i":"格哈德·冯·格雷芬尼茨是德国艺术家和动力与生成艺术先驱，以系统、运动和偶然性挑战视觉感知，将数学秩序与视觉动态相融合，是德国具体艺术和运动艺术史上的重要人物。","bi":"格哈德·弗里德里希·威廉·冯·格雷芬尼茨1934年生于德国，是五兄妹中最小的，有一个双胞胎妹妹，先学经济学后转向艺术。以系统、运动和偶然性挑战视觉感知，将数学秩序与视觉动态相融合，发展出以机械运动和程序化过程为核心的创作实践，是德国具体艺术和运动艺术史上的重要人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_plotter_Gerhard_Friedrich_Wilhelm_von_Graeventiz_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059459&s=8929c76997f70a83cd4176979784611a","l":["Untitled plotter Graeventiz","Gerhard Friedrich Wilhelm von Graevenitz","1969","Plotter Drawing"]}]},"kurt-vonnegut":{"n":"Kurt Vonnegut","nc":"美国","ne":"American","b":"1922","d":"2007","i":"库尔特·冯内古特是作家，以黑色幽默和讽刺探讨复杂的社会与伦理问题，小说、戏剧和素描追问科技、战争与人性，是20世纪美国文学史上最具影响力的声音之一。","bi":"库尔特·冯内古特1922年生于印第安纳州印第安纳波利斯，在康奈尔大学开始生物化学学业，服役并经历德累斯顿大轰炸后以这段经历为素材创作了最重要的反战小说《第五号屠宰场》。以黑色幽默和讽刺探讨科技、战争与人性的复杂性，是20世纪美国文学史上最具影响力的声音之一，其素描和文字延伸了对人类状况的持续审视。","aw":[]},"lars-wander":{"n":"Lars Wander","nc":"德国","ne":"German","b":"0129","d":"","i":"拉尔斯·万德是德国艺术家兼程序员，将算法系统转化为视觉与实体艺术作品，以算法过程的严谨探索为定义，将代码与实体媒介相融合。","bi":"拉尔斯·万德是来自德国、现驻纽约的计算机艺术家兼程序员，创作历程始于年少时期的绘图，后发展出将算法系统转化为视觉与实体艺术作品的实践，将代码与实体媒介相融合，以算法过程的严谨探索定义其独特的创作语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/a 生成艺术的形成中发挥了重要作用，作为1966年创立的计算机技术小组（CTG）的创始成员将航空工程专业知识引入艺术探索，成为早期日本计算机艺术群体的重要成员。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Return_to_Square_Masao_Kohmura_Kunio_Yamanaka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058827&s=bee27b1039cfca44b6c534b43cd20e35","l":["Masao Kohmura / Kunio Yamanaka","1968","Print"]}]},"hasaqui-yamanobe":{"n":"Hasaqui Yamanobe","nc":"日本","ne":"Japanese","b":"1982","d":"","i":"山野辺将传统绘图与编程和AI生成图像相结合，探索人类创造力与机器学习的交汇，在手工制作与数字生成之间寻求平衡，以两者的张力为创作能量。","bi":"山野辺1982年生，驻东京，将深厚的哲学基础与前瞻性的艺术方法相结合，结合传统绘图与编程和AI生成图像，探索人类创造力与机器学习的交汇，在手工制作与数字生成之间寻求平衡，发展出融合手绘质感与算法逻辑的独特视觉语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/basket_8Xf9L3v_Hasaqui_Yamanobe_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805402&s=05defec5b402ee9b796b9019c6524273","l":["basket 8Xf9L3v","Hasaqui Yamanobe","2024","NFT/Digital"]}]},"jos-mara-yturralde":{"n":"José María Yturralde","nc":"西班牙","ne":"Spanish","b":"1942","d":"","i":"何塞·马里亚·伊图拉尔德以精确的几何和科学概念探索时间、空间和无限性，专注于抽象形式与感知体验，通过程序性方法将数学严谨性与视觉诗意相融合。","bi":"何塞·马里亚·伊图拉尔德1942年生于西班牙昆卡，在巴伦西亚圣卡洛斯皇家美术学院学习，后在那里执教。以精确的几何和科学概念探索时间、空间和无限性，通过程序性方法将数学严谨性与视觉诗意相融合，是西班牙几何抽象与早期计算机艺术交汇处的重要人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Red_Pentagons_Jose%CC%81_Mari%CC%81a_Yturralde_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805533&s=21de6abef875e2538087f93c534e7b6e","l":["Red Pentagons %CC%81 Mari%CC%81a","José María Yturralde","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Impossible_Figure_red_and_ 059339&s=58d987b7592563ccbd0ab67c88a2a543","l":["A Bugged Forest 198 Michae%CC%88l","Michaël Zancan","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sunflowers_Michae%CC%88l_Zancan_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805571&s=03812dfe31b792a1e4415e98b6783d6c","l":["Sunflowers Michae%CC%88l","Michaël Zancan","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/A_Bugged_Forest_355_Michae%CC%88l_Zancan_11102025_2026-03-21-021822_nccw.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059502&s=1690bb8669c5f7a48559cbf8b134e6e2","l":["A Bugged Forest 355 Michae%CC%88l","Michaël Zancan","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/A_Bugged_Forest_154_Michae%CC%88l_Zancan_11102025_2026-03-21-021826_tlma.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059506&s=3d4211490e04635e99e43bbdcfbeb424","l":["A Bugged Forest 154 Michae%CC%88l","Michaël Zancan","2022","NFT/Digital"]}]},"vilko-iljak":{"n":"Vilko Žiljak","nc":"克罗地亚","ne":"Croatian","b":"2008","d":"","i":"维尔科·日利雅克从1970年开始创作计算机图形，将早期打印输出转化为将计算机视为发明伙伴的实验，是克罗地亚计算机艺术的先驱，融合编程与视觉探索留下了重要印记。","bi":"维尔科·日利雅克生于克罗地亚并在那里生活，在萨格勒布理学与数学学院学习实验物理学，后成为计算机科学教授。从1970年开始创作计算机图形，将早期打印输出转化为将计算机视为发明伙伴的实验，是克罗地亚计算机艺术的先驱，在东欧计算机艺术史上留下了重要印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/62-CM-24-MY-1975_Digital_Moment_in_Color_Vilko_Ziljak_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763726792&s=b55b532ef08ec0040904df04b5584a31","l":["62-CM-24-MY-1975 Digital Moment in Color","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/60-4-AC-1975_Digital_Moment_in_Color_Vilko_Ziljak_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763727027&s=2baa098913493922afa654afa60f6343","l":["60-4-AC-1975 Digital Moment in Color","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_1_Vilko_Ziljak_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058689&s=f58b040ba561f9b776e1b3ab2ca8f176","l":["Untitled 1","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_2_Vilko_Ziljak_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059084&s=b20162f4cf23b26d45a05980308d789d","l":["Untitled 2","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251118_155115.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763584530&s=0db69b4b608af2f8dd3280b5ea2166c4","l":["20251118 155115","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251118_155200.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763584690&s=f67466491f38a0c2e923bb7b98e48b14","l":["20251118 155200","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251118_155054.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763585140&s=6675f430649798ef24002c5a6a4d4f96","l":["20251118 155054","Vilko Žiljak","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251118_155044.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763585192&s=b6d54af9326be28a88156155fee2d044","l":["20251118 155044","Vilko Žiljak","1975","Print"]}]}};

function eraInfo(b) {
  var y = parseInt(b)||0;
  if (y <= 1969) return ['先驱期','pioneer'];
  if (y <= 1999) return ['数字化时代','digital'];
  return ['AI时代','ai'];
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildAwGrid(awList) {
  if (!awList || !awList.length) return '';
  var items = '';
  for (var i = 0; i < awList.length; i++) {
    var w = awList[i];
    var lines = w.l || [];
    var title = esc(lines[0] || '');
    var meta  = esc(lines.slice(1,3).join(' · '));
    var titleHtml = title ? '<div class="aw-title">' + title + '</div>' : '';
    var metaHtml  = meta  ? '<div class="aw-meta">'  + meta  + '</div>' : '';
    items += '<div class="aw-item">'
           + '<img src="' + esc(w.s) + '" alt="' + title + '" loading="lazy" onerror="this.style.opacity=0.1">'
           + '<div class="aw-lines">' + titleHtml + metaHtml + '</div>'
           + '</div>';
  }
  return '<section class="artworks">'
       + '<h2 class="slabel">艺 术 家 作 品</h2>'
       + '<div class="aw-grid">' + items + '</div>'
       + '</section>';
}

function buildBio(bioText) {
  if (!bioText) return '';
  var paras = bioText.split(/\n+/);
  var html = '';
  for (var i = 0; i < paras.length; i++) {
    var p = paras[i].trim();
    if (p) html += '<p>' + esc(p) + '</p>';
  }
  return html ? '<section class="bio"><h2 class="slabel">完 整 传 记</h2>' + html + '</section>' : '';
}

function render(slug) {
  var a = DB[slug];
  var app = document.getElementById('app');

  if (!a) {
    app.innerHTML = '<div class="not-found"><h2>艺术家未找到</h2><p><a href="/">返回档案首页</a></p></div>';
    return;
  }

  var eraArr = eraInfo(a.b);
  var eraZh = eraArr[0], eraEn = eraArr[1];
  var yr = a.b + (a.d ? '—' + a.d : '');

  var heroHtml = '<section class="hero">'
    + '<div class="eyebrow">'
    + '<span>' + esc(a.nc) + '</span>'
    + '<span>' + esc(yr) + '</span>'
    + '<span class="era-badge era-' + eraEn + '">' + eraZh + '</span>'
    + '</div>'
    + '<h1>' + esc(a.n) + '</h1>'
    + (a.i ? '<p class="intro">' + esc(a.i) + '</p>' : '')
    + '</section>';

  var bodyHtml = '<div class="body">'
    + buildBio(a.bi)
    + buildAwGrid(a.aw)
    + '</div>';

  var footHtml = '<div class="back-section"><a href="/" class="back-link">← 返回完整档案</a></div>';

  app.innerHTML = heroHtml + bodyHtml + footHtml;

  document.getElementById('pg-title').textContent = a.n + ' · 想象机器 · 数字艺术先驱档案';
  document.getElementById('pg-desc').setAttribute('content', (a.i||'').slice(0,160));
  document.getElementById('pg-canonical').setAttribute('href', 'https://gennexus.xyz/artists/' + slug + '/');
  document.title = a.n + ' · 想象机器 · 数字艺术先驱档案';
}

var parts = location.pathname.replace(/\/$/,'').split('/');
var slug = parts[parts.length-1];
render(slug);
</script>

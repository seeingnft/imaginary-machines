ard_Kammerer-Luka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805020&s=2a9f567b24eca3c7835bcb52ae81d207","l":["Calendrier permanent V","Gerhard Kammerer-Luka","1984","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Formes_En_Generation_portfolio_Gerhard_Kammerer-Luka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059421&s=b5a4642a9031bdd31d34de99feb79413","l":["Formes En Generation portfolio","Gerhard Kammerer-Luka","1984","Print"]}]},"g-braun-karlsruhe":{"n":"G. Braun Karlsruhe","nc":"","ne":"","b":"1971","d":"","i":"Uber Musik and Zum Computer \n\nHerbert Brün / G. Braun Karlsruhe \n\n1971 \nMusic/Sound","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Uber_Musik_and_Zum_Computer_Herbert_Bru%CC%88n_G._Braun_Karlsruhe_11102025_2026-03-21-021549_sjea.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059349&s=e094fbcad9ec3882117aa84a011efa07","l":["Herbert Brün / G. Braun Karlsruhe"]}]},"yoichiro-kawaguchi":{"n":"Yoichiro Kawaguchi","nc":"日本","ne":"Japanese","b":"1952","d":"","i":"川口吉弘是日本艺术家，以计算机图形学模拟人工生命，创作出看似能够生长、分裂和进化的数字生命体，以算法与元球想象从深海和生命演化汲取灵感的有机形态。","bi":"川口吉弘1952年生于日本种子岛，1976年毕业于九州艺术工科大学视觉传达设计专业，1978年在东京教育大学获得美术硕士学位。1970年代末至1980年代初，他与大村浩一教授及大阪大学工程师合作，开创了将计算机图形学用于模拟人工生命的先驱探索。\n\n他以算法与元球技术想象从深海和生命演化汲取灵感的有机形态，创作出看似能够生长、分裂和进化的数字生命体，在计算机图形学的技术精确性与生命体的有机自发性之间探索令人着迷的视觉空间，成为日本计算机图形艺术史上最重要的先驱人物之一。","aw":[]},"hiroshi-kawano":{"n":"Hiroshi Kawano","nc":"日本","ne":"Japanese","b":"1925","d":"2012","i":"河野博是日本哲学家兼艺术家，以严谨的编程与美学理论相结合创作融合数学秩序与算法随机性的作品，在日本开创了计算机生成艺术。从1960年代起，他在计算机图形和美学理论之间建立了独特的联系。","bi":"河野博1925年生于中国抚顺的日本家庭，1935年随家人迁居日本，后在东京大学学习哲学和美学，获得本科和研究生学位，并在大阪大学获得博士学位。整个学术生涯中，他在多所高校任教哲学和美学。\n\n他将哲学与美学理论引入计算机艺术实践，从1960年代起以严谨的编程与美学理论相结合，创作融合数学秩序与算法随机性的作品，在计算机图形和美学理论之间建立了独特的联系，是日本计算机生成艺术最重要的先驱人物之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Art_Ex_Machina_portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Frieder_Nake_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058901&s=faa0d28f9364f34911d1586ca6cc4b40","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Red_Tree_Hiroshi_Kawano_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059427&s=58422bb7f1cccffbd27e6c340d3d1f09","l":["Untitled Red Tree","Hiroshi Kawano","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Simulated_Color_Mosaic_Hiroshi_Kawano_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802723&s=04272046be5c3a7fc202673a377d7f03","l":["Simulated Color Mosaic","Hiroshi Kawano","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/SDL_Portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Georg_Nees_John_Roy_Zdene%CC%8Ck_Sy%CC%81kora_Roger_Vilder_11102025_2026-03-21-021728_mnnn.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059448&s=56218910ce19af914f2bb8e7f42f590e","l":["Multiple Artists","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/094.JPG?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1771035648&s=d5f8d279a546ea51112b1cd0dd3c87e6","l":["Hiroshi Kawano / Ken Knowlton","1973","Print"]}]},"john-l-kelly-jr":{"n":"John L. Kelly, Jr.","nc":"美国","ne":"American","b":"1923","d":"1965","i":"约翰·拉里·凯利是贝尔实验室的美国物理学家，研究信息与概率如何应用于通信和声音领域。他发明了在系统性优势下实现长期增长最大化的数学公式「凯利准则」，并于1961年与卡罗尔·洛克鲍姆合作，在贝尔实验室IBM 704计算机上演示了第一段由计算机生成的语音。","bi":"约翰·拉里·凯利1923年生于得克萨斯州科西卡纳，二战期间担任海军飞行员，后在德克萨斯大学奥斯汀分校学习物理，1953年以材料弹性特性为题获得博士学位。短暂在石油行业担任研究物理学家后，他加入默里山的贝尔实验室，在那里发展了将信息论与概率应用于通信和声音的研究。\n\n他发明了以其名字命名的「凯利准则」——在系统性优势下实现长期增长最大化的数学公式，后来被广泛应用于博弈论和金融领域。1961年，他与卡罗尔·洛克鲍姆合作，在贝尔实验室IBM 704计算机上演示了第一段由计算机生成的语音，成为数字语音合成史上的重要里程碑。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]}]},"khwampa":{"n":"khwampa","nc":"印度","ne":"Indian","b":"2018","d":"","i":"Khwampa是跨学科艺术家，其作品通过多样化的实体与数字媒介探索抽象和数学形式。他错综复杂的极繁主义构图融合了迷幻视觉、文化图案与偶然性美学，形成独特的视觉语言。","bi":"Khwampa是驻喜马拉雅山区的跨学科艺术家，2018年开始以曼陀罗等抽象和数学形式的视觉语言研究为核心的艺术实践。机械工程和工程制图的学习重新点燃了他对视觉表达的热情，此后他发展出融合迷幻视觉、文化图案与偶然性美学的极繁主义创作体系。他的作品在精确数学结构与有机视觉混沌之间探索独特的张力，以多样化的实体与数字媒介呈现来自喜马拉雅文化语境的艺术视野。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Onto_the_orange_and_wrapped_in_yellow_and_green_khwampa_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059226&s=b6ee84537d5f404bd28da0e0cc09da78","l":["Onto the orange and wrapped in yellow and green","khwampa","2025","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Architecture_of_the_Plain_khwampa_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805657&s=9eb8d6750830d2ef6e4b419f381f1494","l":["Architecture of the Plain","khwampa","2025","NFT/Digital"]}]},"wolfgang-kiwus":{"n":"Wolfgang Kiwus","nc":"德国","ne":"German","b":"1939","d":"2022","i":"沃尔夫冈·基武斯是一位德国艺术家，将编程的严谨性与艺术创作对话，以代码作为一种作曲形式，将音乐背景延伸至视觉过程。在突发听力损失后，他将对声音的感知转化为对代码和视觉系统的探索。","bi":"沃尔夫冈·基武斯1939年生于德国，在弗罗茨瓦夫音乐学院学习长笛，1954至1958年在弗罗茨瓦夫爱乐乐团演出。1959年迁居斯图加特后，他在国立音乐与表演艺术大学学习当代音乐，1963年创立了当代音乐工作室，同时从事诗歌、广播剧和评论写作。\n\n遭遇突发听力损失后，这一转折使他将对声音的感知转化为对代码和视觉系统的探索，将编程的严谨性引入艺术创作对话，以代码作为延伸音乐背景的作曲形式，发展出融合技术精确性与感性表达的独特视觉语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Wolfgang_Kiwus_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805424&s=59b3366aadf9daf3dbd4666d868e7524","l":["Untitled","Wolfgang Kiwus","1993","Plotter Drawing"]}]},"klaus-burkhardt":{"n":"Klaus Burkhardt","nc":"","ne":"","b":"2026","d":"","i":"Email Newsletter\n\nSign up to receive the occasional news and stories from the world of computer art.","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/16_4_66_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5107&fp-y=0.4797&dm=1763328594&s=190837da98ca58e1068c2a592a0b1c63","l":["Multiple Artists","1966","Print"]}]},"gunther-kleinert":{"n":"Gunther Kleinert","nc":"德国","ne":"German","b":"2008","d":"","i":"根特·克莱纳特是驻汉堡的艺术家兼设计师，其作品融合模拟工艺与尖端生成技术。自2017年起，他探索将声音与环境数据转化为视觉作品的可能性，在产品设计、空间概念与视觉艺术之间架起桥梁。","bi":"根特·克莱纳特是驻汉堡的艺术家兼设计师，连接产品设计、空间概念、技术与视觉艺术。在英格兰德文郡学习精细家具和橱柜制作后，他回到汉堡，2008年在汉堡美术大学获得工业设计学位。在产品和室内设计领域积累了十余年跨学科经验后，自2017年起专注于生成技术，探索将声音与环境数据转化为视觉作品的可能，以模拟工艺与数字精确性的融合发展出独特的创作语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Abstract_-_0230510_Gunther_Kleinert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805317&s=0eb662ddf6c0afd75da0c86321011199","l":["Abstract - 0230510","Gunther Kleinert","2023","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/We_Will_Live_On_-_The_Dirt_03_Gunther_Kleinert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802945&s=290fd4fb4ba1a50c8998bf08e6101f83","l":["We Will Live On - The Dirt 03","Gunther Kleinert","2024","Plotter Drawing"]}]},"mario-klingemann":{"n":"Mario Klingemann","nc":"德国","ne":"aka Quasimondo","b":"2017","d":"2021","i":"马里奥·克林格曼（笔名Quasimondo）是AI艺术的先驱，使用神经网络和生成系统重新思考创造力与作者身份。他的作品探索机器如何感知、诠释和重构视觉世界，在艺术界和技术界都引发了关于人工智能本质的深刻讨论。","bi":"马里奥·克林格曼1970年生于德国拉茨特，14岁时获得Commodore 64后开始自学编程，学习编写代码、创建图形，并理解数字系统的内部运作。1990年代初，他从事设计和多媒体开发，在互联网萌芽时代构建互动体验。\n\n他的探索引领他进入生成艺术和人工智能领域，使用神经网络和生成系统重新思考创造力与作者身份。他的作品探索机器如何感知、诠释和重构视觉世界，以「神经故障」系列等作品引发了关于人工智能美学与创造力本质的广泛讨论。他是最早将AI生成图像带入主流艺术界的艺术家之一，作品被多家重要博物馆和机构收藏。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Headwind_Mario_Klingemann_11102025.gif?w=650&h=650&q=90&auto=format&fit=crop&dm=1762805177&s=394a228aa194d18dc4c038374ce5de5b","l":["Headwind","Mario Klingemann","2017-2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Hic_et_Nunc_-_State_of_the_Art_-_March_25th_2021_Mario_Klingemann_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805525&s=698070f73a4cc5045c5ee03a873fc243","l":["Hic et Nunc - State of the Art - March 25th 2021","Mario Klingemann","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Vague_Recollection_45_Mario_Klingemann_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058718&s=a37551a8c10598b4c221835daf1cde5b","l":["Vague Recollection 45","Mario Klingemann","2022"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Novelty_Maximizer_046_Mario_Klingemann_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059188&s=c19bf8cd25c7a61e512653f74cb5a920","l":["Novelty Maximizer 046","Mario Klingemann","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/%E4%BA%BA%E5%B7%A5%E3%82%A2%E3%82%A4%E5%83%8F_38_Mario_Klingemann_11102025_2026-03-21-020449_xxrl.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058689&s=e7050465902b84aabac48885d7027781","l":["%E4%BA%BA%E5%B7%A5%E3%82%A2%E3%82%A4%E5%83%8F 38","Mario Klingemann","2023","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/%E4%BA%BA%E5%B7%A5%E3%82%A2%E3%82%A4%E5%83%8F_26_Mario_Klingemann_11102025_2026-03-21-021654_ftoe.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059415&s=6c747bd18fe1a22dd9e4e6443c1fd27a","l":["%E4%BA%BA%E5%B7%A5%E3%82%A2%E3%82%A4%E5%83%8F 26","Mario Klingemann","2023","NFT/Digital"]}]},"fromund-kloppe":{"n":"Fromund  Kloppe","nc":"德国","ne":"German","b":"1940","d":"","i":"弗罗蒙德·克洛普是德国工程师，在欧宝公司设计部门工作，使用最早为汽车全尺寸图纸开发的数控计算机绘图机器之一创作实验性计算机图形，将工业精密设备的能力引入艺术探索领域。","bi":"弗罗蒙德·克洛普是德国吕塞尔斯海姆欧宝公司设计部门的工程师，1970年代初将最早的数控计算机绘图系统之一引入汽车设计。作为数控系统部门负责人，他采用Orthomat图形系统/5000将黏土车模数字化，并生成全尺寸技术图纸，随后利用这些最初为汽车全尺寸图纸开发的工业精密设备创作实验性计算机图形，将工业工具的能力引入艺术探索领域，成为德国早期工业-艺术交汇的独特案例。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Triplet_of_flowing_line_surfaces_Fromund_Kloppe_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801548&s=bb5fd3f02f7089c2f8ee846bda1a09c4","l":["Triplet of flowing line surfaces","Fromund  Kloppe","1980","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sechs_Computergrafiken_six_computer_graphics_Portfolio_Christian_Cavadia_Friedrich_Lu%CC%88bbecke_Robert_Stoiber_Fromund_Kloppe_Wolfgang_Beyer_11102025_2026-03-21-021322_mmvb.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059202&s=9d9ed5db3708a4f149913676fb77cba2","l":["Multiple Artists","1980","Print"]}]},"alison-knowles":{"n":"Alison Knowles","nc":"美国","ne":"American","b":"1933","d":"2025","i":"艾利森·诺尔斯的作品横跨抽象、表演和跨媒介，深深植根于她早期的训练和对先锋弗鲁克萨斯运动的参与，以将日常材料和行为转化为艺术体验、让艺术融入生活著称。","bi":"艾利森·诺尔斯1933年生于纽约市，家人为了良好的教育环境迁居斯卡斯代尔。她从小对绘画和绘图充满热情，在学校老师的鼓励下发展了这一兴趣。她在米德尔伯里学院获得全额奖学金后转入普拉特学院完成艺术学习。\n\n她成为弗鲁克萨斯运动的重要成员，以将日常材料和行为转化为艺术体验、让艺术融入生活著称。她的代表作包括《制作沙拉》——在表演中真实制作并分发给观众的沙拉，以及《大书》——一座可以进入的人体大小书籍装置。她的作品横跨抽象、表演和跨媒介，持续探索艺术与日常生活的边界。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/A_House_of_Dust_Alison_Knowles_James_Tenney_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059358&s=3efe699212907d51f139e3f7ffeec65d","l":["Alison Knowles / James Tenney","1967","Prose/Poetry (Computer-Generated)"]}]},"ken-knowlton":{"n":"Ken Knowlton","nc":"美国","ne":"American","b":"1931","d":"2022","i":"肯·诺尔顿利用早期计算机技术制作了最早的数字动画和图像之一，通过编程以全新方式塑造视觉艺术。他的工作在贝尔实验室奠定了计算机图形学和数字艺术的基础技术，影响了整整一代数字艺术家。","bi":"肯·诺尔顿1931年生于纽约州斯普林维尔，在一间单室学校长大，高中以班级致辞代表身份毕业，后在康奈尔大学学习工程物理。在康奈尔大学，他直接与铣床和电子设备合作，同时学习工程的理论基础。后在麻省理工学院获得博士学位，随后加入贝尔实验室。\n\n在贝尔实验室，他开发了BEFLIX——一种用于制作计算机动画的编程语言，以及与利昂·哈蒙合作创作的《感知研究一号》等开创性图像作品。他的技术工作奠定了计算机图形学和数字艺术的基础，影响了整整一代数字艺术家和程序员。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Poemfield_7_Stan_VanDerBeek_Ken_Knowlton_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058918&s=26131760b606cead18051eabf6d90222","l":["Stan VanDerBeek / Ken Knowlton"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/knowlton-reclining_nude.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.0418&fp-y=0.4882&dm=1770208117&s=5a960efe471d9a471bddea8c53c89a7e","l":["Ken Knowlton / Leon D. Harmon","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Seated_Nude_AP_Ken_Knowlton_Lillian_Feldman_Schwartz_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059400&s=8bb550b48b00cfbee495d7074dfde24d","l":["Ken Knowlton / Lillian Feldman Schwartz","1969","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Art_Ex_Machina_portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Frieder_Nake_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058901&s=faa0d28f9364f34911d1586ca6cc4b40","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Ken_Knowlton_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805635&s=803aa789306fe6fde232e40ef77ca7ce","l":["Untitled","Ken Knowlton","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Octagons_Ken_Knowlton_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803806&s=d42d201ecdf76706bb29acf52e12d0cb","l":["Octagons","Ken Knowlton","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/SDL_Portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Georg_Nees_John_Roy_Zdene%CC%8Ck_Sy%CC%81kora_Roger_Vilder_11102025_2026-03-21-021728_mnnn.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059448&s=56218910ce19af914f2bb8e7f42f590e","l":["Multiple Artists","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/094.JPG?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1771035648&s=d5f8d279a546ea51112b1cd0dd3c87e6","l":["Hiroshi Kawano / Ken Knowlton","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Olympiad_reprint_Ken_Knowlton_Lillian_Feldman_Schwartz_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059341&s=93d2c8d86c6c21c88f204fcc60cb882f","l":["Ken Knowlton / Lillian Feldman Schwartz","2000","Print"]}]},"hans-khler":{"n":"Hans Köhler","nc":"德国","ne":"German","b":"1922","d":"2011","i":"汉斯·克勒1970年代初的《计算机艺术IBM版》系列将计算机生成的设计转化为彩色石版画和丝网印刷，将他的版画背景延伸至数字形式，是最早将计算机图像用于版画制作的案例之一。","bi":"汉斯·克勒1922年生于德国，最初接受彩色石版画训练，后在斯图加特图形高等专业学院学习应用图形，进而在斯图加特国立造型艺术学院学习绘画和图形艺术，并在霍赫舒勒协助马克斯·本泽讲授信息美学课程。在自己的工作室工作后，他重返艺术教育，在哈弗勒斯霍夫和斯图加特的其他学院任教。\n\n1970年代初，他开发了《计算机艺术IBM版》系列，将计算机生成设计转化为彩色石版画和丝网印刷，将版画背景延伸至数字形式，是最早将计算机图像用于版画制作的案例之一，体现了信息美学理论如何在实践层面催生新的艺术形式。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_A07_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804193&s=e5a41df725c612b347a29ae9b9c5ee88","l":["Computer Art IBM Edition A07 Ko%CC%88hler","Hans Köhler","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_A05_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804915&s=eae842c00ca6902b45df570da8a4e6f5","l":["Computer Art IBM Edition A05 Ko%CC%88hler","Hans Köhler","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_A01_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804966&s=9cd6fb8fdf58635e7770b71aadd823c7","l":["Computer Art IBM Edition A01 Ko%CC%88hler","Hans Köhler","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Square-Groupins-4.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059185&s=aea91b044b60e467f4fcb08dfd2f54b7","l":["Square-Groupins-4","Hans Köhler","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_A08_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805231&s=f8d255fb8cbd01fac98bc4cf6d947c02","l":["Computer Art IBM Edition A08 Ko%CC%88hler","Hans Köhler","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/IBM_A03-11292025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764554974&s=0978df2a8c2828377a053040dedfda7c","l":["IBM A03-11292025","Hans Köhler","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_B03_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804932&s=4f9a7baf38d7896262144b59d9a8a388","l":["Computer Art IBM Edition B03 Ko%CC%88hler","Hans Köhler","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_B02_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804963&s=c9dfd1668cf8d7b30972992516efd93f","l":["Computer Art IBM Edition B02 Ko%CC%88hler","Hans Köhler","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_B04_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805006&s=ae243a212d74dd769adcf8936f4ef256","l":["Computer Art IBM Edition B04 Ko%CC%88hler","Hans Köhler","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Square-Groupins-3.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059097&s=0a416500e6938faf32246d0a42acc323","l":["Square-Groupins-3","Hans Köhler","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_B01_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805106&s=5fd62198410f87e0c9cf5a717caf1945","l":["Computer Art IBM Edition B01 Ko%CC%88hler","Hans Köhler","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Art_IBM_Edition_A06_Hans_Ko%CC%88hler_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805210&s=272dd89a0fed8955d12d854bc8879d84","l":["Computer Art IBM Edition A06 Ko%CC%88hler","Hans Köhler","1975","Print"]}]},"masao-kohmura":{"n":"Masao Kohmura","nc":"日本","ne":"Japanese","b":"1943","d":"","i":"河村政雄的艺术通过对形式与变化的精确视觉研究探索数字媒介的结构性可能。他共同创立了日本计算机技术小组（CTG），该团体在日本及全球范围内的早期计算机艺术发展中发挥了核心作用。","bi":"河村政雄1943年生于日本东京，在多摩美术大学学习，在那里对将艺术与新兴计算机技术融合的可能性产生了浓厚兴趣。1966年，还是学生的他与土谷晴一共同创立了计算机技术小组（CTG）——这个汇聚艺术家、设计师和工程师、在IBM科学数据中心工作的集体，成为日本最有影响力的早期数字艺术团体之一，以将算法和计算机生成技术与视觉设计相结合而著称。CTG的工作在日本及全球范围内的早期计算机艺术发展中发挥了核心作用，河村政雄是这一先驱团体的重要创始力量。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Return_to_Square_Masao_Kohmura_Kunio_Yamanaka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058827&s=bee27b1039cfca44b6c534b43cd20e35","l":["Masao Kohmura / Kunio Yamanaka","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Running_Cola_is_Africa_Masao_Kohmura_Koji_Fujino_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059436&s=893454bbf6e89d13cd8aa4f2ffe19c66","l":["Masao Kohmura / Koji Fujino","1968","Print"]}]},"william-kolomyjec":{"n":"William Kolomyjec","nc":"美国","ne":"American","b":"1947","d":"","i":"威廉·J·科洛米耶茨1970年代初在密歇根州立大学开始使用穿孔卡片、FORTRAN和绘图仪将数学结构转化为图像，创作计算机艺术。他的实践从早期实验延伸至融合艺术与教育的跨学科工作。","bi":"威廉·J·科洛米耶茨1947年生于底特律，在密歇根州立大学学习工业设计，1969年获美术学士学位，1975年获平面设计艺术硕士学位，1980年获教育学博士学位。他在俄亥俄州立大学讲授工程和计算机图形课程，后成为北伊利诺伊大学设计学副教授。\n\n他的计算机艺术创作始于1970年代初，使用穿孔卡片、FORTRAN和绘图仪将数学结构转化为图像，作品在《计算机与自动化》杂志的年度比赛中屡获肯定，成为美国中西部早期计算机艺术社区的重要成员。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bird_Curves_William_Kolomyjec_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805612&s=265f0731ec6404867770802521136515","l":["Bird Curves","William Kolomyjec","1972","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Twist_William_Kolomyjec_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805457&s=08638a645e05aa18929ae6fbecbd4e3b","l":["Twist","William Kolomyjec","1976","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Boxes_1_and_2_William_Kolomyjec_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058698&s=d8588eceba7fced3816c1bcee9bfdedc","l":["Boxes 1 and 2","William Kolomyjec","1981","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Creature_Tunnel_William_Kolomyjec_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805312&s=3367c95ab76f73246a205fc0f80d9b82","l":["Creature Tunnel","William Kolomyjec","1981","Plotter Drawing"]}]},"daniela-krhnert":{"n":"Daniela Kröhnert","nc":"德国","ne":"German","b":"1985","d":"","i":"丹妮拉·克勒内特是德国建筑研究者和艺术家，以实验性数字制造和计算绘图著称，领导应用科学大学数字设计与生产实验室，在学术研究与艺术实践之间架起桥梁。","bi":"丹妮拉·克勒内特是德国建筑研究者和艺术家，专注于数字制造和计算绘图。她在卡尔斯鲁厄理工大学学习建筑，后以优异成绩毕业于维也纳应用艺术大学。职业生涯初期在蓝天组（Coop Himmelb(l)au）积累了宝贵经验，后领导应用科学大学数字设计与生产实验室，在学术研究与艺术实践之间架起桥梁，以实验性数字制造和计算绘图探索建筑、技术与视觉艺术的交汇。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sunset_on_The_Prairie_Daniela_Kro%CC%88hnert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805327&s=b05cb6ea5bcaf12589e3eed45349224b","l":["Sunset on The Prairie Kro%CC%88hnert","Daniela Kröhnert","2020","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Butterfly_Note_Cards_Daniela_Kro%CC%88hnert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803367&s=3ae39b03af67a37972ee25ac820ea31e","l":["Butterfly Note Cards Kro%CC%88hnert","Daniela Kröhnert","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Butterflies_Daniela_Kro%CC%88hnert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805538&s=e29258d5924dbd6267be3606770634f0","l":["Butterflies Kro%CC%88hnert","Daniela Kröhnert","2024","Plotter Drawing"]}]},"waldemar-kumming":{"n":"Waldemar  Kumming","nc":"德国","ne":"German","b":"1924","d":"2017","i":"瓦尔德马尔·库明1958年创办了《慕尼黑摘要》，这份讽刺性俱乐部通讯成长为欧洲科幻小说领域最重要的同人志之一。1971年那期刊载了赫伯特·W·弗兰克关于DRAKO程序的文章，架起了科幻小说与计算机艺术早期探索的桥梁。","bi":"瓦尔德马尔·库明1924年生于柏林，接受过通信工程师培训。二战期间在东线和西线服役，负伤后被美军俘虏。战后他在慕尼黑为自由欧洲电台工作，这一职位使他在冷战期间无法返回柏林。他随后加入巴伐利亚广播电台，直至退休。1958年创办了《慕尼黑摘要》——这份最初作为讽刺性俱乐部通讯的出版物，逐渐成长为欧洲科幻小说领域最重要的同人志之一。1971年那期刊载了赫伯特·W·弗兰克关于计算机程序DRAKO的文章，将科幻小说与计算机艺术的早期探索相联结。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Munich_Round_Up_MRU_No._119_Herbert_W._Franke_Waldemar_Kumming_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058685&s=5d8320f53b1266fac901046fab5c6ff6","l":["Herbert W. Franke / Waldemar  Kumming","1971","Ephemera"]}]},"benfrancis-laposky":{"n":"Ben Francis Laposky","nc":"美国","ne":"American","b":"1914","d":"2000","i":"本·弗朗西斯·拉波斯基通过在模拟阴极射线示波器上显示的波形创作了精密的抽象电子艺术，成为计算机相关艺术最早的先驱之一，其作品在全球媒体上广泛传播。","bi":"本·弗朗西斯·拉波斯基1914年生于爱荷华州切罗基，接受数学家培训，职业生涯始于在家乡经营招牌店的制图员。对数学与几何的热情与对电子技术的兴趣相交汇，促使他探索电子波形的艺术潜力。\n\n他以改装的模拟阴极射线示波器在荧光屏上生成精密的抽象图案，称之为「电子抽象」或「振荡图」，并通过长曝光摄影将其记录下来。这些作品被视为最早的计算机相关艺术之一，1952年起在全球各地展出，并在世界各地的媒体上广泛传播，成为探索电子技术与视觉艺术交汇的先驱性实践。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Oscillion_18_Ben_Francis_Laposky_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059501&s=bcab479f3e0db295a06914b057003e17","l":["Oscillion 18","Ben Francis Laposky","1953","Oscilloscope/Light Photo"]}]},"ruth-leavitt":{"n":"Ruth Leavitt","nc":"美国","ne":"American","b":"1944","d":"2025","i":"鲁思·莱维特是美国先驱艺术家，1960年代开始使用计算机探索抽象视觉形式中的变形、变化和空间转换，开发了将硬边几何重塑为流动动态形态的生成工具，是数字艺术早期历史的重要人物。","bi":"鲁思·莱维特1944年生于明尼苏达州圣保罗，在明尼苏达大学学习绘画，师从以将有机形式与自发笔触相融合著称的美国抽象表现主义重要人物彼得·布萨，通过布萨吸收了汉斯·霍夫曼对视觉张力和推拉动态的教学影响。\n\n她的实践从传统绘画延伸至计算机艺术，1960年代开始使用计算机探索抽象视觉形式中的变形、变化和空间转换，开发了将硬边几何重塑为流动动态形态的生成工具，成为美国西海岸早期数字艺术社区的重要成员。1976年，她编辑出版了《艺术家和计算机》，这是最早记录艺术家与计算机技术关系的重要文献之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_red_Ruth_Leavitt_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059085&s=efdfdff0925c3dc1a4bdcdb120550bc4","l":["Untitled red","Ruth Leavitt","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_blue_Ruth_Leavitt_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059089&s=7c7fe5248b2eecc5ebb06f9a87b73b37","l":["Untitled blue","Ruth Leavitt","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Diamond_2D_design_Ruth_Leavitt_11202025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673159&s=3ccbfb51676ba8986b8aa203586b36d9","l":["Diamond 2D design","Ruth Leavitt","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Inner_City_Variation_III_Ruth_Leavitt_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805005&s=ced7fc46e2c56311cf28883b55cd98de","l":["Inner City Variation III","Ruth Leavitt","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Inner_City_Variation_II_Ruth_Leavitt_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805444&s=bc47a1baf6f2ec8f5c3a775ab3514c33","l":["Inner City Variation II","Ruth Leavitt","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/artist_and_computer-ruth_leavitt-11292025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764450139&s=f7ca02d30710bad67a7a46d3cb8972fb","l":["artist and computer- -11292025","Ruth Leavitt","1976","Book"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plotter_output_of_topological_3D_Mappings_Ruth_Leavitt_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804950&s=4671257dfad94bc76dec545051bb563d","l":["Plotter output of topological 3D Mappings","Ruth Leavitt","1977","Plotter Drawing"]}]},"joanie-lemercier":{"n":"Joanie Lemercier","nc":"法国","ne":"French","b":"1982","d":"","i":"乔安妮·勒梅尔谢是视觉艺术家，以光线、投影映射和数字算法创作沉浸式装置，将表面转化为自然图案与形态的动态呈现。他积极倡导艺术界的可持续实践，并公开讨论NFT艺术的环境影响。","bi":"乔安妮·勒梅尔谢1982年生于法国皮蒂维耶，是驻布鲁塞尔的视觉艺术家，自2013年起定居于此。他通过在雷恩一所时装学院教授平面设计的母亲，在幼年便接触了计算机和数字设计，五岁时已在电脑上创作图案。\n\n他以光线、投影映射和数字算法创作沉浸式装置，将表面转化为自然图案与形态的动态呈现，作品在全球重要场所展出。他积极倡导艺术界的可持续实践，公开讨论NFT艺术的环境影响，并以自身实践探索艺术与生态责任之间的关系，成为当代数字艺术界兼具技术深度与社会意识的重要声音。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Nuages_Possibles_16_Joanie_Lemercier_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058670&s=791499e663f0d7d62553556c85297b35","l":["Nuages Possibles 16","Joanie Lemercier","2023","Plotter Drawing"]}]},"golan-levin":{"n":"Golan Levin","nc":"美国","ne":"American","b":"0021","d":"","i":"戈兰·莱文是驻匹兹堡的新媒体艺术家兼工程师，以开创融合计算、图像、声音和人机交互的互动系统而著称，持有麻省理工学院学位，在卡内基梅隆大学担任教授，共同创建了开源创意编码框架openFrameworks。","bi":"戈兰·莱文1972年生，是驻匹兹堡的新媒体艺术家、作曲家、表演者和工程师，以对计算表达潜能的创新探索著称。他的作品横跨软件艺术、互动装置和表演，专注于设计融合图像与声音、探索人机交互的系统。\n\n他在麻省理工学院媒体实验室获得学位后，在卡内基梅隆大学建立了自己的学术和艺术实践。他共同创建了开源创意编码框架openFrameworks，这一工具已成为全球新媒体艺术社区不可或缺的基础设施，影响了数千位艺术家和开发者。他的代表作品包括《Messa di Voce》《Dialtones》等，以富有诗意的方式探索声音、图像与身体的关系。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ambigrammatic_Figure_0021_Card_3955_Golan_Levin_11102025.gif?w=640&h=640&q=90&auto=format&fit=crop&dm=1774058693&s=df46f0ec9e7f467954c5ac7f02675990","l":["Ambigrammatic Figure 0021 Card 3955","Golan Levin","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ambigrammatic_Figure_0362_Card_5555_Golan_Levin_11102025.gif?w=640&h=640&q=90&auto=format&fit=crop&dm=1774058837&s=d7edd052b5ef38ec6c13555d21fbdd1b","l":["Ambigrammatic Figure 0362 Card 5555","Golan Levin","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ambigrammatic_Figure_0235_Card_4355_Golan_Levin_11102025.gif?w=640&h=640&q=90&auto=format&fit=crop&dm=1774059332&s=76a8786c3ea5d74dc44bea085784086d","l":["Ambigrammatic Figure 0235 Card 4355","Golan Levin","2021","NFT/Digital"]}]},"david-lewin":{"n":"David Lewin","nc":"美国","ne":"American","b":"1933","d":"2003","i":"大卫·列文是美国作曲家、钢琴家和理论家，其工作改变了音乐结构与感知的研究，以广义音程理论（GIS）重构了音乐分析的理论框架，同时是第一位用计算机生成音乐的职业音乐家。","bi":"大卫·列文1933年生于纽约，幼年学习钢琴，后师从勋伯格和第二维也纳乐派著名诠释者爱德华·施托伊尔曼。1954年在哈佛大学获得数学学位后，赴维也纳与约瑟夫·波尔瑙尔学习音乐理论与分析，返回美国后先后在哈佛、耶鲁、柯蒂斯等机构学习和执教。\n\n他发展出广义音程理论（GIS），以数学方法重构了音乐分析的理论框架，彻底改变了音乐理论学科。同时，他是第一位用计算机生成音乐的职业音乐家，将数学严谨性与对音乐结构深刻的感性理解融为一体。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]}]},"lia":{"n":"LIA","nc":"奥地利","ne":"Austrian","b":"1995","d":"","i":"LIA是软件与网络艺术的先驱，专注于生成视觉、互动装置和现场视听表演。她以代码为创意工具，探索复杂系统和持续演化的生成过程，以机器为创意对话伙伴进行持续探索。","bi":"自1995年起，奥地利艺术家LIA持续从事软件艺术的探索。她的跨功能实践横跨视频、表演、软件、装置、雕塑、投影和数字应用，以与机器深层且持续演化的对话为基础。\n\nLIA的主要创作材料是代码。对她而言，创造过程本身就是探索——将代码作为认识工具，通过参数的调整和规则的制定发现意想不到的视觉可能性。她的作品以生成视觉、互动装置和现场视听表演为核心，持续探索复杂系统的美学潜力，成为欧洲软件与网络艺术领域最具代表性的声音之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawing_Machine_x4_37_LIA_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058669&s=d70140087c6ef46b0695246a7788c766","l":["Drawing Machine x4 37","LIA","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawing_Machine_x4_55_LIA_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058672&s=971f7bd10819628a00741f7d68a67619","l":["Drawing Machine x4 55","LIA","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawing_Machine_x4_100_LIA_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058726&s=ba2aeb26abcf5ce9fbbc4fdf65559982","l":["Drawing Machine x4 100","LIA","2022","NFT/Digital"]},{" A","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawing_Machine_x4_6_LIA_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059428&s=e6f9ce5911057fea63dea26346ed668b","l":["Drawing Machine x4 6","LIA","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Drawing_Machine_x4_39_LIA_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059451&s=05c226e3f7738bafda4bdd5b467dfe2b","l":["Drawing Machine x4 39","LIA","2022","NFT/Digital"]}]},"zach-lieberman":{"n":"Zach Lieberman","nc":"美国","ne":"American","b":"1953","d":"2023","i":"扎克·利伯曼创作使用代码将运动、声音和语言转化为视觉形式的表演、装置和绘图作品，以「诗意计算」为实践理念，共同创建了开源创意编码框架openFrameworks，影响了全球数千位艺术家和开发者。","bi":"扎克·利伯曼1977年生，驻纽约。他在亨特学院学习美术，专注于绘画和版画，后于2002年在帕森斯设计学院完成设计与技术艺术硕士学位。在学习过程中，他发现了将视觉时间轴与脚本相结合的动画程序Macromedia Flash，由此开启了代码与艺术融合的探索之路。\n\n他共同创建了开源创意编码框架openFrameworks，影响了全球数千位艺术家和开发者。他将运动、声音和语言转化为视觉形式的创作定义为「诗意计算」，以探索技术的人性化表达，在麻省理工学院媒体实验室等机构担任研究员，并通过教学和开源工具推动了创意编程文化的发展。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/horizontes_137_Zach_Lieberman_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058903&s=313c9f2e8c81d1d2893961ab15c2d756","l":["horizontes 137","Zach Lieberman","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Circle_Grid_Glow_Zach_Lieberman_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803836&s=ddf320536e788c50bb8b54a2793226c8","l":["Circle Grid Glow","Zach Lieberman","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Patches_Zach_Lieberman_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805123&s=590739d9229f530d65736075d632bea0","l":["Patches","Zach Lieberman","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/horizontes_242_Zach_Lieberman_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059444&s=6f4a9688c9fa0cfe62881e07ebf9863b","l":["horizontes 242","Zach Lieberman","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cone_Gradient_Study_32_3_print_Zach_Lieberman_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059210&s=48ce6c3f087f2898ce1396565b1c962e","l":["Cone Gradient Study 32 3 print","Zach Lieberman","2023","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cone_Gradient_Study_32_3_Zach_Lieberman_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059336&s=b7032957ae466fa49aadfdc639cda06c","l":["Cone Gradient Study 32 3","Zach Lieberman","2023","NFT/Digital"]}]},"fujitsu-limited":{"n":"Fujitsu Limited","nc":"日本","ne":"aka Fuji Tsushinki Seizo","b":"1964","d":"","i":"富士通最初是通信设备制造商，迅速成为日本本土计算机技术建设的领导者，其FACOM系列是这一努力的早期标志。1964年纽约世博会上，FACOM 231展示了实时自动编排钢琴演奏，彰显了其技术在艺术应用方面的前沿可能。","bi":"富士通（原名富士通信机器制造）1935年由古河电工与西门子合作创立，最初是通信设备制造商，迅速将注意力转向计算机技术，推出FACOM系列，成为日本本土计算机技术建设的领导者。1954年，富士通发布了日本第一台国产电子计算机FACOM 100，标志着日本计算机产业自主发展的重要里程碑。\n\n1964年纽约世博会上，FACOM 231展示了实时自动编排钢琴演奏，将计算机技术与艺术表演相联结，彰显了其技术在艺术应用方面的前沿可能，成为日本科技企业探索人机创意协作的早期案例。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Peace_Through_Understanding_Fujitsu_Limited_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805302&s=a3c323b5b6294a3e51322e8c5b1f8f28","l":["Peace Through Understanding","Fujitsu Limited","1964-1965","Print (Dot Matrix)"]}]},"bo-ljungberg":{"n":"Bo Ljungberg","nc":"瑞典","ne":"aka Beck & Jung","b":"1939","d":"2007","i":"博·利永贝里是一位瑞典艺术家，借助工程和数学背景发展出以几何和系统形式为核心的创作实践。1965年，他与霍尔格·贝克斯特伦开始合作，组成艺术二人组Beck & Jung，将计算机生成图像引入他们的色彩与几何探索。","bi":"博·利永贝里1939年生于瑞典隆德，1961年在马尔默学习土木工程，后在隆德大学学习数学。毕业后在吕勒奥的一艘疏浚船工作，后在斯德哥尔摩担任技术制图员，1965年返回家乡，在那里与儿时好友霍尔格·贝克斯特伦重逢，开始了终身的艺术合作，以Beck & Jung之名探索以几何和系统形式为核心的创作实践。他们的计算机探索始于1966年，将这些探索延伸为以色彩与几何为基础的大型公共艺术委托和国际展览。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Computer_Ink_Plot_Bo_Ljungberg_Holger_Ba%CC%88ckstro%CC%88m_11102025_2025-12-01-020957_gpbr.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764554997&s=406be666385931dd48b50b09df21a57a","l":["Bo Ljungberg / Holger Bäckström","1985","Print"]}]},"margot-lovejoy":{"n":"Margot Lovejoy","nc":"加拿大","ne":"Canadian","b":"1930","d":"2019","i":"玛戈·洛弗乔伊是电子和数字艺术的早期先驱，融合视频、装置和互联网项目探索社会主题并扩展观众参与。她的作品和学术研究（包括著名的《数字潮流》）在早期数字艺术教育中留下了深刻印记。","bi":"玛戈·洛弗乔伊1930年生于加拿大新不伦瑞克省的小镇，在巴黎美术学院和伦敦圣马丁艺术学院接受高等艺术教育。与物理学家德里克·洛弗乔伊结婚后，她在家庭与艺术创作之间寻求平衡，在渥太华和海外（包括埃及的一段时光）生活后定居纽约。\n\n她发展出融合视频、装置和互联网项目的创作体系，探索社会主题并扩展观众参与，成为电子与数字艺术的早期先驱。她的学术著作《数字潮流：新媒体艺术》是该领域最重要的教科书之一，对早期数字艺术教育产生了深远影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Margot_Lovejoy_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804148&s=eb3e0c1437887b315348ecbd988f98a0","l":["Untitled","Margot Lovejoy","1975 (circa)","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/See_the_Beautiful_Sea_XXIV_Margot_Lovejoy_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805467&s=3b1a6a891feba2c414780e98382621a6","l":["See the Beautiful Sea XXIV","Margot Lovejoy","1980 (circa)","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/See_the_Beautiful_Sea_XI_Margot_Lovejoy_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805618&s=a59a3990b454716d6bda3264749558f7","l":["See the Beautiful Sea XI","Margot Lovejoy","1980 (circa)","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Labyrinthe_City_3_Margot_Lovejoy_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805256&s=71eb975ab902890ee7235a0ba4013cd4","l":["Labyrinthe City 3","Margot Lovejoy","1988","Print"]}]},"richard-lowenberg":{"n":"Richard Lowenberg","nc":"美国","ne":"American","b":"1946","d":"","i":"理查德·洛文伯格自1970年代起通过生物传感和艺术科学合作探索生态系统与信息技术，在跨物种通信、农村电信和生态艺术方面主导了开创性项目，将艺术实践与环境倡导相联结。","bi":"理查德·洛文伯格1946年生于以色列海法，1951年随家人移民美国，在新泽西州长大。他在普拉特学院接受建筑教育，师从巴克敏斯特·富勒等具有影响力的系统思想家，并在保罗·索莱里的阿卡桑提工程度过了一个暑期。\n\n自1970年代起，他通过生物传感和艺术科学合作探索生态系统与信息技术的关系，在跨物种通信、农村电信和生态艺术方面主导了多个开创性项目，将艺术实践与环境倡导相联结，成为美国将科技艺术与生态意识相融合的重要先驱之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Katakali_Dancer_1_Richard_Lowenberg_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802734&s=5aca708f1d1c6493b32936d2dee8a288","l":["Katakali Dancer 1","Richard Lowenberg","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/RL_Thermographic_Portrait_Richard_Lowenberg_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805031&s=684c856a95084bbbb5984ec179d10957","l":["RL Thermographic Portrait","Richard Lowenberg","1975","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Katakali_Dancer_2_Richard_Lowenberg_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805386&s=a17453163abfe160b2d77b6eef509c40","l":["Katakali Dancer 2","Richard Lowenberg","1975","Print"]}]},"friedrich-lbbecke":{"n":"Friedrich  Lübbecke","nc":"","ne":"","b":"1980","d":"","i":"Sechs Computergrafiken (“six computer graphics”)… \n\nMultiple Artists \n\n1980 \nPrint","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Deformed_wire%E2%80%90grid_with_holes_Friedrich_Lu%CC%88bbecke_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802106&s=d2dfecfa81c8f1a9e04354e94b6449ab","l":["Deformed wire%E2%80%90grid with holes Lu%CC%88bbecke","Friedrich  Lübbecke","1980","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sechs_Computergrafiken_six_computer_graphics_Portfolio_Christian_Cavadia_Friedrich_Lu%CC%88bbecke_Robert_Stoiber_Fromund_Kloppe_Wolfgang_Beyer_11102025_2026-03-21-021322_mmvb.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059202&s=9d9ed5db3708a4f149913676fb77cba2","l":["Multiple Artists","1980","Print"]}]},"anna-lucia":{"n":"Anna Lucia","nc":"荷兰","ne":"Dutch","b":"1991","d":"","i":"安娜·露西亚是驻柏林的生成艺术家，其作品架起代码、工艺与计算的桥梁。凭借时装设计和土木工程的背景，她探索控制与不可预测性之间的张力，以精密的系统创造兼具数学秩序与手工温度的作品。","bi":"安娜·露西亚（Goense）1991年生于荷兰瓦赫宁根，现在德国柏林生活和工作。以艺术家名义Anna Lucia进行创作，她兼具工程学和设计学的学术背景——在乌得勒支艺术学院学习时装设计，后在代尔夫特理工大学获得土木工程学士学位和水管理硕士学位。\n\n这种独特的跨学科背景使她发展出将代码、工艺与计算融为一体的创作语言，探索控制与不可预测性之间的张力，以精密的系统创造兼具数学秩序与手工温度的作品。她的创作通常以笔式绘图仪的实体输出为核心，在数字生成与实体制作之间建立对话。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Generation_35_digital_Anna_Lucia_Goense_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058903&s=b6f5ba72ab5fa9bc16eb59539cf54d8d","l":["Generation 35 digital Goense","Anna Lucia","2023","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Generation_35_Anna_Lucia_Goense_Mary_Margaret_Pettway_11302025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059533&s=0fde80ec72b07ab53ecbe04668236863","l":["Anna Lucia / Mary Margaret Pettway","2023","Textile"]}]},"theo-lutz":{"n":"Theo Lutz","nc":"德国","ne":"German","b":"1932","d":"2010","i":"西奥·卢茨是德国计算机科学家，他于1959年用Zuse Z22编程创作的《随机文本》被视为最早的计算机生成文学作品之一，以马尔可夫链和随机过程探索语言的算法生成可能。","bi":"西奥·卢茨1932年生于德国，在斯图加特和蒂宾根学习数学、物理和电子学，成为哲学家马克斯·本泽的学生，与斯图加特信息美学学派相联结。1959年他加入斯图加特-祖芬豪森的标准电气洛伦茨公司，后移至IBM德国，领导产品预测部门。\n\n1959年，他用Zuse Z22计算机编程创作了《随机文本》，这被视为最早的计算机生成文学作品之一，以马尔可夫链和随机过程探索卡夫卡文本中单词的算法重组，在计算机生成文学史上留下了不可磨灭的印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Stochastische_Texte_Augenblick_14_Theo_Lutz_Max_Bense_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.4484&fp-y=0.09&dm=1774059439&s=c52c190f5424da2b8b1b5e1f8ae7e63f","l":["Theo Lutz / Max Bense","1959","Prose/Poetry (Computer-Generated)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/rot_6_Theo_Lutz_Max_Bense_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058671&s=b790208af574310435cef689d2c6bc86","l":["Theo Lutz / Max Bense","1961","Prose/Poetry (Computer-Generated)"]}]},"eduardo-mac-entyre":{"n":"Eduardo Mac Entyre","nc":"阿根廷","ne":"Argentinian","b":"1929","d":"2014","i":"爱德华多·麦克·恩提雷是一位开创性艺术家，早在数字时代到来之前便发展出复杂的手绘算法构图。他在布宜诺斯艾利斯创立生成艺术运动和艺术与控制论小组方面发挥了关键作用，成为拉丁美洲计算机辅助创作的先驱。","bi":"爱德华多·麦克·恩提雷1929年生于阿根廷布宜诺斯艾利斯，父亲是苏格兰人，母亲是比利时人。约二十岁开始发展艺术技能，灵感来自丢勒、小汉斯·霍尔拜因和伦勃朗等经典艺术家。虽然基本上是自学成才，他也学习了工业机械制图，曾任平面与工业设计师。他发展出在数字时代到来之前便已复杂的手绘算法构图，在创立布宜诺斯艾利斯生成艺术运动和艺术与控制论小组方面发挥了关键作用，成为拉丁美洲将数学原理与艺术实践相融合的最重要先驱之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Generative_Serigraph_Eduardo_Mac_Entyre_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804897&s=cfe007a3c87b01b70e0014bc9a296db2","l":["Untitled Generative Serigraph","Eduardo Mac Entyre","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Collage_Eduardo_Mac_Entyre_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802018&s=82b8fb6e36b430e5cffece4a4668a4d8","l":["Untitled Collage","Eduardo Mac Entyre","1972 (circa)","Collage"]}]},"robert-mallary":{"n":"Robert Mallary","nc":"美国","ne":"American","b":"1917","d":"1997","i":"罗伯特·马拉里是一位开创性的雕塑家和计算机艺术家，将工业材料和定制软件转化为全新的图像与形式模式。从树脂浸渍的装配艺术到计算机辅助雕塑和算法大地艺术，他的实践横跨多种媒介，探索技术如何拓展雕塑的边界。","bi":"罗伯特·马拉里1917年生于俄亥俄州托莱多，在加利福尼亚州伯克利长大，幼年便开始学习艺术，并对墨西哥壁画家产生浓厚兴趣。这促使他在1940年代赴墨西哥，师从何塞·克莱门特·奥罗斯科和大卫·阿尔法罗·西盖罗斯。受西盖罗斯使用工业材料的启发，马拉里开始以树脂浸渍的垃圾和工业废料进行实验，创作引人入胜的装配艺术作品，探索材料与形式的边界。他后来将定制计算机软件引入雕塑创作，开发了名为TRAN2的程序，用以设计复杂的雕塑和大地艺术项目，成为最早将计算机系统整合进雕塑实践的艺术家之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_plotter_Robert_Mallary_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058898&s=263646bd04b2791d25ebf7b2817bdefe","l":["Untitled plotter","Robert Mallary","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251119_190200.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608034&s=1c6ba522474bf3ced1b2c846f4dca43c","l":["20251119 190200","Robert Mallary","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251119_190404.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608432&s=b4ddf974a5abf94e3a696782df644a40","l":["20251119 190404","Robert Mallary","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251119_190001.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608488&s=607885500a5cea1a1ca77253c752cf68","l":["20251119 190001","Robert Mallary","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251119_190256.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608619&s=c649bcec1e1d8f16683bbfe0f7901ab6","l":["20251119 190256","Robert Mallary","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251119_190311.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608855&s=42f599078ff0949521aafbb7c3bb4ccb","l":["20251119 190311","Robert Mallary","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251119_190118.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673261&s=28382d05fe22b0b83c162cda0a548c10","l":["20251119 190118","Robert Mallary","1975","Plotter Drawing"]}]},"orkhan-mammadov":{"n":"Orkhan Mammadov","nc":"阿塞拜疆","ne":"Azerbaijanis","b":"1990","d":"","i":"奥尔汗·马马多夫创作探索技术、记忆与文化身份的生成艺术和沉浸式装置，以数据和人工智能构建能够引发多元受众深层共鸣的作品。","bi":"奥尔汗·马马多夫1990年生于阿塞拜疆甘贾，从小对技术和设计充满热情，自学平面和网页设计。他在海扎大学获得计算机科学学士学位，并在多所国际院校学习设计与视觉传达。其教育历程多元且国际化，体现了他跨学科的创作取向。他以数据和人工智能创作探索技术、记忆与文化身份的生成艺术和沉浸式装置，将阿塞拜疆文化背景与当代数字艺术实践相融合。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Alcibiades_on_his_knees_before_his_mistress_Orkhan_Mammadov_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805473&s=c5eb054b10deeb305294461f9e64eb36","l":["Alcibiades on his knees before his mistress","Orkhan Mammadov"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Autumn_Orkhan_Mammadov_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805691&s=956e3f4786f6e0bfd45597a5da20269b","l":["Autumn","Orkhan Mammadov","2025"]}]},"william-mapan":{"n":"William Mapan","nc":"法国","ne":"French","b":"1988","d":"","i":"威廉·马潘是一位法国艺术家，将素描和色彩研究转化为算法，创作携带绘画质感的数字作品。他以代码作为引入变化与不确定性的手段，在精确性与意外性之间探索创作空间。","bi":"威廉·马潘1988年生于法国，现驻巴黎。他在布卢瓦理工大学学习多媒体和传播，2012年在巴黎高布兰学院完成网络与移动数字创作与开发课程，此后在广告和技术行业担任创意开发者逾十年。\n\n他将素描和色彩研究转化为算法，创作携带绘画质感的数字作品，以代码作为引入变化与不确定性的手段，在精确性与意外性之间探索创作空间。他的代表作《Dragons》（Art Blocks）在链上生成艺术领域引发广泛关注，以将传统绘画感知与算法精确性相融合的独特方式著称。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Strands_of_Solitude_113_William_Mapan_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059514&s=5f426590c84a572dcf5aab2564df9eaa","l":["Strands of Solitude 113","William Mapan","2023","NFT/Digital"]}]},"aaron-marcus":{"n":"Aaron Marcus","nc":"美国","ne":"American","b":"1943","d":"","i":"亚伦·马库斯是计算机图形学、人机交互和用户体验设计的先驱，被公认为最早使用计算机的平面设计师和Aaron Marcus and Associates公司的创始人，其极具影响力的职业生涯横跨图形设计、用户体验和数字传播领域。","bi":"亚伦·马库斯1943年生于内布拉斯加州奥马哈，是计算机图形学和用户体验设计领域的开拓性人物。作为最早使用计算机的平面设计师（1967年），他为数字排版、界面设计和信息可视化奠定了基础。他在普林斯顿大学学习物理和哲学，后在耶鲁大学获得美术学士学位，在耶鲁大学设计学院研究生阶段师从保罗·兰德等重要设计师。他创立了Aaron Marcus and Associates公司，在图形设计、人机交互和数字传播领域拥有极具影响力的职业生涯，著有多部关于界面设计和信息可视化的重要著作。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Noise_Barrier_Aaron_Marcus_11202025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673244&s=59f88cc43025a2adddf1054cb5935e85","l":["Noise Barrier","Aaron Marcus","1974","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Soft_Where_Inc._Aaron_Marcus_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805087&s=83e8c1bc909659a23ae5072bd765ac1a","l":["Soft Where Inc.","Aaron Marcus","1975","Book"]}]},"lenia-mascha":{"n":"Lenia Mascha","nc":"希腊","ne":"Greek","b":"0204","d":"","i":"莱尼亚·马沙是一位建筑师兼艺术家，其作品探索技术与工艺的交汇。她使用机器人系统和生成方法创作绘图、装置和原型，以建筑思维重新思考人机协作的边界。","bi":"莱尼亚·马沙是驻维也纳的希腊建筑师和艺术家，在塞萨洛尼基亚里士多德大学获得建筑学文凭，在维也纳应用艺术大学取得城市策略研究生硕士学位，是希腊技术协会的注册建筑师。她曾在维也纳应用艺术大学执教一年，并参与多项国际项目。她使用机器人系统和生成方法创作绘图、装置和原型，以建筑思维探索技术与工艺的交汇，重新思考人机协作的边界与可能。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Silver_Lining_240204_Lenia_Mascha_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805170&s=450cb3dbf422e3814c69f5354459975d","l":["Silver Lining 240204","Lenia Mascha","2024"]}]},"maughan-sterling-mason":{"n":"Maughan Sterling Mason","nc":"美国","ne":"American","b":"1931","d":"2003","i":"莫恩·斯特林·梅森使用模拟计算机和编程创作计算机生成艺术，制作出现于《控制论的奇缘》等重要早期展览的几何和莫尔纹图案作品，是美国早期计算机艺术社区的重要成员。","bi":"莫恩·斯特林·梅森1931年生于犹他州奥格登，1952年在杨百翰大学获得物理学学士学位，1953年获得物理学硕士学位，随后在新墨西哥州白沙导弹靶场担任监督物理学家。1959年起担任模拟计算机部门负责人，利用这一职位开发出以模拟计算机和编程创作的几何和莫尔纹图案艺术作品，这些作品在《控制论的奇缘》等重要早期计算机艺术展览中亮相，使他成为美国早期计算机艺术社区的重要成员。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Asymmetry_Maughanogram_Maugham_Sterling_Mason_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058799&s=2f78cfaf859cceb1c5d5982436f13dcd","l":["Asymmetry ogram Maugham","Maughan Sterling Mason","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]}]},"max-vernon--mathews":{"n":"Max Vernon Mathews","nc":"美国","ne":"American","b":"2011","d":"","i":"马克斯·弗农·马修斯常被称为「计算机音乐之父」，在贝尔实验室开发了包括MUSIC编程语言系列和单元发生器概念在内的突破性技术，这些成就至今仍是数字音乐的基础。","bi":"马克斯·弗农·马修斯1926年生于纽约州鲍尔斯顿斯帕，从小学习小提琴，对古典音乐——尤其是勃拉姆斯和理查德·施特劳斯——有深厚热情。二战服役期间他经常去西雅图一个收听室，沉浸在当时新奇的交响乐录音中。战后在麻省理工学院学习电气工程，1950年获得学士学位，1954年在麻省理工学院获得博士学位。加入贝尔实验室后，他在那里开发了MUSIC系列编程语言（MUSIC I到MUSIC V）和单元发生器概念——这些工具成为数字音乐的基础，奠定了他「计算机音乐之父」的历史地位。他于2011年辞世。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_Musik_der_Senoi_Mayala_Native_Music_Max_Vernon_Mathews_Bell_Telephone_Labs_Hans_Oesch_Hermann_Scherchen_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059311&s=25063eec0db5b47527a49ae0fd6c451d","l":["Multiple Artists"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Voice_of_the_Computer_Max_Vernon_Mathews_Jean-Claude_Raoul_Olivier_Risset_James_Tenney_Wayne_Slawson_Roger_Newland_Shepard_John_Robinson_Pierce_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058676&s=9a12a9ebf5941ff34860ed9773d3f2f2","l":["Multiple Artists","1970"]}]},"marc-maurer":{"n":"Marc Maurer","nc":"德国","ne":"","b":"1990","d":"","i":"马克·毛尔是一位以抽象艺术和涂鸦为背景的生成艺术家，在数字与实体过程之间游走。2021年发现生成艺术后，他以传统艺术工具和定制绘图仪构建独特的视觉语言，通过系统探索色彩与形态的形成方式。","bi":"马克·毛尔是以抽象艺术和涂鸦为根基的生成艺术家。2021年发现生成艺术后，他感受到在数字空间延续创作的强烈冲动，认为该领域从概念上与他之前的实践相连。在一次挑战中，他成功用JavaScript创作出作品后，对生成艺术的热情便一发不可收。他在数字与实体过程之间游走，以传统艺术工具和定制绘图仪构建独特的视觉语言，通过系统探索色彩与形态的形成方式，持续在算法精确性与手工制作的感性之间寻求平衡。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plotter_work_RE_02_Marc_Maurer_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805455&s=d656c8fcd13da43fcbc4aa1e7b113872","l":["Plotter work RE 02","Marc Maurer","2022","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plotter_work_RE_03_Marc_Maurer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805186&s=d43a9904d6651cc09c257cacd037dfcc","l":["Plotter work RE 03","Marc Maurer","2023","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Glance_12_Marc_Maurer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058713&s=cd6460c7069d7c56458141d6621bf3b5","l":["Glance 12","Marc Maurer","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Glance_8_Marc_Maurer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059423&s=55b48444f9641ebb188aac36a5d907bc","l":["Glance 8","Marc Maurer","2024","Plotter Drawing"]}]},"hansjrg-mayer":{"n":"Hansjörg Mayer","nc":"德国","ne":"German","b":"2019","d":"","i":"汉斯约格·迈尔将语言视为视觉媒介，探索结构、偶然性与精确性如何在印刷页面上塑造意义。他的排版作品和艺术家书籍揭示了对文本与印刷材料特质的终生迷恋，以及信息美学对其实践的深远影响。","bi":"汉斯约格·迈尔1943年生于斯图加特一个印刷商家庭，在传统印刷工具与传统的熏陶下成长，早年便对文字与印刷的物质特质产生浓厚兴趣。完成印刷与排版学徒期并在斯图加特接受正规培训后，他在哲学家马克斯·本泽的指导下学习，信息美学理论对其日后的排版探索产生了深远影响。他发展出将语言作为视觉媒介探索的创作实践，以结构、偶然性与精确性为核心，创作了丰富的排版作品和艺术家书籍，成为德国具体诗歌与视觉文字运动的重要人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/futura_13_-_frieder_nake_-_computer_grafik_Frieder_Nake_Hansjo%CC%88rg_Mayer_11102025_2026-03-21-021056_jphu.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059056&s=266f14b5a4bbeaf46b89882e551e3b0c","l":["Frieder Nake / Hansjörg Mayer","1966","Print"]}]},"huw-messie":{"n":"Huw Messie","nc":"美国","ne":"","b":"1995","d":"","i":"许·梅西是驻纽约的艺术家兼技术专家，以计算性刺绣的创新工作著称，将代码与工艺融合，把动态图像转化为缝制动画，荣获2024年Smithsonian杂志美国独创性奖。","bi":"许·梅西是驻纽约的艺术家兼技术专家，2021年毕业于卡内基梅隆大学艺术学院，学习人机交互和时基媒体。他的计算性刺绣实践——以代码将动态图像转化为缝制动画——赢得了广泛认可，包括2024年Smithsonian杂志美国独创性奖。他的项目探索数字与手工的边界，以技术精确性与传统工艺的融合呈现令人惊异的视觉体验。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Perpetual_Insufficiency_Huw_Messie_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805638&s=634be0bbe1c2459efc59a3a3a024a0df","l":["Perpetual Insufficiency","Huw Messie","2024","Textile"]}]},"sarah-meyohas":{"n":"Sarah Meyohas","nc":"法国/美国","ne":"French/American","b":"1991","d":"","i":"萨拉·梅约哈斯探索意义如何通过价值与感知系统形成。她的作品使用区块链和人工智能等技术揭示信任、作者身份和权力背后的机制，2015年发行了第一个已知的区块链加密艺术作品。","bi":"萨拉·梅约哈斯1991年生于纽约，在宾夕法尼亚大学沃顿商学院获得金融学士学位和国际关系学士学位，2015年在耶鲁大学获得视觉艺术硕士学位。还是研究生时，她便开始使用区块链技术审视价值是如何被构建和感知的，发行了第一个已知的区块链加密艺术作品——《玫瑰情人》（Rosewater），以此探索价值、欲望和数字稀缺性之间的关系。她的创作使用区块链和人工智能等技术揭示信任、作者身份和权力背后的机制，以批判性视角审视技术如何改变价值的意义。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bitchcoin_01.101_Sarah_Meyohas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059303&s=f8603f07446bd00a0716a98e86a84f6a","l":["Bitchcoin 01.101","Sarah Meyohas","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bitchcoin_05.075_pressed_petal_Sarah_Meyohas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059313&s=321613e0c13a159cd3fbf500b51a76ec","l":["Bitchcoin 05.075 pressed petal","Sarah Meyohas","2021","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Infinite_Petals_5x5781_Sarah_Meyohas_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058817&s=b50318cc89d6ec8acfb4f423065e9deb","l":["Infinite Petals 5x5781","Sarah Meyohas","2025"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Infinite_Petals_10x102064_Sarah_Meyohas_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059006&s=b03a25191f1f6bedd28a477a9e0c7c65","l":["Infinite Petals 10x102064","Sarah Meyohas","2025"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Infinite_Petals_2x23648_Sarah_Meyohas_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059424&s=0d7a04bf2fc2b78248af72cf7849e2d0","l":["Infinite Petals 2x23648","Sarah Meyohas","2025"]}]},"leslie-mezei":{"n":"Leslie Mezei","nc":"匈牙利/加拿大","ne":"Hungarian-Canadian","b":"1948","d":"","i":"莱斯利·梅泽是匈牙利裔加拿大计算机科学家，创建了最早的计算机图形编程语言之一。他基于FORTRAN的SPARTA和ARTA系统使用户能够生成绘图、动画和实体模型，是加拿大早期数字艺术的重要推动者。","bi":"莱斯利·梅泽1931年生于匈牙利格德勒，1948年作为大屠杀幸存者和战争孤儿来到加拿大，被蒙特利尔一个家庭收养，在那里完成高中学业，后在麦吉尔大学学习数学和物理，1953年获得学士学位，次年获得硕士学位。\n\n他后来在多伦多大学担任计算机科学教授，在那里开发了最早的计算机图形编程语言之一：SPARTA（空间规划与建筑研究工具和技术）和ARTA（建筑研究工具和技术），这些基于FORTRAN的系统使用户能够生成绘图、动画和实体模型，是加拿大早期数字艺术和计算机辅助设计的重要基础设施。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Electronic_Computer_as_an_Artist_Canadian_Art_Magazine_Leslie_Mezei_Arnold_Rockman_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058668&s=f4d45f0e8b66cd60a724012157b9471a","l":["Leslie Mezei / Arnold Rockman","1964","Ephemera"]}]},"konrad-michel":{"n":"Konrad Michel","nc":"","ne":"","b":"2025","d":"","i":"Email Newsletter\n\nSign up to receive the occasional news and stories from the world of computer art.","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_2_Konrad_Michel_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058787&s=9b25684ba92f980610bfe34408d958ad","l":["Untitled 2","Konrad Michel","1975 (circa)","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_1_Konrad_Michel_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059455&s=53d431d9e4a5eb67ad5f9ffa93e31f2d","l":["Untitled 1","Konrad Michel","1975 (circa)","Plotter Drawing"]}]},"micro-works-computer-portrait-system":{"n":"Micro-Works Computer-Portrait System","nc":"美国","ne":"American","b":"1974","d":"","i":"Micro Works数字转换器通过将实时视频转化为由数千个细小圆点构成的像素化黑白图像，创作了早期的数字肖像，在博览会、购物中心和公共场所展示，是计算机在视觉艺术中最早的民主化应用之一。","bi":"Micro Works数字转换器是1970年代中期为SWTPC 6800微型计算机设计的早期视频数字化设备，以1974年推出的先驱芯片摩托罗拉6800微处理器为核心。该系统使SWTPC 6800能够捕捉和数字化实时视频，将其转化为像素化的黑白图像。\n\n通过将实时视频转化为由数千个细小圆点构成的像素化图像，它在博览会、购物中心和公共活动中创作了早期的数字肖像，是计算机技术在视觉艺术中最早的民主化应用之一，将当时只有科研机构才能接触的计算机图像带入了普通公众的生活。","aw":[]},"tomislav-mikulic":{"n":"Tomislav Mikulic","nc":"克罗地亚","ne":"Croatian","b":"1953","d":"","i":"托米斯拉夫·米库利奇是一位克罗地亚裔艺术家，自1970年代初便开始使用计算机图形创作，从绘图仪绘图和早期动画延伸至CGI，探索算法系统如何在数学逻辑的约束下生成有机形态。","bi":"托米斯拉夫·米库利奇1953年生于克罗地亚，1971年开始在萨格勒布大学电气工程与计算学院学习电子工程，次年又入读萨格勒布美术学院，以双重学历发展出融合工程与艺术的创作实践。除艺术创作外，他在广播和媒体设计领域追求职业发展，在萨格勒布从事相关工作多年。自1970年代初便开始使用计算机图形进行艺术创作，从绘图仪绘图和早期动画延伸至CGI，探索算法系统如何在数学逻辑的约束下生成有机形态。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Roto_Morph_360_Tomislav_Mikulic_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801456&s=1762e36aa10a212dd83e00a872384418","l":["Roto Morph 360","Tomislav Mikulic","1973","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rotmo_2_Tomislav_Mikulic_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802065&s=61b91d4bbd9e1e07339dcfbd6809033c","l":["Rotmo 2","Tomislav Mikulic","1973","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rota_45_Tomislav_Mikulic_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804895&s=2dde256aeef26d6182264bf2ece93239","l":["Rota 45","Tomislav Mikulic","1973","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rotmo_1_Tomislav_Mikulic_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805224&s=3fc52ecd4d58042360d79d75b325e3fa","l":["Rotmo 1","Tomislav Mikulic","1973","Plotter Drawing"]}]},"john-f-miller":{"n":"John F. Miller","nc":"美国","ne":"American","b":"1927","d":"2021","i":"约翰·F·米勒横跨绘画、拼贴和数字媒介探索结构、色彩与笔触的相互作用，从表现性具象演变为几何抽象。晚年他将数字工具引入创作，发展出新的视觉探索路径。","bi":"约翰·F·米勒1927年生于伊利诺伊州普林斯顿，1946至1947年在朝鲜服役期间为军事设施设计标识。回国后在芝加哥艺术学院和芝加哥大学深造。1953年他在芝加哥创立了414艺术工作坊画廊，成为当地艺术社区的重要场所。他横跨绘画、拼贴和数字媒介探索结构、色彩与笔触的相互作用，创作风格从表现性具象演变为几何抽象，晚年将数字工具引入创作，发展出新的视觉探索路径。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Horizontal_Detritus_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803959&s=d10f4ecaf70e3615d21ec6187742b07d","l":["Horizontal Detritus F.","John F. Miller","2000","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_%E2%80%93_Geometric_Study_-_Diamond_in_Green_Black_Blue_John_F._Miller_11102025_2026-03-21-020703_msfx.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058823&s=01d6bd1db5df41eeb49bc562f183a741","l":["Untitled %E2%80%93 Geometric Study - Diamond in Green Black Blue F.","John F. Miller","2002","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_-_Circle_Over_Bar_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805478&s=fc2722fc7fc12dd9350c7fbf8b5af253","l":["Untitled - Circle Over Bar F.","John F. Miller","2002","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_%E2%80%93_Geometric_Study_with_Shield_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805283&s=fe5182069ffe066a6c987fc5b0444c4c","l":["Untitled %E2%80%93 Geometric Study with Shield F.","John F. Miller","2004","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Number_Painting_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802906&s=24a22c5cf52e6f9bfc19cded7e4ffa32","l":["Number Painting F.","John F. Miller","2004 (circa)","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rectangular_Mapping_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805172&s=be1eea318471da315ba5b1d1be0a914b","l":["Rectangular Mapping F.","John F. Miller","2004 (circa)","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_1_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059218&s=6429d337f93100f15c2583c1da8fb9cc","l":["Untitled 1 F.","John F. Miller","2004 (circa)","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_2_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059522&s=01190ad64b6a30527baa2ad6de108126","l":["Untitled 2 F.","John F. Miller","2004 (circa)","Print (Digital)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_-_Blue_Olive_Green_and_Purple_John_F._Miller_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059354&s=b5116d6192c0e25bfa33086b16764ae3","l":["Untitled - Blue Olive Green and Purple F.","John F. Miller","2006","Print (Digital)"]}]},"manfred-mohr":{"n":"Manfred Mohr","nc":"德国","ne":"German","b":"1938","d":"","i":"曼弗雷德·莫尔是数字与算法艺术的先驱，通过数学规则和计算机编程创作精确的几何构图，从1960年代起系统探索超立方体（n维立方体）的视觉可能性，以简约的数学语言构建令人着迷的视觉宇宙。","bi":"曼弗雷德·莫尔1938年生于德国普福尔茨海姆，最初接受金匠培训，后转向绘画和爵士音乐。1960年代在巴黎美术学院学习后，他开始探索计算机作为艺术媒介的可能性，受哲学家马克斯·本泽和艺术家皮埃尔·鲍比拉蒂的影响，发展出以数学规则和计算机编程为核心的创作实践。\n\n1969年他创作了第一批算法作品，此后数十年持续深入探索超立方体（n维立方体）的视觉可能性，以简约的数学语言构建令人着迷的视觉宇宙。他的作品在全球主要博物馆和机构展出，被视为数字艺术史上最具代表性的实践之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Formal_Language_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059331&s=d8e041734700e19af3f51ff63cd7d0c4","l":["Untitled Formal Language","Manfred Mohr","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Art_Ex_Machina_portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Frieder_Nake_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058901&s=faa0d28f9364f34911d1586ca6cc4b40","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Theoretical_Space_Projection_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805211&s=876aa1cd25c3553a662a66fe21b8f44c","l":["Theoretical Space Projection","Manfred Mohr","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/SDL_Portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Georg_Nees_John_Roy_Zdene%CC%8Ck_Sy%CC%81kora_Roger_Vilder_11102025_2026-03-21-021728_mnnn.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059448&s=56218910ce19af914f2bb8e7f42f590e","l":["Multiple Artists","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/cubic_Limit_Manfred-Mohr_12012025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764590365&s=a55fd0bae9cc944a6720f07e6be22727","l":["cubic Limit","Manfred Mohr","1975","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Print_1_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805666&s=33391d4af5b6ad386536f7b96fd50fda","l":["Print 1","Manfred Mohr","1976","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Print_6_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805253&s=5f5e5816eea32c34f18eb2ea63cecf70","l":["Print 6","Manfred Mohr","1976","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Print_3_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805338&s=aa0b396d8cdbcce852c12166fef0e491","l":["Print 3","Manfred Mohr","1976","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Scratch_code_portfolio_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058966&s=9605ee7f08492ff411720cab64c44465","l":["Scratch code portfolio","Manfred Mohr","1976","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Print_8_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803348&s=a2a68c66a5a79720b5edca1e1bfd4e2f","l":["Print 8","Manfred Mohr","1976","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Print_4_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802782&s=5320f57e5ed8610b3b68566ae49c9e14","l":["Print 4","Manfred Mohr","1976","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Print_2_Manfred_Mohr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805562&s=0d0d735dbb756bb9c243cfa1be86ff5e","l":["Print 2","Manfred Mohr","1976","Print"]}]},"abraham-moles":{"n":"Abraham Moles","nc":"法国","ne":"French","b":"1920","d":"1992","i":"亚伯拉罕·安德烈·莫尔斯是法国工程师、哲学家和学者，其跨学科工作为信息科学、传播学和社会心理学奠定了重要基础，以将科学方法应用于审美与文化现象著称，对信息美学和早期计算机艺术的理论发展产生了深远影响。","bi":"亚伯拉罕·安德烈·莫尔斯1920年生于法国巴黎，在格勒诺布尔大学学习电气和声学工程后，以研究助理身份开始职业生涯，在著名教授费利克斯·埃斯克朗贡和路易·内尔的指导下工作。这段早期经历赋予了他扎实的技术基础。\n\n他后来在斯特拉斯堡大学和法国其他高校担任教授，将科学方法应用于审美与文化现象，发展出以数学和信息论分析艺术与传播的理论框架。他的《审美信息论》将艺术体验的分析带入了定量研究的领域，对信息美学和早期计算机艺术的理论发展产生了深远影响。","aw":[]},"franois-molnr":{"n":"François Molnár","nc":"匈牙利","ne":"Hungarian","b":"1922","d":"1993","i":"弗朗索瓦·莫尔纳以心理学和数学工具将艺术作为研究领域，探索我们如何感知形式、平衡与转变。他对图案和视觉感知的实验使他成为生成艺术与计算美学早期理论的重要贡献者。","bi":"弗朗索瓦·莫尔纳1922年生于匈牙利，是艺术家兼研究者，一生致力于理解感知、结构与视觉秩序之间的关系。1947年在布达佩斯美术学院毕业后，他与合作伙伴薇拉·莫尔纳一同移居巴黎，加入当地的匈牙利流亡艺术家群体。在那里，他将艺术创作与心理学和数学研究相结合，以工具性方法探索我们如何感知形式、平衡与转变，成为生成艺术与计算美学早期理论的重要贡献者，并在巴黎第一大学实验视觉艺术研究中心（CREAV）发展了这一研究路径。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Plotter_Vera_Molna%CC%81r_Franc%CC%A7ois_Molna%CC%81r_11102025_2026-03-21-021659_wvpr.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059419&s=919a118747319dd42d78967eec8c0ed8","l":["Vera Molnár / François Molnár","1974","Plotter Drawing"]}]},"vera-molnr":{"n":"Vera Molnár","nc":"匈牙利","ne":"Hungarian","b":"1924","d":"","i":"薇拉·莫尔纳将几何形式转化为一种扰动的语言——她用规则构建秩序，又刻意打破它，从而揭示新的形式。她毕生在系统与直觉之间展开对话，是最早证明机器可以延伸人类想象力的艺术家之一。","bi":"薇拉·莫尔纳1924年生于布达佩斯，1942至1947年就读于布达佩斯美术学院，学习绘画、艺术史与美学，1946年创作了第一批非具象作品。在法语教师弗朗索瓦·加肖的引领下，她在学期间接触到被匈牙利共产主义政权压制的现代艺术。\n\n1947年获法国奖学金赴罗马研习，随后定居巴黎，与弗朗索瓦·莫尔纳共同生活和创作。1960年她创造了「假想计算机」（machine imaginaire）——在计算机面世之前，用纸笔规则系统模拟算法创作的方法。1967年与他人共同创立「艺术与信息学」机构，翌年开始创作算法绘图，成为法国最早用绘图仪创作算法作品的艺术家之一。2022年创作了首批NFT作品，2023年在巴黎辞世，享年99岁。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Plotter_Vera_Molna%CC%81r_Franc%CC%A7ois_Molna%CC%81r_11102025_2026-03-21-021659_wvpr.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059419&s=919a118747319dd42d78967eec8c0ed8","l":["Vera Molnár / François Molnár","1974","Plotter Drawing"]}]},"ivan-murit":{"n":"Ivan Murit","nc":"法国","ne":"French","b":"1990","d":"","i":"伊万·穆里是艺术家兼设计师，其作品探索自然系统与计算过程如何交汇以塑造视觉语言。以代码为创意工具，他创作融合视觉研究与计算生物学的生成作品，在精确算法与有机涌现形态之间探索独特的视觉语言。","bi":"伊万·穆里1990年生于斯特拉斯堡，是驻巴黎的艺术家兼平面设计师，在雷恩和瓦朗斯学习艺术与设计，2015年完成文凭。凭借自学的计算机编程背景，他以代码为创意工具，结合视觉研究与计算生物学，创作探索自然系统与计算过程如何塑造视觉语言的生成作品，在精确算法与有机涌现形态之间发展出独特的创作语言。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mechanical_Fall_2_Ivan_Murit_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803475&s=88ee7e8c5df42da226617caaac95be86","l":["Mechanical Fall 2","Ivan Murit","2018"]}]},"agoston-nagy":{"n":"Agoston Nagy","nc":"匈牙利","ne":"Hungarian","b":"1981","d":"","i":"阿戈斯顿·纳吉是驻布达佩斯的艺术家兼研究者，其算法作品通过开源工具、动态系统和沉浸式装置架起技术、自然与人类感知之间的桥梁，探索认知计算与具身体验的边界。","bi":"阿戈斯顿·纳吉1981年生于匈牙利布达佩斯，是专注于算法艺术的艺术家兼研究者，以自由和开源工具进行创作。他设计面向网络化交互和现场表演的动态系统与界面，并开发创意移动应用程序。他的兴趣涵盖认知计算与具身体验，通过开源工具、动态系统和沉浸式装置架起技术、自然与人类感知之间的桥梁，在布达佩斯发展出独特的生成艺术实践。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Procedural_Drawing_10_Agoston_Nagy_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059528&s=721951076f68487b09494f7c0f31861f","l":["Procedural Drawing 10","Agoston Nagy","2024","Plotter Drawing"]}]},"monique-nahas":{"n":"Monique Nahas","nc":"法国","ne":"French","b":"1960","d":"1991","i":"莫妮克·纳阿斯是艺术家兼物理学家，其早期计算机和算法艺术探索了计算逻辑如何通过编程和数学连续性创造视觉形式。","bi":"莫妮克·纳阿斯是以计算机和算法艺术开创性工作著称的法国艺术家兼物理学家，1940年生，在奥尔赛大学理工学院学习，获得理论物理学博士学位。她与埃尔韦·惠特里克长期合作，是最早持续探索计算色彩与形式的实践者之一，发展了通过编程和数学连续性创造视觉形式的方法，在法国计算机艺术史上留下重要印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_punch_cards_Monique_Nahas_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059196&s=fef344686dd9ed6d1e9c82bbfa193a05","l":["Monique Nahas / Hervé  Huitric","1972","Painting"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_digital_painting_Monique_Nahas_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059223&s=136fd278adb489a24591406e4f17669f","l":["Untitled digital painting","Monique Nahas","1975","Print"]}]},"shojiro-nakaoka":{"n":"Shojiro Nakaoka","nc":"日本","ne":"Japanese","b":"1974","d":"","i":"中岡将二郎是日本作曲家、音效设计师和视听艺术家，创作声音生成视觉形式的系统，横跨编程、实时表演和笔式绘图仪绘图。","bi":"中岡将二郎1974年生，是日本作曲家、音效设计师和视听艺术家，其作品将电子信号转化为不断演化的视觉与声音形式。他探索声音、代码与图像的边界地带，创作声音生成视觉形式的系统，横跨编程、实时表演和笔式绘图仪绘图，以音乐逻辑构建视觉体验。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/OUT_PLACE_no._3_Shojiro_Nakaoka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803198&s=206773c73972718a269225ac13cb0f76","l":["OUT PLACE no. 3","Shojiro Nakaoka","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Fingertip_no._6_Shojiro_Nakaoka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804959&s=790b35549fd80acc69764f78a4a04461","l":["Fingertip no. 6","Shojiro Nakaoka","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Fingertip_no._8_Shojiro_Nakaoka_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805076&s=d123b19281f3594789b9f73315679cfb","l":["Fingertip no. 8","Shojiro Nakaoka","2024","Plotter Drawing"]}]},"frieder-nake":{"n":"Frieder Nake","nc":"德国","ne":"German","b":"1938","d":"","i":"弗里德尔·纳克是德国数学家和数字艺术先驱，从1960年代初便开始创作算法绘图，是最早将计算机用于艺术的人之一。他的工作横跨计算机科学与艺术理论，塑造了生成艺术的理论基础。","bi":"弗里德尔·纳克1938年生于德国斯图加特，是数学家和数字艺术开创性人物，职业生涯大部分在不来梅度过。在斯图加特大学获得概率论博士学位后，他于1963至1965年间开始创作计算机生成的算法图像，与格奥尔格·尼斯、曼弗雷德·莫尔并列为计算机艺术最早的公开展示者。他以数学家和艺术理论家的双重身份，深入探索了计算美学的边界，著有大量关于计算机图形学与艺术的文章，对生成艺术的理论发展产生了深远影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Random_Polygon_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805014&s=c8da6bf61f9f656de92dca3b11f28f7b","l":["Random Polygon","Frieder Nake","1965","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/25265_Nr._14_Frieder_Nake_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805383&s=f08bffe7cceff13be62e6e72af5d8627","l":["25265 Nr. 14","Frieder Nake","1965","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Nr._6_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805665&s=99040368501be439c97faae10b5cd597","l":["Nr. 6","Frieder Nake","1965","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rectangular_Hatching_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803150&s=ee0968888a3da75aacb96976f896e1e2","l":["Rectangular Hatching","Frieder Nake","1965","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/16_4_66_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5107&fp-y=0.4797&dm=1763328594&s=190837da98ca58e1068c2a592a0b1c63","l":["Multiple Artists","1966","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/futura_13_-_frieder_nake_-_computer_grafik_Frieder_Nake_Hansjo%CC%88rg_Mayer_11102025_2026-03-21-021056_jphu.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059056&s=266f14b5a4bbeaf46b89882e551e3b0c","l":["Frieder Nake / Hansjörg Mayer","1966","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Hommage_a%CC%80_Paul_Klee_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805056&s=267ebf01f916b5e247f5e79280c8fe50","l":["Hommage a%CC%80 Paul Klee","Frieder Nake","1966","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Computer-Generated_Choreogramme_for_Otto_Beckmann_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059347&s=b594ad26f04363ee100782597ba26337","l":["Untitled Computer-Generated Choreogramme for Otto Beckmann","Frieder Nake","1966","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Walk_Through_Raster_7.3-1_Frieder_Nake_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058732&s=b79e33a0ec97cbaef3204f7c9fc7bad7","l":["Walk Through Raster 7.3-1","Frieder Nake","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Art_Ex_Machina_portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Frieder_Nake_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058901&s=faa0d28f9364f34911d1586ca6cc4b40","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Walk-Through-Raster_Vancouver_Version_Frieder_Nake_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805118&s=810a8f4b7755c7ac81b07190aa4a96b5","l":["Walk-Through-Raster Vancouver Version","Frieder Nake","1972","Print"]}]},"georg-nees":{"n":"Georg Nees","nc":"德国","ne":"German","b":"1926","d":"2016","i":"格奥尔格·尼斯是德国数学家和计算机艺术先驱，1960年代成为最早公开展示算法生成图像的艺术家之一，与弗里德尔·纳克并肩开创了计算机艺术的历史。","bi":"格奥尔格·尼斯1926年生于德国纽伦堡，是最早将计算机用于艺术创作的人之一。他在埃尔朗根学习数学和物理，后转向哲学，在斯图加特大学获得博士学位。1965年，他在斯图加特美术学院举办了世界上最早的计算机艺术展览之一，以西门子2002计算机创作的算法绘图震惊艺术界。他在西门子公司担任工程师期间，将数学原理与艺术创作相融合，开创了计算机艺术的重要先例。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/rot_19_-_computer-grafik_Georg_Nees_Max_Bense_Computer_Siemens_2002_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059429&s=73fb5698d0302f6bc182b0011a74376c","l":["Multiple Artists","1965","Book"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Kugel_in_einer_Kugel_Sphere_in_a_Sphere_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805042&s=dbd8306a38df08b3df4f076289cfc29e","l":["Kugel in einer Kugel Sphere in a Sphere","Georg Nees","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plastik_1_Sculpture_1_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805596&s=dd995cce0dacfc3c6d1ff0514c5d8c55","l":["Plastik 1 Sculpture 1","Georg Nees","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Flur_Korridor_Hall_Corridor_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805294&s=d10b9d2c8a648e57ebf023c4b32714da","l":["Flur Korridor Hall Corridor","Georg Nees","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Square-Groupins-1.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059183&s=074d1475a40a70e2eff9342fcf83a5c1","l":["Square-Groupins-1","Georg Nees","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ohne_Titel_Untitled_2_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059134&s=dedd45a817b9ede915f27988f148dc83","l":["Ohne Titel Untitled 2","Georg Nees","1970","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Schmetterlingsschwarm_Butterfly_Swarm_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpo

const DB = {"yoshiyuki-abe":{"n":"Yoshiyuki Abe","nc":"日本","ne":"Japanese","b":"1947","d":"2024","i":"阿部吉之是一位日本艺术家，通过编程计算机系统，借助数学逻辑与随机过程生成图像。从1980年代初起，他探索几何、概率与算法结构如何决定视觉形式。","bi":"阿部吉之1947年生于日本群马县，1966至1970年就读于千叶大学摄影工程专业，后在日本放送大学取得艺术与科学硕士学位。1972至1983年间在电影行业担任助理导演、录音师和短片导演，同时从事纪录片与商业摄影。\n\n1980年，阿部开始自学计算机辅助设计及Pascal、C语言编程，开发自己的图形软件，探索数学逻辑如何生成形态。他对算法图像构建与随机过程产生浓厚兴趣，创建了随机变量与设定参数相互作用、在秩序与不可预测性之间游走的视觉系统。他发展出结合几何建模、光线追踪与早期三维渲染的独特方法，由此衍生出一系列长期项目：Stochastica、Crossmodulation、Geometrica、Legend、Flow与LightingArt，分别探索几何、运动与概率之间的不同关系。他著有《日本的计算机艺术与艺术家》与《数学与艺术创作》等文章，前者记录了该领域的早期发展，后者探讨了随机性与参数控制在算法系统中的作用。\n\n阿部的作品在国际范围内展出逾三十年，参展机构与节庆包括SIGGRAPH、ISEA、林茨电子艺术节、Eurographics与Computerkunst。展览从1994年布鲁塞尔艺术之山的「传说」，到2011年德科多瓦博物馆的「用代码绘图」、2013年柏林索尼中心的数字艺术展，以及2014年根特的生成艺术展，不一而足。他曾多次在林茨电子艺术节获荣誉提名，并荣获Eurographics与Pixxelpoint一等奖等多项奖项。2024年辞世。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Yoshiyuke_Abe_11242025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764036694&s=4f3f83838d70cf896730f9669c5006f2","l":["Untitled Yoshiyuke","Yoshiyuki Abe","1991","Print (Digital)"]}]},"satoshi-aizawa":{"n":"Satoshi Aizawa","nc":"日本","ne":"Japanese","b":"1987","d":"","i":"相泽聪是日本生成艺术家，其作品通过剥除文化参照的极简形式审视自主系统之美。十余年间，他构建出包括持续系列《Path》《Grey Path》及《BUDDHA VERSE》在内的独特创作体系，将代码视为能够产生自身秩序的独立代理，同时反思感知、历史与技术的关系。","bi":"相泽聪1987年生于日本，是一位探索自主系统与算法之美的生成艺术家，2012年获东京造形大学美术硕士学位。他的创作以克制为本：致力于极简形式与简单机制，剥除文化或象征参照。他不堆叠意义，而是构建让感知在最基础层面运作的环境，强调观者与代码之间直接的视觉对话。这种清晰性贯穿他的动画、数字绘画与区块链项目，他将代码视为不依赖模拟、能够产生自身秩序的独立代理。\n\n经过十余年实验，相泽聪发展出既坚守原则、又形态多样的创作体系。持续性系列《Path》最初于2010年代初原型化，后在Hic et Nunc上发布，以不断重绘自身的循环线条动画确立了他独特的视觉语言。2024年在NEORT++和Feral File上线的《Grey Path》以Python的NumPy库向河野博的FORTRAN程序致敬，生成只在特定比例下才能分辨的细微灰色场——这件作品彰显了他对感知脆弱性的持续关注。他还创作了NFT系列《BUDDHA VERSE》，将算法图像制作与佛教思想相联结，追问区块链平台的伦理与生态影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Path_v2021-08-30_Satoshi_Aizawa_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803930&s=335ec7d7e8a21befd6af111188f39f7b","l":["The Path v2021-08-30","Satoshi Aizawa","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Path_v2019-12-19_Satoshi_Aizawa_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805663&s=8037c70ceb10bbed6b4673dbab4091fa","l":["The Path v2019-12-19","Satoshi Aizawa","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Placeholder_v2022-08-08_Satoshi_Aizawa_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804052&s=ea9b07aa8bf3df5e3273aae5f1a5706d","l":["Placeholder v2022-08-08","Satoshi Aizawa","2022"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Grey_Path_36_Satoshi_Aizawa_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059424&s=6279b8989f69950ffe5218f06002ee22","l":["Grey Path 36","Satoshi Aizawa","2024","NFT/Digital"]}]},"memo-akten":{"n":"Memo Akten","nc":"土耳其","ne":"Turkish","b":"1975","d":"","i":"梅莫·阿克滕是艺术家兼研究者，探索技术如何影响我们对自然、意识与仪式的理解。他以工程和计算机科学为背景，创作反思感知、信仰以及人类与机器不断演变关系的算法系统、装置与表演。","bi":"梅莫·阿克滕生于土耳其伊斯坦布尔，在博阿济奇大学学习土木工程后移居伦敦，在伦敦大学学院获得计算机科学硕士学位，后在金匠学院完成博士学业，专注于人工智能的创造性运用与对深度神经网络的有效人类控制。早年他曾在朋克和金属乐队演出，后转入视觉特效与商业动态图形领域，同时开始制作互动装置与视听实验。他目前在加州大学圣迭戈分校视觉艺术系任助理教授。\n\n阿克滕的创作探索技术、自然、意识与文化之间的关系，从物理学、生物学、神经科学、哲学与灵性中汲取养分，追问智能如何在自然系统与机器中显现。他以编写代码、创建算法系统为核心，生成动态图像、声音、沉浸式装置与表演，这些系统往往模拟自然过程或将数据戏剧化，揭示塑造世界的无形力量。\n\n信仰、感知与认知系统的议题贯穿他的全部工作。《深度冥想》以一个在科学、自然、宗教与哲学图像上训练的神经网络，持续生成关于生死与宇宙的梦幻沉思；《被爱的机器凝视一切》将机器智能塑造的投机性技术精神未来的仪式可视化；早期作品《形式》以动作捕捉与物理模拟探索运动的诗学；《视觉机器》与《云》则展示了与实时数据、定制软件的持续对话。\n\n阿克滕曾在威尼斯双年展、巴比肯中心、卡尔斯鲁厄艺术与媒体中心、皇家歌剧院及蒙特利尔美术馆等重要机构展出。他与编舞家亚历山大·惠特利合作舞蹈表演《溢出》，与雷菲克·阿纳多尔及罗伯特·M·托马斯共同创作大型沉浸装置。与米克·格里尔森合作的影片《形式》荣获林茨电子艺术节金尼卡奖。2021年，他参加了首届垂直加密艺术驻留计划。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/autopoeisic_transmogrification_fragment_003_Memo_Akten_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058801&s=31522b9e8215a5866782e8df3ea702be","l":["autopoeisic transmogrification fragment 003","Memo Akten"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/autopoeisic_transmogrification_fragment_001_Memo_Akten_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059209&s=cb7400a7dcd3ed77ca2ccffe65b83bd8","l":["autopoeisic transmogrification fragment 001","Memo Akten"]}]},"all-technique-no-passion":{"n":"All Technique No Passion","nc":"ATNPassion","ne":"aka ATNPassion","b":"2025","d":"","i":"ATNPassion是一位生成AI艺术家，探索机器学习、艺术与想象力的融合，将情感转化为代码。以《Elements》系列最为人知，其作品引领观者进入将土、水、气、火之力重新演绎为异世界景观的绚丽梦境。","bi":"All Technique No Passion是ATNPassion背后匿名的伦敦创作者，探索机器学习、艺术与想象力交汇点的生成AI艺术家。他们迷恋艺术、语言与技术的融合，以代码转译情感与惊奇，邀请算法想象超越现实的世界。\n\n最广为人知的《Elements》系列由Braindrops驱动，以土、水、气、火四力为主题生成生动梦幻的图景——繁星穹顶、未知海洋、茂密丛林与炽燃地平线——邀请观者超越现实边界，进入异世界地形。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Elements_453_All_Technique_No_Passion_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802551&s=7cc332d73edbd317545e682599fdc552","l":["Elements 453 No","All Technique No Passion","2022"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Elements_033_All_Technique_No_Passion_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805300&s=7cfbb22e1f3a3e40bec32b8745738766","l":["Elements 033 No","All Technique No Passion","2022"]}]},"kurd-alsleben":{"n":"Kurd Alsleben","nc":"德国","ne":"German","b":"1928","d":"2019","i":"库尔德·阿尔斯莱本于1960至1961年间在汉堡德国电子同步加速器中心，利用模拟计算机与绘图仪创作了德国最早的计算机生成图形之一，相关作品收录于1962年出版物《美学冗余》，并在《控制论的奇缘》和《新倾向4》等早期计算机艺术展览上亮相。","bi":"库尔德·阿尔斯莱本1928年生于德国新马克，在卡尔斯鲁厄国立造型艺术学院学习绘画，后在乌尔姆造型学院与汉堡造型艺术高等学院执教，1970年晋升为教授。\n\n1960至1961年间，他与物理学家科尔德·帕索在汉堡德国电子同步加速器中心合作，以模拟计算机连接自动绘图仪生成了德国最早的计算机图形之一——通过调整技术参数生成绘图仪波形。一批绘图仪素描后来收录于他1962年出版的《美学冗余》，作品随即出现在1968年伦敦当代艺术学会的《控制论的奇缘》、1969年汉诺威的《计算机艺术：明日前夕》，以及1968至1969年萨格勒布的《新倾向4》等早期计算机艺术展览上。1969年，他在圣马力诺国际美学方法论大会上荣获实验美学金奖。2019年在德国辞世。","aw":[]},"kim-asendorf":{"n":"Kim Asendorf","nc":"德国","ne":"German","b":"1981","d":"","i":"金·阿森多夫是一位数字艺术家，对像素级操控的探索帮助界定了生成艺术与故障艺术领域。他发明的像素排序算法引入了一种全新的视觉语言，至今持续影响全球的数字艺术与创意编程。","bi":"金·阿森多夫1981年生于德国卡塞尔，由于父亲的缘故自幼接触计算机，对技术、电子游戏和音乐产生了持久热情。在柏林接受艺术与设计的正规培训后定居于此。\n\n阿森多夫将编程与视觉表达融为一体，专注于在像素层面构建抽象系统。他最广为人知的成就是2010年创作的开源像素排序算法——生成艺术与故障艺术的基础工具，通过按亮度或色值排序像素来处理图像，在全球范围内引发了大量衍生作品，至今仍是数字艺术的标志性技法。他的创作涵盖《Mountain Tour》（2010）、《Monogrid》（2021）、《COLORS OF NOISE》（2023）等项目，构建沉浸式动画与基于声音的数字环境。2023年发布于以太坊区块链的《Cargo》展示了他对实时WebGL生成艺术的探索，作品随宏观与微观像素互动在浏览器中持续演化。\n\n他的作品曾在柏林Transmediale、卡尔斯鲁厄ZKM、盖尔森基兴艺术博物馆、纽约Eyebeam等机构展出。2010年他与奥利·法赫共同创立了Fach & Asendorf画廊——以网站本身为展览空间的早期数字艺术在线画廊，次年又推出实验性平台Gif Market，让收藏者购买不同稀有度的GIF并公开附名。XCOPY的第一件数字艺术品就在这个平台售出。阿森多夫还是MOMA明信片项目最初入选的十五位艺术家之一，并联合执导了Metallica的「Chasing Light」视频。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Aaefhinnorrrst_B_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801760&s=596a2ac3f02b258bbc7c73c922f0bf28","l":["Aaefhinnorrrst B","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ceefhhilor_A_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805590&s=7dc723b0ca171b07f2b1f057ffcaec47","l":["Ceefhhilor A","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Aaakls_Kim_Asendorf_11102025.webp?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805530&s=239e23472fb26976aa25d6c456f20b30","l":["Aaakls","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mnot_Abcln_B_Kim_Asendorf_11102025.webp?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805376&s=91216f9962f730cac2ec1bb4390cfb63","l":["Mnot Abcln B","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Urqpea_Onnlicaa_Usrnhcaaa%CC%81_Kim_Asendorf_11102025.webp?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805082&s=724863e204c4ce1cf7fdea6d25674d07","l":["Urqpea Onnlicaa Usrnhcaaa%CC%81","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Aefkl_Ior_B_Kim_Asendorf_11102025.webp?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804997&s=063b8570293fddebe533c0a7bc5bd433","l":["Aefkl Ior B","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Aaefhinnorrrst_A_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804912&s=4ced4f2467325ef16ccb46fa86419174","l":["Aaefhinnorrrst A","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ceefhhilor_B_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801446&s=b108b3b1a7a9469b6632144942a234a8","l":["Ceefhhilor B","Kim Asendorf","2010","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_5_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058967&s=9c7e6afb1f37eff94af08e0739bb669c","l":["Untitled 5","Kim Asendorf","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Grid_Snippet_02_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805632&s=1cf3a2bba975c78bc66860e311322417","l":["Grid Snippet 02","Kim Asendorf","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Reading_a_book_869_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059516&s=6633765295f342b94bfa2da74bad2b66","l":["Reading a book 869","Kim Asendorf","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/monogrid_ff_Kim_Asendorf_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805647&s=da3c883c4a96db5dfd5c06bf31d2f10c","l":["monogrid ff","Kim Asendorf","2021"]}]},"roberto-azank":{"n":"Roberto Azank","nc":"阿根廷","ne":"Argentinian","b":"1955","d":"","i":"罗贝尔托·阿赞克是阿根廷艺术家，1980年代初开始用计算机生成分形图像，将曼德布罗特算法转化为最早以艺术而非科学图表呈现的分形作品之一。此后他将数字创作的经验带入静物绘画，花卉、果实与器皿从抽象色域中浮现，以精准的笔触使色彩本身成为核心主题。","bi":"罗贝尔托·阿赞克1955年生于布宜诺斯艾利斯，祖父是油画家，父亲是刺绣设计大师。14岁时在高中绘画比赛中获得一等奖，后在布宜诺斯艾利斯大学学习摄影和建筑。1979年移居美国，在从事各种工作的同时坚持绘画。\n\n1980年代初，阿赞克用最早一批个人电脑生成分形图像，以伯努瓦·曼德布罗特开发的算法将数学结构转化为视觉形态，并着重突出色彩。这些分形作品作为版画展出，并通过海报和T恤在Macworld等会展上广泛传播，其中《龙树》等作品被公认为最早以艺术而非科学图表呈现的分形图像之一。1990年代，他将分形几何的经验带入静物绘画：每幅作品始于一系列抽象色彩研究，再引入花卉、果实与器皿，从真实植物的片段重新组合，以细腻貂毛笔、层叠釉色和剃刀式细节构建。\n\n阿赞克的绘画最早于1990年代初在波多黎各、迈阿密和纽约展出，中期扩展至多伦多、休斯顿和芝加哥。1997年，他的作品在纽约阿根廷领事馆展出。2003年在韦罗比奇美术博物馆，2005年在新帕尔兹联合艺术中心举办回顾展。《华尔街日报》《旧金山商业时报》《华盛顿邮报》《迈阿密先驱报》等媒体均有评介，作品被美国运通金融顾问公司、斯普林特电信、华盛顿会议中心及纽约罗伯特·米勒等机构收藏。","aw":[]},"pablo-azcar":{"n":"Pablo Azócar","nc":"智利","ne":"aka Pavlovpulus","b":"2025","d":"","i":"巴勃罗·阿索卡尔（笔名Pavlovpulus）使用机器人绘图仪结合传统材料创作由算法驱动的作品，探索系统、图案以及将数据转化为触觉化结构性构图的过程。","bi":"巴勃罗·阿索卡尔（笔名Pavlovpulus）是智利艺术家兼骑行爱好者，其实践处于数据、绘图与设计的交汇点。在多年从事环境指标研究后，于2022年全职转向视觉艺术，曾在纽约学习色彩理论与绘图。早期专注于自然与户外运动的摄影经历，继续滋养着他以观察与精准为基础的视觉语言。他定居并创作于智利圣地亚哥，作品在模拟与算法之间寻求平衡。\n\n阿索卡尔以数据、代码和机器创作既精准又具触感的细密构图，常将机器人绘图仪与墨水、喷漆等传统材料结合，构建富有结构感与运动感的作品。他的项目涵盖《数据雨》（将智利总统选举结果可视化）、《LANDXCAPES》（以线条呼应地形轮廓）、《TRIP0》（对重复与色彩的研究）等，还与骑行服品牌Velocio合作。他持续关注系统如何通过视觉手段被构建、瓦解与重塑。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Trip0_139_Pablo_Azo%CC%81car_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803329&s=31bb7b43743c60ddb4d0bd3640ddebf0","l":["Trip0 139 Azo%CC%81car","Pablo Azócar","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Trip0_140_Pablo_Azo%CC%81car_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805034&s=681d16a080d784f58c4677a47953cd7b","l":["Trip0 140 Azo%CC%81car","Pablo Azócar","2024","Plotter Drawing"]}]},"holger-bckstrm":{"n":"Holger Bäckström","nc":"瑞典","ne":"aka Beck & Jung","b":"1939","d":"1997","i":"霍尔格·贝克斯特伦是瑞典艺术家，早期的三维绘画和动态浮雕探索了色彩、运动与空间形式。他与博·利永贝里组成艺术二人组Beck & Jung，发展出游走于工作室与公共空间之间、植根于色彩与几何的创作实践，并从1966年起以计算机生成图像延伸这些探索。","bi":"霍尔格·贝克斯特伦1939年生于隆德，1960至1964年就读于斯德哥尔摩国立艺术工艺设计大学（Konstfack），毕业后返回隆德，创作从雕塑演化而来的三维绘画与动态浮雕，以明亮色彩、快速笔触和运动感著称。1964年他在马尔默联合创立了一项公众借阅年轻艺术家作品的计划，使其成为当地新兴艺术场景的核心场所。他还拓展了版画、文本装置等实践，并参与了向瑞典各地广泛受众推介当代艺术的全国性项目Multikonst。\n\n1965年，他与儿时好友博·利永贝里以Beck & Jung之名开始终身合作，创作可变绘画、雕塑对象、计算机生成图形及大型公共委托作品。他们的计算机探索始于1966年，最初用马尔默IBM的行式打印机标准字符集生成图像。1968年创作了具有数十亿种可能组合的可变丝网印刷系统《Felixsnurran》，1969年制作了700件限量铝制对象《Girocubes》。同年他们发展出由十一个几何形组成、可生成无限图像的《图像字母表》。1970年代在隆德大学数据中心，他们先以绘图仪创作黑白图，1973年起在一台实验性彩色喷墨绘图仪上生成彩色图像，由此产生Chromo Cube、Tebtunis、Dragon与Dendra等系列。这期间他们也承接了大型公共委托，包括1972至1973年为胡丁厄医院创作的《嗨，病人！》——基于图像字母表的火漆铝板装置。至1970年代末，他们已完成逾五十件公共空间作品。1980年代与隆德大学研究人员合作拓展Chromo Cubes系统，并开始使用Mac与佳能CLC 800彩色激光打印机创作新系列。1990年代，其计算机版画将鲜艳色彩与传统图形技法相结合，确立了完全耐久的数字作品地位。\n\n他们于1967年在隆德艺术馆举办首次个展，1973年早期计算机彩色作品在巴黎青年双年展上亮相，此后在纽约、芝加哥、洛杉矶、巴塞尔、哥本哈根和密尔沃基均举办个展。1972年荣获隆德市文化奖学金。两人的最后一次联合展览是1997年在德国格拉德贝克市立博物馆的《计算机艺术》展。贝克斯特伦于同年辞世。2012年，斯德哥尔摩Galleri Mårtenson & Persson为Beck & Jung举办了题为「计算机艺术先驱」的回顾展。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Computer_Ink_Plot_Bo_Ljungberg_Holger_Ba%CC%88ckstro%CC%88m_11102025_2025-12-01-020957_gpbr.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764554997&s=406be666385931dd48b50b09df21a57a","l":["Bo Ljungberg / Holger Bäckström","1985","Print"]}]},"robert-baker":{"n":"Robert Baker","nc":"美国","ne":"American","b":"1933","d":"2000","i":"罗伯特·A·贝克是作曲家兼程序员，共同开发了MUSICOMP——最早为数字计算机设计的作曲语言之一，在伊利诺伊大学的工作帮助将计算机音乐的重心从乐谱生成转向实时声音，为算法作曲的未来发展奠定基础。","bi":"罗伯特·A·贝克是1960年代初活跃于伊利诺伊大学的作曲家与程序员，与勒雅伦·希勒合作，使用该大学最早的数字计算机之一Illiac I开发了最早的计算机辅助作曲系统。作为作曲研究生，他参与开发了Musicwriter（为Illiac设计的早期乐谱系统），后又共同开发了MUSICOMP——一种通用作曲语言，最初为Illiac I编写，后移植至IBM 7090。该系统拥有能以规则逻辑和概率方法生成音乐素材的子程序库，成为早期算法作曲的奠基性范本。\n\n1963年，贝克与希勒以MUSICOMP共同创作了《计算机康塔塔》——一部时长24分钟、为女高音、室内乐团与计算机生成磁带而作的作品，在希勒与伦纳德·艾萨克森1957年的《伊利亚克组曲》（最早的计算机生成作品之一）基础上更进一步，使计算机成为可听见的声音存在。贝克负责编写生成声乐线条与磁带部件的系统，以伊利诺伊大学开发的实时合成机CSX-1输出，融合随机文本近似、序列写作与微分音合成。他与希勒共同署名所有乐章，并合著了《计算机康塔塔：作曲方法研究》（1964年）。\n\n贝克的工作标志着计算机音乐的转折点，将关注重心从符号化乐谱生成转向实时声音。尽管其后期职业生涯鲜为人知，他对MUSICOMP的贡献及对作曲逻辑的设计，奠定了至今仍塑造生成音乐的核心原则。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_from_the_University_of_Illinois_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_Robert_Baker_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059434&s=5c2f313acd845d7a2c76c52c6e96e502","l":["Multiple Artists"]}]},"charles-jeffries-jeff-bangert":{"n":"Charles Jeffries \"Jeff\" Bangert","nc":"美国","ne":"American","b":"1938","d":"2019","i":"查尔斯·杰弗里斯·班格特（Jeff）是数学家兼程序员，与妻子科莱特密切合作共同创作了开创性的算法计算机艺术，将艺术概念转化为数字形式。他的工作融合技术专长与创造革新，有助于塑造数字艺术的早期面貌。","bi":"查尔斯·杰弗里斯·班格特（人称Jeff）1938年生于北达科他州法戈，在哈佛大学学习数学，在芝加哥艺术学院学习版画，并在北达科他大学获得数学与工作室艺术学士学位，后在堪萨斯大学完成数学与统计学研究生学习。\n\nJeff在堪萨斯大学学术计算服务中心工作逾三十年，担任程序员、顾问与统计师，兴趣横跨计算机图形学、数据分析与微机应用，常聚焦于行为与社会科学研究。他深信技术是学习、探究与人际连结的工具。2019年在堪萨斯辞世。\n\nJeff与科莱特是艺术与技术融合的真正先驱。从1960年代末起，Jeff负责编写控制绘图机的代码，科莱特以传统艺术背景塑造创意方向，两人携手创作算法计算机艺术。他们的合作是双向的：Jeff的编程将科莱特的构想转化为复杂的数字绘图，而他们的代码实验也反过来影响了科莱特的手绘作品。两人共同推进了绘图的边界，将数学、技术与艺术融为一体，作品在全球展出并被主要博物馆收藏。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/CB_7-70_Colette_Stuebe_Bangert_Charles_Jeffries_Jeff_Bangert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059435&s=250b7a06bfbf529777d0cac666c717a9","l":["Colette Stuebe Bangert / Charles Jeffries &quot;Jeff&quot; Bangert","1970","Plotter Drawing"]}]},"colette-stuebe-bangert":{"n":"Colette Stuebe Bangert","nc":"美国","ne":"American","b":"1934","d":"","i":"科莱特·施图伯·班格特是美国艺术家，创作横跨绘画、素描、纺织品与早期计算机生成艺术。自1960年代末起，她与丈夫杰夫合作探索自然形态与算法系统的关系，借助传统媒介和定制软件演绎中西部景观。","bi":"科莱特·施图伯·班格特1934年生于俄亥俄州哥伦布，以绘画、素描、纺织品和计算机生成艺术著称。1957年获赫伦艺术与设计学院美术学士学位，1958年获波士顿大学绘画与素描艺术硕士学位。早期传统媒介作品广泛展出，包括1963年在克拉斯纳画廊的个展，获《ARTnews》《Arts Magazine》及《纽约时报》评介。\n\n1960年代末，班格特开始以线条绘图仪创作算法绘图，将计算机纳入视觉工具库，以对线条、形态与空间的深厚理解为基础。她大量数字与传统作品均汲取中西部景观，探索如何通过视觉系统诠释自然形态。\n\n她与Jeff是艺术与技术融合的真正先驱。Jeff负责编写控制绘图机的代码，科莱特以传统艺术背景塑造创意方向，两人的合作是双向的：Jeff的编程将科莱特的构想转化为复杂的数字绘图，代码实验也反过来影响了科莱特的手绘作品。作品在全球展出，被主要博物馆收藏。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/CB_7-70_Colette_Stuebe_Bangert_Charles_Jeffries_Jeff_Bangert_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059435&s=250b7a06bfbf529777d0cac666c717a9","l":["Colette Stuebe Bangert / Charles Jeffries &quot;Jeff&quot; Bangert","1970","Plotter Drawing"]}]},"manuel-barbadillo":{"n":"Manuel Barbadillo","nc":"西班牙","ne":"Spanish","b":"1929","d":"2003","i":"曼努埃尔·巴尔瓦迪略发展出以模块化方形为基础、通过旋转、反转与色彩变化创造韵律图案的视觉语言，将数学原理与传统绘画技法相结合，探索二元性与普遍秩序，同时率先将早期计算机技术引入辅助创作。","bi":"曼努埃尔·巴尔瓦迪略1929年生于塞维利亚省卡萨利亚-德拉谢拉，在塞维利亚学习绘画与法律。1955至1959年游历欧洲与北非，主要在摩洛哥工作，风格由写实主义演变为非正式主义。1959至1962年旅居纽约，转向物体主义与几何抽象。\n\n他的创作以模块形式与组合逻辑的探索为核心。从1960年代起，他发展出以重复方形模块为基础的视觉语言，通过旋转、反转与色彩变化生成复杂的韵律图案，先驱性地将计算机技术引入作曲分析。黑与白、正与负形的对立平衡，折射出他受毕达哥拉斯和声哲学启发、对普遍秩序与二元性的兴趣。尽管计算机从1960年代末起成为重要工具，他始终保持与传统绘画技法的联结，将模块设计转译至画布时保留了透露艺术家之手的刻意不完美。\n\n整个职业生涯中，巴尔瓦迪略作为西班牙抽象艺术领军人物和计算机辅助创作先驱获得广泛认可。他是马德里「新一代」和马德里大学计算中心等专注艺术与技术团体及研讨会的创始成员。他的作品被马德里索菲亚王后博物馆、塞维利亚安达卢西亚当代艺术中心及瓦伦西亚IVAM等机构永久收藏。2003年辞世。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Art_Ex_Machina_portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Frieder_Nake_Georg_Nees_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058901&s=faa0d28f9364f34911d1586ca6cc4b40","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Manuel_Barbadillo_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804927&s=eed82a60589343b38f82f15a3bedbcbc","l":["Untitled","Manuel Barbadillo","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Aeleana_Manuel_Barbadillo_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805166&s=1931ee4ef801e4940e47f69e505b1a67","l":["Aeleana","Manuel Barbadillo","1973","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/SDL_Portfolio_Hiroshi_Kawano_Manuel_Barbadillo_Ken_Knowlton_Manfred_Mohr_Georg_Nees_John_Roy_Zdene%CC%8Ck_Sy%CC%81kora_Roger_Vilder_11102025_2026-03-21-021728_mnnn.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059448&s=56218910ce19af914f2bb8e7f42f590e","l":["Multiple Artists","1973","Print"]}]},"barbegenerativediary":{"n":"barbe_generative_diary","nc":"日本","ne":"Japanese","b":"2025","d":"","i":"barbe_generative_diary是日本生成艺术家，将田野录音与声音频率转化为动态视觉构图，创作横跨实况编程、实时渲染与绘图仪绘画，以数字与实体媒介架起听觉与视觉体验的桥梁。","bi":"barbe_generative_diary是驻日本的生成艺术家，专注于将声音频率视觉化——把日常采集的田野录音转化为生成代码驱动的动态图形。他们创作教程，分享对声音、结构与代码的持续探索，展示无形现象如何通过生成系统变得可见。\n\n探索空气、固体与液体中的振动等各种声音，barbe_generative_diary通过实况编程和实时渲染创作构图，数字实践延伸至实体绘图仪绘画，将声音数据转化为精细触感的图像，带来一种独特的、架起听觉与视觉世界的感官体验。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sound_Visualization_PLOT_Dry_Ice_Using_Various_Types_of_Microphones_barbe_generative_dairy_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805622&s=af6d6979f88c6931f299415d0c3af39c","l":["Sound Visualization PLOT Dry Ice Using Various Types of Microphones barbe generative dairy","barbe_generative_diary","2024","Plotter Drawing"]}]},"dimitrije-baievi":{"n":"Dimitrije Bašičević","nc":"南斯拉夫","ne":"aka Mangelos","b":"1921","d":"1987","i":"迪米特里耶·巴希切维奇是艺术史家、批评家、策展人与艺术家，以「芒格洛斯」为笔名创作以保持艺术身份与职业角色的区分。他的观念艺术将文字与抽象形式结合非常规材料，追问词语与图像的关系，挑战绘画与文学的传统定义。","bi":"迪米特里耶·巴希切维奇1921年生于前南斯拉夫希德，二战期间流亡维也纳，1942至1944年间学习艺术史，后移居萨格勒布完成学业，1957年以《萨瓦·苏马诺维奇》为题获艺术史博士学位。在从事艺术史家、批评家与策展人职业的同时，他以笔名「芒格洛斯」进行艺术创作——这个名字取自故乡附近的小村庄，旨在将艺术身份与职业角色区隔。\n\n芒格洛斯以笔记本、地球仪和木板等非常规材料创作观念作品，将文字、符号与抽象形式结合，折射出他对社会进步而艺术停滞的确信。他通过《死之风景》《白板》与《毕达哥拉斯》等系列探索战争、死亡、语言与思想演化。他称为「非艺术」的实践，旨在通过将绘画与文学融为一体来挑战两者的传统定义，追问词语与图像、内容与形式的边界，并以悖论与反讽的方式拥抱神秘符号学与日常图案的并置，与先锋派、观念艺术和存在主义保持批判性对话。\n\n芒格洛斯在纽约现代艺术博物馆、巴黎蓬皮杜艺术中心和伦敦泰特现代艺术馆等重要机构的展览使他在身后赢得国际声誉。生前他曾担任素朴艺术画廊馆长，后执掌萨格勒布电影、摄影与电视中心。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/bit_international_1-6_Dimitrije_Bas%CC%8Cic%CC%8Cevic%CC%81_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805561&s=04b8cd35ccca30be1e025d317d7ee6fe","l":["bit international 1-6 Bas%CC%8Cic%CC%8Cevic%CC%81","Dimitrije Bašičević","1968","Book"]}]},"stuart-faromarz-batchelor":{"n":"Stuart Faromarz Batchelor","nc":"英国","ne":"","b":"1970","d":"","i":"斯图尔特·法罗马兹·巴彻勒是驻伦敦的计算机艺术家，其作品融合绘画的触觉性与代码的逻辑性，构建将笔触转化为粒子与纹理流动场域的生成系统，以「用代码绘画，用绘画编码」为创作宣言。","bi":"斯图尔特·法罗马兹·巴彻勒是驻伦敦的计算机艺术家，在伯恩茅斯大学国家计算机动画中心学习计算机可视化与动画，2015年以一等荣誉学位毕业，后在Escape Studios执教，为本科生和研究生开设实时视觉特效、编程与程序化图形课程。受过视觉特效专业训练却被绘画的触觉性所吸引，他开始创作专属软件工具，将手势与算法融为一体，奠定了探索自然、梦境与人类形态的实践基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Angels_Egg_95_Stuart_Faromarz_Batchelor_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058670&s=617e62b3b730d8d8ae4a4e9ef03135cf","l":["Angels Egg 95","Stuart Faromarz Batchelor","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Angels_Egg_99_Stuart_Faromarz_Batchelor_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058694&s=8ebbc92547d9705c064c66f5811ea6dc","l":["Angels Egg 99","Stuart Faromarz Batchelor","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Angels_Egg_232_Stuart_Faromarz_Batchelor_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059527&s=64adb0be948163bc4a47d8baf415f4e1","l":["Angels Egg 232","Stuart Faromarz Batchelor","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Linea_2_Stuart_Faromarz_Batchelor_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059099&s=b288d1bb5cfa2a801765d695b756678a","l":["Linea 2","Stuart Faromarz Batchelor","2023","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Linea_44_Stuart_Faromarz_Batchelor_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058782&s=7e61207b422f4f77b980582ef025737d","l":["Linea 44","Stuart Faromarz Batchelor","2024","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Linea_48_Stuart_Faromarz_Batchelor_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059356&s=84bfd0194d358939462cf9dc13b82e4d","l":["Linea 48","Stuart Faromarz Batchelor","2024","Plotter Drawing"]}]},"bauermlakar":{"n":"Bauer/Mlakar","nc":"德国","ne":"aka MMACHINE","b":"1985","d":"","i":"Bauer/Mlakar（前称MMACHINE）是驻柏林的艺术家二人组，创作将数字编程与传统绘画相结合，以油画与丙烯创作抽象构图。他们使用定制绘图仪配合手工绘画，彰显韵律、变化以及机械精确与人工触感之间的张力。","bi":"Bauer/Mlakar（前称MMACHINE）是由马丁·鲍尔与马伊·姆拉卡尔组成的柏林艺术二人组，探索模拟与数字方法的互动，创作抽象油画与丙烯画。他们使用一台定制的2×6米绘图仪将数字指令转化为精准笔触，通过反复、结构与细微变化创作出系统性与生命感兼具的构图，既召唤具体艺术的传统，又为当代数字共鸣留有空间。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/LINES-230117_BauerMlakar_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802580&s=a6aff493b6a9153dd0f271e00d7be0c5","l":["LINES-230117 BauerMlakar","Bauer/Mlakar","2023","Plotter Drawing"]}]},"stanley-baxendale":{"n":"Stanley Baxendale","nc":"英国","ne":"British","b":"1909","d":"1998","i":"斯坦利·巴克斯恩代尔于1979年出版《第一本计算机设计着色书》，这本收录85幅可拆卸计算机生成图像的著作专为涂色展示而设计，以计算机作为创造力与游戏之源，挑战了计算机冷酷难亲近的刻板印象。","bi":"斯坦利·巴克斯恩代尔1909年生，是数学家与计算机科学家，在罗格斯大学执教，开设该校最早的计算机图形学研究生课程。他使用Tektronix 4051计算机和BASIC语言编程，设计出绘制行星轨道、生成对数螺线、计算密铺图案以及映射球面的系统，展示了数学规则如何转化为视觉形式，使计算机成为艺术探索的工具。\n\n1979年他出版了《第一本计算机设计着色书》，共156页、收录85幅可拆卸图像，面向儿童与成人，旨在以计算机创造力对抗其冷酷形象。该书被定位为教育和娱乐工具，以一种包容、易亲近的方式展示了计算机的可能性，是早期将计算机艺术推向大众的重要尝试之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_First_Computer_Design_Coloring_Book_Stanley_Baxendale_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805642&s=6b7937119fab0123d00d9fc1938269c0","l":["The First Computer Design Coloring Book","Stanley Baxendale","1979","Book"]}]},"james-w-beauchamp":{"n":"James W Beauchamp","nc":"美国","ne":"American","b":"1937","d":"2022","i":"詹姆斯·W·博尚是作曲家、工程师与教育家，在伊利诺伊大学的职业生涯将音乐与电子工程融为一体。他设计了最早的压控合成器之一——谐波音调发生器，并创建了在电子与计算机音乐领域广泛应用的声音分析与再现工具。","bi":"詹姆斯·W·博尚1937年生于密歇根，1955至1957年就读于阿尔比恩学院，后在密歇根大学修读电子工程，1960年获学士学位，1961年获硕士学位。在洛杉矶航天技术实验室工作一年后，他在伊利诺伊大学完成电气工程博士学位，此后在该校度过了整个学术生涯。\n\n他在伊利诺伊大学设计了谐波音调发生器——最早的压控合成器之一，并开发了广泛应用于电子与计算机音乐领域的声音分析与再现工具。他的研究还涵盖如何为声音合成和音乐感知建模，以及如何弥合工程方法与音乐表达之间的鸿沟。他在电子音乐、音频工程及计算机辅助作曲的工作使他成为这些学科发展的核心人物。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]}]},"otto-beckmann":{"n":"Otto Beckmann","nc":"奥地利","ne":"Austrian","b":"1908","d":"1997","i":"奥托·贝克曼是一位跨学科艺术家，将直觉创造与数学原理相结合，以早期计算机技术为工具探索新的艺术可能性。1966年，他创立了ars intermedia，汇聚艺术家与科学家共同实验计算机艺术并开发创新技术。","bi":"奥托·贝克曼1908年生于符拉迪沃斯托克，1922年随家人迁居维也纳，先后在默德林高等技术学院和维也纳艺术学院接受培训。1941年毕业后，他在战时的克拉科夫国立应用艺术学校执教。1945年起以独立艺术家身份定居维也纳，横跨雕塑、绘画、摄影、电影和写作创作，并于1951年加入维也纳分离派。\n\n1966年，他创立了ars intermedia，汇聚艺术家与科学家共同进行计算机艺术实验，开发创新技术，成为奥地利艺术与技术交汇的重要推动者。他的实践体现了直觉创造与数学原理的结合，将计算机视为探索新艺术可能的工具。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Computer-Generated_Choreogramme_Otto_Beckmann_11202025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673239&s=6fcc0aff90992a71efeb911cc368de31","l":["Untitled Computer-Generated Choreogramme","Otto Beckmann","1966","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/untitled_20251123_beckmann.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763910540&s=526cf174c1c7228326fdd7f14e656300","l":["untitled 20251123","Otto Beckmann","1966","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Elektronische_Computergrafik_Otto_Beckmann_Alfred_Gra%C3%9Fl_11102025_2026-03-21-021507_yppj.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059307&s=b2b8a1e7f55bf4789864241fe2ec184a","l":["Otto Beckmann / Alfred Graßl","1968","Oscilloscope/Light Photo"]}]},"loren-bednar":{"n":"Loren Bednar","nc":"美国","ne":"American","b":"1980","d":"","i":"洛伦·贝德纳尔是一位生成艺术家，通过迭代实验用代码构建色彩与运动的动态系统。凭借游戏开发与互动艺术的背景，其作品探索简单规则如何生成复杂的涌现形态。","bi":"洛伦·贝德纳尔是一位跨学科艺术家与开发者，1980年生于美国，在奥克兰大学学习音乐、数学与计算机编程。自1999年起，他建立了横跨编程、游戏开发与互动艺术的多元职业轨迹，开发的游戏赢得了多项奖项和行业认可，生成艺术则成为他持续的创作焦点。他的作品以色彩与运动的动态系统为核心，通过迭代实验探索简单规则如何生成复杂的涌现形态。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Phase_510_Loren_Bednar_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058900&s=08721dd8624b87ff4df6875471554b77","l":["Phase 510","Loren Bednar","2021"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Phase_519_Loren_Bednar_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059510&s=248c711baff6caaeeaa16eb5a9640218","l":["Phase 519","Loren Bednar","2021"]}]},"bell-telephone-laboratories-bell-labs":{"n":"Bell Telephone Laboratories (Bell Labs)","nc":"美国","ne":"American","b":"1962","d":"","i":"贝尔电话实验室是技术与艺术交汇的开拓性基地，推动了数字计算机艺术的早期发展。通过向艺术家提供尖端计算工具，并促进工程师与创意人才的深度合作，实验室以技术重塑了艺术表达的可能性。","bi":"贝尔电话实验室是最早开发数字计算机艺术的场所之一。1962至1968年间，研究人员使用大型机和定制软件生成静态图像、立体图像对和早期计算机动画。最初作为科学可视化工具，这些技术迅速成为探索美学、感知与构图的方式，催生了抽象线条素描、算法生成形态、由电子元件构成的马赛克以及结合精确性与实验性的三维立体图像。部分作品由贝尔实验室艺术家在公开展览中展出，包括1965年纽约霍华德·怀斯画廊的展览，以及1968年伦敦当代艺术学会的《控制论的奇缘》。\n\n这些探索由工程师和研究人员主导，他们在技术工作与艺术实验的边界地带工作。贝尔实验室的工作为整整一代数字艺术实践确立了技术与美学基础，涉及的艺术家包括肯·诺尔顿、迈克尔·诺尔、利昂·哈蒙、弗兰克·辛德勒和查尔斯·罗（Csuri）等。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_From_Mathematics_Box_Set_Max_Vernon_Mathews_Bell_Telephone_Labs_Newman_Guttman_David_Lewin_Lejaren_Arthur_Hiller_Jr_Leonard_Isaacson_John_L._Kelly_Jr._Louis_J._Gers.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059295&s=4f8bb49613113ef14927322293000617","l":["Multiple Artists"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251118_155454.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763585049&s=3144781a045af446eb79e21086df0e90","l":["20251118 155454","Bell Telephone Laboratories (Bell Labs)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Speech_%E2%80%93_Hee_Saw_Dhuh_Kaet_Bell_Telephone_Labs_D.H._Van_Lenten_11102025_2026-03-21-021451_rdio.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059291&s=8c67784686d653c4999cef040d2ac4aa","l":["Computer Speech %E2%80%93 Hee Saw Dhuh Kaet D.H. Van Lenten"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Computer_Music_Musik_der_Senoi_Mayala_Native_Music_Max_Vernon_Mathews_Bell_Telephone_Labs_Hans_Oesch_Hermann_Scherchen_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059311&s=25063eec0db5b47527a49ae0fd6c451d","l":["Multiple Artists"]}]},"anna-beller":{"n":"Anna Beller","nc":"德国","ne":"German","b":"1984","d":"","i":"安娜·贝勒是德国艺术家，其跨学科实践以建筑背景为基础，连接实验绘画与数字艺术。她同时运用模拟与数字工具，探索色彩、透明度与结构，研究人类意图与机器精确性之间不断演变的关系。","bi":"安娜·贝勒1984年生于柏林，目前定居汉诺威。她在柏林工业大学学习建筑，于2008至2011年间取得学士和硕士学位。在瑞士、英国和德国从事建筑工作近十年后，她回归艺术创作，于2019至2022年就读于柏林绘画学院，2024年成为汉诺威造型艺术家协会（BBK）成员。\n\n她的创作探索色彩关系、透明度与结构之间的相互作用，以及人类意图与机器精确性之间不断演变的关系，在模拟与数字方法之间寻求对话。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Draftwerk_28_Anna_Beller_Alejandro_Campos_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058894&s=c6ef036fce2c455995642b40919c0d1d","l":["Anna Beller / Alejandro Campos","2023","Plotter Drawing"]}]},"max-bense":{"n":"Max Bense","nc":"德国","ne":"German","b":"1910","d":"1990","i":"马克斯·本泽是德国哲学家，其信息美学理论将数学与符号学分析引入艺术领域，为数字与生成艺术实践奠定了概念基础。1965年，他组织了第一场计算机艺术公开展览，并共同出版了将算法图像与理论洞见融为一体的里程碑文本《rot 19：计算机图形》。","bi":"马克斯·本泽1910年生于斯特拉斯堡，在科隆求学后在波恩大学学习物理、化学、数学、地质与哲学，1937年以量子力学与此在相对性为题获得博士学位。坚定反对国家社会主义的他拒绝了「德意志物理学」的反相对论意识形态，这限制了他的学术机会。1938年在拜耳公司短暂工作后被征召入伍，经历了第二次世界大战。战后他成为斯图加特技术大学哲学与科学理论教授，在那里发展了信息美学理论，以数学和符号学方法分析艺术，为数字与生成艺术实践奠定了概念基础。\n\n1965年，本泽在斯图加特技术大学数学系画廊组织了世界上最早的公开计算机艺术展览之一。他与弗里德尔·纳克和格奥尔格·尼斯共同出版了《rot 19：计算机图形》，这本里程碑式的出版物将算法图像与理论洞见融为一体。他的思想影响深远，连接了控制论、美学与早期数字艺术，塑造了关于计算机可以产生美学价值的理论框架。本泽于1990年辞世。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Stochastische_Texte_Augenblick_14_Theo_Lutz_Max_Bense_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.4484&fp-y=0.09&dm=1774059439&s=c52c190f5424da2b8b1b5e1f8ae7e63f","l":["Theo Lutz / Max Bense","1959","Prose/Poetry (Computer-Generated)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/rot_6_Theo_Lutz_Max_Bense_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058671&s=b790208af574310435cef689d2c6bc86","l":["Theo Lutz / Max Bense","1961","Prose/Poetry (Computer-Generated)"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/rot_19_-_computer-grafik_Georg_Nees_Max_Bense_Computer_Siemens_2002_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059429&s=73fb5698d0302f6bc182b0011a74376c","l":["Multiple Artists","1965","Book"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/16_4_66_Frieder_Nake_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5107&fp-y=0.4797&dm=1763328594&s=190837da98ca58e1068c2a592a0b1c63","l":["Multiple Artists","1966","Print"]}]},"wolfgang-beyer":{"n":"Wolfgang Beyer","nc":"德国","ne":"German","b":"1955","d":"","i":"沃尔夫冈·拜尔是德国物理学家兼艺术家，其计算机作品包括2000年代初用Ultra Fractal 3制作的高分辨率曼德布罗特集渲染与动画。这些图像以知识共享许可发布，在维基百科和教育语境中广泛传播，其中12幅被PBS NOVA纪录片《追寻隐藏维度》收录。","bi":"沃尔夫冈·拜尔是拥有自然科学博士学位的德国物理学家，在慕尼黑路德维希-马克西米利安大学医学中心从事激光医学研究，在激光研究实验室参与光动力治疗和光学诊断研究，在《激光外科与医学》和《应用光学》等期刊发表论文。\n\n与此同时，拜尔发展出涵盖手工对象、时间性实验和计算机生成作品的艺术实践。2000年代初，他使用Ultra Fractal 3软件制作了高分辨率的曼德布罗特集渲染与动画，以知识共享许可发布。这些图像在维基百科和教育语境中广泛传播，其中12幅被PBS NOVA纪录片《追寻隐藏维度》收录，展示了分形几何如何超越科学图解成为独具美感的艺术媒介。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sechs_Computergrafiken_six_computer_graphics_Portfolio_Christian_Cavadia_Friedrich_Lu%CC%88bbecke_Robert_Stoiber_Fromund_Kloppe_Wolfgang_Beyer_11102025_2026-03-21-021322_mmvb.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059202&s=9d9ed5db3708a4f149913676fb77cba2","l":["Multiple Artists","1980","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Six_stages_of_a_crumpling_green_sheet_Wolfgang_Beyer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805245&s=bdd1f9b1caf1dde46284a9735088e576","l":["Six stages of a crumpling green sheet","Wolfgang Beyer","1980","Print"]}]},"peter-beyls":{"n":"Peter  Beyls","nc":"比利时","ne":"Belgian","b":"1950","d":"","i":"彼得·贝尔斯是比利时艺术家，创造出行为、演化、响应如同生命体的生成系统。他的作品以代码模拟感知与互动，产生出连他自己都无法完全预测其运动、绘制与构图方式的机器。","bi":"彼得·贝尔斯是一位跨学科艺术家，1950年生于比利时科特赖克，在斯德哥尔摩EMS、布鲁塞尔皇家音乐学院及伦敦大学学院斯莱德艺术学院学习电子工程、音乐与计算机科学。2010年以将进化计算应用于实时互动音乐系统的研究在普利茅斯大学获得计算机科学博士学位。早年他与米歇尔·韦斯维斯在阿姆斯特丹STEIM合作开发crackle box合成器，后又与电影人赫罗·沃特斯合作。\n\n贝尔斯的生成系统表现得像活的实体，以代码模拟感知与互动，创造出即使是艺术家本人也无法完全预测其行为方式的机器。他的创作横跨互动装置、算法绘图与计算机音乐，探索人工生命、进化计算与创造性系统之间的边界。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/H18799-L422756655_original.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975562&s=c9873bed11cdb6b2ea9e97b97c527b74","l":["Multiple Artists","1978","Book"]}]},"vladimir-bonacic":{"n":"Vladimir Bonacic","nc":"克罗地亚","ne":"Croatian","b":"1938","d":"1999","i":"弗拉基米尔·博纳契奇发展出以控制论、电子学与感知研究为基础的艺术实践，使用计算机和定制系统创作互动光声作品，通过序列与重复揭示潜在结构与时间过程。","bi":"弗拉基米尔·博纳契奇1938年生于当时南斯拉夫的诺维萨德，在萨格勒布大学电气工程与计算学院学习核电子学，1964年获硕士学位，1967年以模式识别与隐藏数据结构为题获博士学位，并在伦敦和巴黎完成博士后研究。他在萨格勒布鲁杰尔·博什科维奇研究所工作，专注于控制论、信息处理与感知模型研究，1960年代末开始将计算机系统应用于视觉研究，并曾担任研究所计算机科学部主任。\n\n他以计算机和定制电子系统创作互动光声装置，通过序列与重复揭示潜在结构与时间过程，成为南斯拉夫新倾向运动的重要成员，同时参与了1970年代的早期数字艺术国际讨论。","aw":[]},"frank-bttger":{"n":"Frank Böttger","nc":"德国","ne":"German","b":"1946","d":"","i":"弗兰克·博特格是计算机艺术家，以早期编程语言和大型机创作精确的几何作品著称，其艺术探索旋转和插值等数学结构，在1970年代初推动了计算机图形学的发展。","bi":"弗兰克·博特格1946年生于德国施派尔，在接受电工和工程师培训后，于1969年加入梅塞施密特-伯尔科-布洛姆（MBB）公司电子数据处理部门工作。他在这家以创新研究著称的德国航空航天与工程公司专注于计算机图形学。\n\n博特格在MBB开发的计算机生成作品以精确的确定性几何结构为特征，强调对称性与数学清晰性。1972年的《插值与旋转》和《圆族I》等作品充分体现了这些特质，展示了早期编程语言如何以精确的视觉形式捕捉数学原理，是1970年代初计算机图形学发展的重要贡献。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Interpolation_and_Rotation_Frank_Bo%CC%88ttger_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801938&s=b8bc0e70f043cced2d613443d4c4981f","l":["Interpolation and Rotation Bo%CC%88ttger","Frank Böttger","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/MBB_Computer_Graphics_portfolio_Rolf_Wo%CC%88lk_Frank_Bo%CC%88ttger_Sylvia_Roubaud_Gerold_Weiss_Aron_Warszawski_Johann_Willsberger_11102025_2026-03-21-020712_fbvf.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058832&s=9ae28c59656946c54a99aa95a5be0435","l":["Multiple Artists","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Circle_Sequences_Frank_Bo%CC%88ttger_Aron_Warszawski_11102025_2026-03-21-020832_mvmu.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058912&s=c04b6dd6a9ecb21ff3104024ec2b5c90","l":["Frank Böttger / Aron Warszawski","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Square_Formations_Frank_Bo%CC%88ttger_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804964&s=4908214bc7d9e42550b9229055b07750","l":["Square Formations Bo%CC%88ttger","Frank Böttger","1972","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rotating_Planes_Frank_Bo%CC%88ttger_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805649&s=e32ca55dacc843a4b21c33f94fe23a12","l":["Rotating Planes Bo%CC%88ttger","Frank Böttger","1972","Print"]}]},"pierre-braun":{"n":"Pierre Braun","nc":"法国","ne":"French","b":"1961","d":"","i":"皮埃尔·布劳恩是法国艺术家、研究者与教育者，以代码追问图像的生成与理解方式。他的工作将绘图行为视为与机器共同思考、揭示视觉形式内在逻辑的途径。","bi":"皮埃尔·布劳恩1961年生于巴黎，是法国视觉艺术家、研究者与讲师。自1994年起在雷恩第二大学执教，在艺术系建立数字与多媒体实践课程，后开设艺术与设计硕士项目。他在弗朗索瓦·莫尔纳的指导下获得艺术与艺术科学深度研究文凭，莫尔纳曾是画家，后成为研究者，执掌巴黎第一大学实验视觉艺术研究中心（CREAV）。1985年，布劳恩共同创立了雷恩造型与信息艺术实验研究中心，专注于数字图像研究。以代码为媒介，他追问图像如何被制作与理解，将绘图行为视为与机器共同思考、揭示视觉形式内在逻辑的途径。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sinusoi%CC%88de_19811982_section_sin1_81_1_Pierre_Braun_11102025_2026-03-21-021850_roin.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059530&s=7555c6ea520c38a5b5bb55869b9987af","l":["Sinusoi%CC%88de 19811982 section sin1 81 1","Pierre Braun","1981","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Spirales_Carre%CC%81es_19821984_sin_d1_Pierre_Braun_11102025_2026-03-21-020811_mlqn.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058891&s=1ea0cfe7282a1ca022fef7a86389468c","l":["Spirales Carre%CC%81es 19821984 sin d1","Pierre Braun","1982","Plotter Drawing"]}]},"chris-briscoe":{"n":"Chris Briscoe","nc":"英国","ne":"British","b":"1947","d":"","i":"克里斯·布里斯科是英国艺术家，其实践从雕塑和动力系统扩展到斯莱德艺术学院最早使用计算机技术的探索，后来通过Digital Pictures和Primal Pictures成为英国三维计算机图形学发展的领军人物。","bi":"克里斯·布里斯科1947年生，接受雕塑训练并创作使用计算机控制系统的动力作品。1970年代将计算机引入艺术实践，1974年在伦敦大学学院斯莱德艺术学院建立计算与实验部门，在那里跨越美术、电影、电子音乐和计算机技术领域工作。这期间他还为UCL工程、计算机科学和医学物理系提供咨询，为颅面外科手术贡献了早期三维图形技术。\n\n布里斯科后来共同创立了Digital Pictures，进而创立了Primal Pictures，成为英国三维计算机图形学发展的先驱，其工作贯通艺术实践与医学可视化的前沿领域。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/H18799-L422756655_original.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975562&s=c9873bed11cdb6b2ea9e97b97c527b74","l":["Multiple Artists","1978","Book"]}]},"herbert-brn":{"n":"Herbert Brün","nc":"德国/美国","ne":"German‑American","b":"1918","d":"2000","i":"赫伯特·布吕恩是开创性的作曲家和电子音乐革新者，将古典训练与爵士即兴演奏相结合，后又拥抱计算机编程以发展算法作曲。他的跨学科工作涵盖音乐、技术与社会思想，通过教学、实验乐团和对协作创造力的倡导，在全球艺术与学术界留下影响。","bi":"赫伯特·布吕恩1918年生于柏林一个犹太家庭，1936年因纳粹德国的政治危局出走巴勒斯坦，在耶路撒冷音乐学院学习钢琴和作曲，同时担任爵士钢琴手。二战后通过奖学金在坦格尔伍德师从阿龙·科普兰，并在哥伦比亚大学继续深造，后在科隆、日内瓦和托斯卡纳工作。他最终定居伊利诺伊大学，在那里将计算机编程融入作曲，发展出算法音乐创作，并以对协作创造力的倡导在全球艺术与学术界产生深远影响。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Music_By_Computers_Heinz_Von_Foerster_James_W_Beauchamp_Herbert_Bru%CC%88n_Max_Vernon_Mathews_Arthur_Roberts_James_Kirtland_Randall_Lejaren_Arthur_Hiller_Jr_Gerald_Strang_1110202_2026-03-21-021333_bpvs.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059213&s=4b7bf1af0f4a81df0618eb98efa82100","l":["Multiple Artists","1969"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Uber_Musik_and_Zum_Computer_Herbert_Bru%CC%88n_G._Braun_Karlsruhe_11102025_2026-03-21-021549_sjea.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059349&s=e094fbcad9ec3882117aa84a011efa07","l":["Herbert Brün / G. Braun Karlsruhe"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Early_Eye_1342-2_Herbert_Br%C3%BCn_11202025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673390&s=f84e7e43eb59a657ace4ffde2e5875d5","l":["Early Eye 1342-2 Br%C3%BCn","Herbert Brün","1973","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Compositions_Herbert_Bru%CC%88n_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802082&s=2f671237653c6b9e901b8c0454c9a7e7","l":["Compositions Bru%CC%88n","Herbert Brün","1983"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Links_IX_more_sc_1562_Herbert_Bru%CC%88n_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805513&s=a7c4057c2cd703491a951c4f37061ea2","l":["Links IX more sc 1562 Bru%CC%88n","Herbert Brün","1992","Plotter Drawing"]}]},"nancy-burson":{"n":"Nancy Burson","nc":"美国","ne":"American","b":"1948","d":"","i":"南希·伯森是美国艺术家和摄影师，1970年代末至1980年代对计算机技术的开创性运用改变了摄影肖像领域。她与麻省理工学院工程师合作开发了最早的计算机合成图像之一，这一技术后来被法医识别和数字成像领域所采用。","bi":"南希·伯森1948年生于密苏里州圣路易斯，1966至1968年在科罗拉多女子学院学习绘画后移居纽约。她通过艺术与技术实验（EAT）获得早期支持，开始与麻省理工学院工程师和计算机科学家合作进行图像处理和面部分析研究，由此产生了1981年在美国获得专利的人脸数字老化方法。这项技术后被法医识别和数字成像领域采用。她的创作探索身份、感知与技术表征之间的关系，以计算机合成图像作为审视人脸与身份的批判性工具。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Androgyny_6_Women__6_Men_Nancy_Burson_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058964&s=3ef93ce1764c543f185bd376e978ff25","l":["Androgyny 6 Women 6 Men","Nancy Burson","1982","Photograph"]}]},"ronald-f-bustamante-medina":{"n":"Ronald F. Bustamante Medina","nc":"哥斯达黎加","ne":"Costa Rican","b":"1975","d":"","i":"罗纳尔多·F·布斯塔曼特·梅迪纳是哥斯达黎加数学家兼作曲家，以数理逻辑背景创作实验性电子音乐。在霍莉·赫恩顿的Holly+项目中，他将赫恩顿的AI生成声音转化为层叠的声音纹理，探索计算与表达之间的关系。","bi":"罗纳尔多·F·布斯塔曼特·梅迪纳1975年生于哥斯达黎加圣何塞，在哥斯达黎加大学学习纯数学，后在巴黎西岱大学获得数学逻辑与计算机科学基础博士学位，研究集中于模型论及其与数论和代数几何的联系。他同时发展出作曲家、制作人和表演者的平行实践，横跨电声音乐、氛围音乐、后摇滚和现场表演。在霍莉·赫恩顿的Holly+项目中，他创作了《Mahler by Satie》，将AI生成的赫恩顿声音转化为层叠声音纹理，探索计算与表达之间的关系。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Ronald_F._Bustamante_Mahler_by_Satie_by_Holly_Holly_Herndon_Roland_F._Bustamante_Medina_11102025.gif?w=500&h=500&q=90&auto=format&fit=crop&dm=1774058715&s=8fa8e0874b85c71552bba10c526786c4","l":["F. Mahler by Satie by Holly Holly Herndon Roland F."]}]},"mary-ellen-bute":{"n":"Mary Ellen Bute","nc":"美国","ne":"American","b":"1906","d":"1983","i":"玛丽·艾伦·比特是美国电影人和视觉艺术家，是美国抽象动画的先驱，也是最早使用电子仪器创作动态图像的人之一。她的作品融合艺术、音乐与技术，创造出奠定电子与数字艺术基础的「视觉音乐」。","bi":"玛丽·艾伦·比特1906年生于得克萨斯州休斯顿，1920年代在宾夕法尼亚美术学院学习绘画，1925年在耶鲁大学戏剧系学习舞台灯光，后在巴黎索邦学院深造。她与托马斯·威尔弗雷德和列昂·特雷门等艺术家与发明家密切合作，将光作为视觉构图的媒介。移居纽约后，她与作曲家约瑟夫·施利林格合作，运用数学原理为动态图像配乐。1930年代，她创作了美国最早的抽象电影之一，融合艺术、音乐与技术，将这种「视觉音乐」的创作奠定了电子与数字艺术的早期基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Oscilloscope-Generated_Photograph_Abstronic_1_Mary_Ellen_Bute_Ted_Nemeth_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059407&s=f131b666b99a5aa74f16422651c4164c","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/CVM_Bute_tnem_series-a_display_031c.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058715&s=6b9748b86edde11778275afce3f3360f","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/mary-bute_double-oscilloscope_11162025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763349270&s=a2e223a34df4acefc51fe27462b3e9b9","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/abstronic-02_11192025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608090&s=e008c667d6cbc39769b2d8cc546c1ac5","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/abstronic-01_11192025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763608459&s=387181716c632ad459e7c60487f94c10","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251209_160620.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1765320011&s=b5e24ab0889affa8dd5f956d5e1589ce","l":["Mary Ellen Bute / Ted Nemeth","1951-1952 (c.)","Oscilloscope/Light Photo"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Abstronic_Mary_Ellen_Bute_Ted_Nemeth_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059205&s=f36e1226ce20285939a07bedc6590609","l":["Abstronic Ted Nemeth","Mary Ellen Bute","1952"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251209_160515.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1765319957&s=962060a00eedc485edab0047cfc3050e","l":["20251209 160515","Mary Ellen Bute","1952","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/20251209_161101.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1765320394&s=961718241cf6594b5733773cf93958f1","l":["Mary Ellen Bute / Ted Nemeth","1958-1959 (c.)","Oscilloscope/Light Photo"]}]},"ana-mara-caballero":{"n":"Ana María Caballero","nc":"美国/哥伦比亚","ne":"American/Colombian","b":"1981","d":"","i":"安娜·玛丽亚·卡瓦耶罗是驻西班牙的诗人和艺术家，其作品批判性地审视生物学、社会与文化，以语言与视觉艺术的融合挑战传统的母性与牺牲观念。她是数字与Web3诗歌的先驱，以首位在苏富比拍出诗歌的在世诗人而载入史册，并共同创立了数字诗歌画廊theVERSEverse。","bi":"安娜·玛丽亚·卡瓦耶罗1981年生于美国迈阿密，在哥伦比亚波哥大长大，现定居西班牙。她是挑战生物学、社会与文化传统观念的诗人和艺术家，尤其质疑对母性的浪漫化和将牺牲视为美德的观念。曾获贝弗利国际奖、哥伦比亚何塞·曼努埃尔·阿科斯塔国家诗歌奖、斯蒂尔托图书诗歌奖、未来艺术写作奖等多项荣誉，以首位在苏富比拍卖诗歌的在世诗人而载入史册，并共同创立了数字诗歌画廊theVERSEverse。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Paperwork_90_Anna_Maria_Caballero_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059289&s=9e3263cd15320d7021d842098a1470fa","l":["Paperwork 90 Anna","Ana María Caballero","2023","NFT/Digital"]}]},"john-cage":{"n":"John Cage","nc":"美国","ne":"American","b":"1912","d":"1992","i":"约翰·凯奇是作曲家和艺术家，将偶然性、沉默与非常规声音引入音乐，挑战了传统的作曲与表演观念。在音乐之外，他还创作视觉艺术和文字，约翰·凯奇信托致力于保护其遗产，将他的创新思想传递给新一代。","bi":"约翰·凯奇1912年生于加利福尼亚州洛杉矶，以班级致辞代表身份毕业于洛杉矶高中，随后短暂就读于波莫纳学院，不到两年便因不适应传统学术路径而离开。1930年代初旅居欧洲期间，他接触了绘画、建筑与诗歌，但音乐逐渐成为最吸引他的领域。回到美国后，他在洛杉矶和纽约学习作曲，师从阿诺尔德·勋伯格、亨利·考厄尔和爱德加·瓦雷斯等人。\n\n凯奇发展出以偶然性、沉默与非常规声音为核心的作曲哲学。他以易经卦象决定音乐元素，以加料钢琴改变传统乐器的音色，以《4分33秒》将环境声音本身确立为音乐。他的影响超越音乐，延伸至视觉艺术、诗歌、哲学与表演理论，与激浪派和偶发艺术等前卫运动产生深刻共鸣。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/HPSCHD_John_Cage_Lejaren_Arthur_Hiller_Jr_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059499&s=e41f0272df198e9824a44ffc728bbb86","l":["John Cage / Lejaren Arthur Hiller Jr"]}]},"erick-calderon":{"n":"Erick Calderon","nc":"墨西哥","ne":"aka Snowfro","b":"1981","d":"","i":"埃里克·卡尔德隆（笔名Snowfro）是生成艺术家，也是帮助定义链上生成艺术的平台Art Blocks的创始人。他的项目《Chromie Squiggles》最初作为概念验证创作，后成为标志性收藏，其中一件现已被洛杉矶县立美术馆永久收藏。","bi":"埃里克·卡尔德隆（笔名Snowfro）1981年生于墨西哥城，现定居德克萨斯州休斯顿。成为生成艺术领域关键人物之前，他经营一家瓷砖业务，被瓷器的耐久性、精确性与美感所吸引——这些特质后来他在NFT和区块链技术中重新发现。在妻子的鼓励下，他重拾从小练习的编程爱好。随着深入探索以太坊，他意识到无需画笔等传统工具，可以直接在区块链上编写并永久存储生成艺术。这一洞见促使他在2020年创建了Art Blocks——让艺术家在链上发布生成艺术脚本的平台，由此改变了数字艺术的创作与收藏方式。他以概念验证创作的《Chromie Squiggles》成为标志性收藏，其中一件现已进入洛杉矶县立美术馆永久馆藏。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Chromie_Squiggle_2583_Erick_Calderon_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059327&s=0b475d1343b7dea85ddf9fc8bf5f280d","l":["Chromie Squiggle 2583","Erick Calderon","2020"]}]},"california-computer-products-inc":{"n":"California Computer Products, Inc.","nc":"美国","ne":"aka CalComp","b":"1958","d":"","i":"加州计算机产品公司（CalComp）成立于1958年，开创了第一台数字鼓式绘图仪，改变了计算机创作精细技术图纸的方式。除商业成功之外，CalComp还通过竞赛推广计算机艺术，支持克里·斯特兰德等艺术家，其作品出现在《控制论的奇缘》等里程碑展览中。","bi":"加州计算机产品公司（CalComp）1958年在加利福尼亚州注册成立，但故事其实始于大约1953年——工程师基恩·赛德和罗伯特·莫顿在简陋的车间里拼装出世界上最早的数字绘图仪之一。公司最初几年主要承接军事合同，1959年取得突破，发明了世界上第一台商用数字鼓式绘图仪，能将计算机数据转化为精细的技术图纸。这一发明将绘图仪带入主流，迅速被NASA、通用电气、波音等大型科技机构采用。\n\nCalComp在推广计算机艺术方面也发挥了重要作用，通过举办比赛支持艺术家，其中包括克里·斯特兰德。斯特兰德的作品出现在《控制论的奇缘》等里程碑展览中，架起了技术精密度与艺术创造力的桥梁。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Young_Thinker_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058679&s=a9c8dcafde8ef3bd5a6e0f6534c81644","l":["Young Thinker","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cross_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058899&s=8650b8924cb433c3f21a425579421430","l":["Cross","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/The_Fisherman_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059009&s=bc278c8e8566d4a5cc6b1e2ecb4c669a","l":["The Fisherman","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Woodcut_by_Utomaro_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059061&s=d2289333ca0b32238044012016f4e1ae","l":["Woodcut by Utomaro","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Fish_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059076&s=b070b1497bafabb79971182ae75c6a44","l":["Fish","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plexus_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059128&s=6ae0d5e58a8dee139dca6bc8b963c5f0","l":["Plexus","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mona_Lisa_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059138&s=6e2b8fe0fe20656994edafe7202fa417","l":["Mona Lisa","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Hummingbird_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059305&s=3d155936ae54b2dd4c1d10f5615fb4c4","l":["Hummingbird","California Computer Products, Inc.","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rabbit_California_Computer_Products_Inc._11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059433&s=02e0a33bc0fcf52865c951dedaa2eaa8","l":["Rabbit","California Computer Products, Inc.","1968","Print"]}]},"joel-cammarata":{"n":"Joel Cammarata","nc":"美国","ne":"American","b":"1988","d":"","i":"乔尔·卡马拉塔是拥有建筑背景的美国艺术家，使用笔式绘图仪创作机器绘制的结构与绘画、墨水及实验性表面材质相遇的小尺幅混合媒介构图，将故障、层叠纹理与意外的材料效果视为作品的有机组成部分。","bi":"乔尔·卡马拉塔是拥有建筑背景的美国艺术家，使用笔式绘图仪创作小尺幅混合媒介构图。2019年开始使用AutoCAD和AxiDraw进行创作，发展出一套将基于矢量的机器精确性与绘画、墨水及实验性材料的触觉直接性相结合的过程。他的作品常常拥抱故障、层叠纹理和不同纸张与笔的不可预测性，将意外转化为完成作品的核心特征。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/BT_CMA_06_Joel_Cammarata_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805343&s=26ff3790ba9eab3157f9d6f6987459c1","l":["BT CMA 06","Joel Cammarata","2025","Plotter Drawing"]}]},"alejandro-campos":{"n":"Alejandro Campos","nc":"西班牙","ne":"Spanish","b":"1988","d":"","i":"阿莱杭德罗·坎波斯是驻荷兰的西班牙创意编程师、建筑师与历史学家，其生成艺术实践将算法系统与模拟过程融为一体，以批判理论和建筑史研究为基础探索记忆、作者身份与表征的政治。","bi":"阿莱杭德罗·坎波斯1988年生于西班牙瓦伦西亚，现居鹿特丹，是创意编程师、建筑师与历史学家。他在巴伦西亚理工大学获得建筑史与理论博士学位，并在该校担任终身助理教授。2021至2024年间，他以玛丽·斯克沃多夫斯卡-居里研究员身份在代尔夫特理工大学工作，同时担任荷兰物质文化研究中心研究员。\n\n他的艺术实践探索艺术史、批判理论与生成系统的交汇，将算法方法与模拟过程相融合，以代码图像探索记忆、作者身份与表征的政治。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Draftwerk_28_Anna_Beller_Alejandro_Campos_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058894&s=c6ef036fce2c455995642b40919c0d1d","l":["Anna Beller / Alejandro Campos","2023","Plotter Drawing"]}]},"anna-carreras":{"n":"Anna Carreras","nc":"西班牙","ne":"Spanish","b":"1979","d":"","i":"安娜·卡雷拉斯是驻巴塞罗那的创意编程师和数字艺术家，其生成作品探索算法结构与有机自发性的交汇。凭借工程和视听技术背景，她创造出充满活力、持续演化的视觉系统，以互动性和代码挑战传统的作者身份观念。","bi":"安娜·卡雷拉斯1979年生于西班牙巴塞罗那，现仍定居于此。她在加泰罗尼亚中央大学获得生成艺术方向的美术博士学位，同时持有加泰罗尼亚理工大学工程学硕士和庞培法布拉大学视听技术硕士两个学位。她将工程专业知识与对生成艺术的深厚热情相结合，架起技术与创意表达之间的桥梁，从文化、自然和数学形式中汲取灵感，创造出充满活力且持续演化的视觉系统，以互动性和代码挑战传统的作者身份观念。她的代表作包括Art Blocks上的《Trossets》，以及与其他平台合作的多个系列。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Morena_7_Anna_Carreras_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059306&s=85a0fbad4059ab47ebed0783cd8e3eec","l":["Morena 7","Anna Carreras","2024","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Morena_2_Anna_Carreras_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059457&s=2db7500e5f0bfe41fa2526280392be9f","l":["Morena 2","Anna Carreras","2024","Mixed Media"]}]},"enrique-castro-cid":{"n":"Enrique Castro-Cid","nc":"智利/美国","ne":"Chilean-American","b":"1937","d":"1992","i":"恩里克·卡斯特罗-西德是一位智利艺术家，横跨绘画、动力构造与技术驱动的实验领域。他创作具象作品、机械化物件和数字塑形构图，是最早将计算机工具纳入创作实践的拉丁美洲艺术家之一。","bi":"恩里克·卡斯特罗-西德1937年生于智利圣地亚哥，1957至1959年就读于智利大学美术学院，后来也在那里执教。1961年获美洲国家组织奖学金，移居纽约，在普拉特学院、视觉艺术学院和艺术学生联盟执教的同时，独立研修哲学和数学。\n\n他的创作横跨绘画、动力构造与技术驱动的实验，创作具象作品、机械化物件和数字塑形构图，是最早将计算机工具纳入拉丁美洲艺术实践的先驱之一。他的作品探索了人体与机械的关系，以及技术如何改变我们对形式与运动的感知。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Latin_Girls_Enrique_Castro-Cid_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802229&s=95b9187fe9af51272d75954ff4034d68","l":["Latin Girls","Enrique Castro-Cid","1979","Painting"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mar_Enrique_Castro-Cid_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762801797&s=c7e54bd193bd139f6ff1137944466410","l":["Mar","Enrique Castro-Cid","1986","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Henry_Enrique_Castro-Cid_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802268&s=9493c22885e75f809e904f4573650c76","l":["Henry","Enrique Castro-Cid","1986","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Enrique_Castro-Cid_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802897&s=480d3e31238efbe9bb44906c33f260a2","l":["Untitled","Enrique Castro-Cid","1986","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cows_Singularity_Enrique_Castro-Cid_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058727&s=13e53ad8b78f03d358fdd211f31bbb1e","l":["Cows Singularity","Enrique Castro-Cid","1988","Mixed Media"]}]},"jon-cates":{"n":"Jon Cates","nc":"美国","ne":"American","b":"1973","d":"1992","i":"乔恩·凯茨是故障艺术全球公认的先驱，其跨学科作品融合艺术、技术与批判理论，挑战数字规范并探索文化议题。他通过展览、教育领导力和有影响力的写作，积极推动跨文化对话与创新，塑造数字艺术的未来。","bi":"乔恩·凯茨1973年生于美国爱荷华州，在伊利诺伊州立大学以优异成绩获得美术学士学位，并在奥地利多瑙大学获得媒体艺术史硕士学位。驻台北，在全球以故障艺术先驱和融合艺术、技术与批判理论的跨学科方法而广受认可，积极与国际数字艺术社区互动，推动跨文化对话与创新。\n\n他的作品探索在线和离线文化的边界，以「肮脏的新媒体」为实践标签，将故障美学作为批判数字技术与媒体历史的手段。他在林茨电子艺术节、欧洲媒体艺术节等重要国际场合展出，并在芝加哥艺术学院等机构从事教学与研究。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/ILLUSTRATION_4x7485G_Jon_Cates_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058694&s=739c5698e6ae64cd9682ad01398b04a3","l":["ILLUSTRATION 4x7485G","Jon Cates","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/ILLUSTRATION_8q4314U_Jon_Cates_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059332&s=abfe6f64697250b1a96c2a4bd9cd327e","l":["ILLUSTRATION 8q4314U","Jon Cates","2022","NFT/Digital"]}]},"christian-cavadia":{"n":"Christian Cavadia","nc":"罗马尼亚/法国","ne":"Romanian","b":"1940","d":"","i":"克里斯蒂安·卡瓦迪亚是工程师和计算机科学家，在蓬皮杜艺术中心创立了面向公众的实验室ARTA，让艺术家和观众能够使用定制图形系统进行实验。他在软件和硬件设计方面的创新使复杂的绘图仪图形成为可能，并支持探索生成图像的艺术家开展合作。","bi":"克里斯蒂安·卡瓦迪亚生于罗马尼亚，后入籍法国，是工程师、计算机科学家和技术专家，持有三个博士学位。自1957年起从事电子测量与控制系统工作。1972年起在巴黎蓬皮杜艺术中心主导计算机科学发展，专注于电子图书馆建设。同年他创立了ARTA（高级研究与技术工作室），这是一个面向公众的实验室，艺术家和参观者可以在此使用定制图形系统进行实验。卡瓦迪亚在软件和硬件设计方面的创新使复杂的绘图仪图形成为可能，促成了艺术家探索生成图像的重要合作，成为蓬皮杜艺术中心艺术技术化进程的重要推动者。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Faceted_blueyellow_crystal_Christian_Cavadia_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802751&s=ecaeb569abf6ccc7cff4f01b53bd9630","l":["Faceted blueyellow crystal","Christian Cavadia","1980","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Sechs_Computergrafiken_six_computer_graphics_Portfolio_Christian_Cavadia_Friedrich_Lu%CC%88bbecke_Robert_Stoiber_Fromund_Kloppe_Wolfgang_Beyer_11102025_2026-03-21-021322_mmvb.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059202&s=9d9ed5db3708a4f149913676fb77cba2","l":["Multiple Artists","1980","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/16_%C3%97_16_blue_grid_of_morphing_doodles_Christian_Cavadia_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805284&s=7c38b7126eebcbb09ed22557d829dd31","l":["16 %C3%97 16 blue grid of morphing doodles","Christian Cavadia","1980","Print"]}]},"paolo-eri":{"n":"Paolo Čerić","nc":"克罗地亚","ne":"aka Patakk","b":"1990","d":"","i":"保罗·切里奇（笔名Patakk）是计算机科学家兼视觉艺术家，其作品探索简单算法如何生成错综复杂的有机结构。他使用Python、Processing和Blender构建的定制工具创作大型系列，揭示代码的表达潜力。","bi":"保罗·切里奇（笔名Patakk）1990年生于克罗地亚萨格勒布，现仍定居于此。他在萨格勒布大学电气工程与计算学院获得两个硕士学位，并通过伊拉斯谟计划在马德里理工大学学习人工智能。他是完全自学成才的艺术家，创作实践在正规教育之外发展，由试错、在线教程和长期独立探索塑造而成。他使用Python、Processing和Blender构建定制工具，创作探索简单算法如何生成错综复杂有机结构的大型系列，揭示代码在精确性与自发性之间的表达潜力。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Jolly_Bunch_6_Paolo_C%CC%8Ceric%CC%81_11102025_2026-03-21-020533_libx.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058733&s=fc8e2ef7dfb7a522569dd2db347a5d23","l":["Jolly Bunch 6 C%CC%8 %CC%81","Paolo Čerić","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Jolly_Bunch_2_Paolo_C%CC%8Ceric%CC%81_11102025_2026-03-21-021133_kfps.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059093&s=e78079f918bd38144e959f6bac5691f3","l":["Jolly Bunch 2 C%CC%8 %CC%81","Paolo Čerić","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Jolly_Bunch_22_Paolo_C%CC%8Ceric%CC%81_11102025_2026-03-21-021515_drln.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059315&s=76206b5b353f8aa8703f141bbb23ee3c","l":["Jolly Bunch 22 C%CC%8 %CC%81","Paolo Čerić","2022","NFT/Digital"]}]},"don-christensen":{"n":"Don Christensen","nc":"美国","ne":"American","b":"1968","d":"","i":"唐·克里斯滕森是美国艺术家，创作横跨绘画与实验音乐。他在1970至1980年代活跃于纽约的地下音乐场景，后来发展出以韵律、图案与结构为核心的持续绘画实践。","bi":"唐·克里斯滕森是一位美国艺术家和音乐家，在内布拉斯加大学学习艺术后，于1968至1970年以全额奖学金就读于堪萨斯城艺术学院。1976至1988年在纽约从事专业音乐演出。1986至2004年间，他担任自学艺术家埃默里·布拉格顿毕生作品的保管人和策展人，在美国和欧洲组织并呈现了十五场展览。1990年起转向绘画，发展出受节奏、图案与结构启发的持续创作实践，同时继续关注自学艺术家的遗产保存工作。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/donnie-and-laurie_120520205_spiegel.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975604&s=9e5c1410c263d88196b52bb4abe8654c","l":["Laurie Spiegel / Don Christensen"]}]},"clownvamp":{"n":"ClownVamp","nc":"美国","ne":"American","b":"1985","d":"","i":"ClownVamp是一位概念艺术家，其作品探索人工智能的创造潜力与意外后果。他的实践将叙事与生成工具相结合，创造考察技术对文化与感知影响的视觉叙事。","bi":"ClownVamp是驻纽约的概念艺术家，探索人工智能的潜力与风险。他以收藏者身份进入Web3领域，被Tezos生态系统中正在尝试新型潜在扩散工具的AI艺术家群体所吸引。加入Midjourney内测后，他开始独立创作，通过视觉图像讲述故事。\n\n「ClownVamp」这个名字来源于他短暂持有的极少数同时具备小丑和吸血鬼特征的CryptoPunks之一。在他的实践中，AI既是工具，也是叙事主体，他探索算法系统如何塑造和扭曲文化、身份与感知。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Diffusable_googly_eyes_ClownVamp_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058705&s=12e89060a5322634fcd6ca2d32df266e","l":["Diffusable googly eyes","ClownVamp","2023","Photograph"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Junk_51_Junk_Machine_ClownVamp_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058893&s=ab63318a3ac409779317569bde3a6a17","l":["Junk 51 Junk Machine","ClownVamp","2024","NFT/Digital"]}]},"harold-cohen":{"n":"Harold Cohen","nc":"英国","ne":"British","b":"1928","d":"2016","i":"哈罗德·科恩是英国艺术家，从抽象绘画转向计算机艺术，成为最早探索人工智能创造潜力的先驱人物之一。从1970年代起，他开发了AARON——一个能够自主生成绘画的计算机程序，挑战了关于创造力与艺术家角色的根本性问题。","bi":"哈罗德·科恩1928年5月1日生于伦敦一个波兰-俄罗斯犹太家庭，1948至1952年就读于斯莱德艺术学院，后返校任教。1952年获修道院旅行奖学金，赴意大利深造。还是学生时他便在牛津阿什莫林画廊举办了首次个展。1959至1961年间获哈克尼斯奖学金，在美国多家博物馆展出，1966年代表英国参加威尼斯双年展。\n\n1968年，科恩移居加利福尼亚，开始转向计算机艺术。1972年起在斯坦福大学人工智能实验室开发AARON——一个能够自主生成绘画的计算机程序，由此开创了持续数十年的探索。AARON在作者身份、创造力与机器美学的问题上引发了广泛讨论，成为艺术与人工智能史上最重要的项目之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Exhibition_Catalog_Robert_Fraser_Gallery_1963_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059529&s=c6363e4e7673ac2761fda528175462ec","l":["Exhibition Catalog Robert Fraser Gallery 1963","Harold Cohen","1963","Mixed Media"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Double_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762802655&s=09d660b161f26ec8d46745f2b07c90e7","l":["Double","Harold Cohen","1963","Painting"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Imperial_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804920&s=9146e52a492ef051e9e05eb9d4f570ef","l":["Imperial","Harold Cohen","1964","Painting"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/4_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058710&s=1578f2282a67930baf3367a0acab60ba","l":["Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/2_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059309&s=517322862357ba2a824890783389e5c0","l":["Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/1_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059135&s=78510f6f2f1da94603c175b19ade7906","l":["Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/3_v2_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058964&s=cbfdee5e7c3d9ac8e21cda431d213898","l":["3 v2","Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/5_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058832&s=75e3844d8b310f0bfe02d6d46914078e","l":["Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/3_v3_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058681&s=e4504cb663a3f1e2c7bd06c6f09f7872","l":["3 v3","Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/3_Harold_Cohen_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058794&s=8d8940480b0a538b5ced49b23ff367c7","l":["Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Square-Groupins-2.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058788&s=a12fe0c22e844a2d654257c027e7be63","l":["Square-Groupins-2","Harold Cohen","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Plate_II_Harold_Cohen_11202025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673223&s=ac60b0560de2c52b0a1472ee58feadc6","l":["Plate II","Harold Cohen","1968","Print"]}]},"computer-siemens-2002":{"n":"Computer: Siemens 2002","nc":"德国","ne":"German","b":"2002","d":"","i":"西门子System 2002于1957年推出，是世界上首批全晶体管化大批量生产的计算机之一，旨在突破IBM对欧洲电子数据处理的垄断。除科学与工业应用外，它成为最早计算机艺术的核心工具，驱动了格奥尔格·尼斯和弗里德尔·纳克的早期绘图仪作品及1965年马克斯·本泽《rot 19》展览。","bi":"西门子System 2002于1957年推出，是世界上第一台大批量生产的全晶体管化计算机，1959年首台交付给亚琛工业大学。作为面向欧洲科学、行政与工业应用的中型十进制机器，早期输入输出依赖西门子电传打字机，后来补充了穿孔纸带、穿孔卡、高速打印机和磁带。1962至1964年间，斯图加特技术大学的一台System 2002成为世界上最早计算机艺术的核心工具，驱动了格奥尔格·尼斯和弗里德尔·纳克的早期绘图仪作品，以及1965年马克斯·本泽《rot 19：计算机图形》的展览与出版。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/rot_19_-_computer-grafik_Georg_Nees_Max_Bense_Computer_Siemens_2002_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059429&s=73fb5698d0302f6bc182b0011a74376c","l":["Multiple Artists","1965","Book"]}]},"contemporary-arts-magazine":{"n":"Contemporary Arts Magazine","nc":"英国","ne":"English","b":"1968","d":"","i":"当代艺术学会杂志第6期记录了艺术家与科学家汇聚一堂、以机器、代码和创意表达进行实验的关键时刻。由贾西娅·莱哈特主编、与《控制论的奇缘》展览同期发行，这一期刊记录并延伸了展览对艺术、技术与合作的激进探索。","bi":"当代艺术学会杂志第6期于1968年9月在伦敦出版，由贾西娅·莱哈特主编，共40页，与ICA《控制论的奇缘》展览同期发行。收录了达芙妮·奥拉姆、马克斯·本泽、彼得·米洛耶维奇和白南准等重要人物的文章，深入审视了技术与创造力的交汇，记录了艺术家与科学家开始合作拓展艺术可能性的关键时刻，成为那个时代的重要历史文献。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity_-_Sept_1968_Contemporary_Arts_Magazine_No_6_Contemporary_Arts_Magazine_11212025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764108508&s=f05e2c02ecef3f7ccf4e71afee7d6080","l":["Cybernetic Serendipity - Sept 1968 No 6","Contemporary Arts Magazine","1968","Ephemera"]}]},"dan-cook":{"n":"Dan Cook","nc":"","ne":"","b":"2025","d":"","i":"Email Newsletter\n\nSign up to receive the occasional news and stories from the world of computer art.","bi":"","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/chastique_aldo-giorgini_11202025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1763673169&s=a4f54e58fc84b658c7088390736da508","l":["Aldo Giorgini / Dan Cook","1972","Painting"]}]},"david-cope":{"n":"David Cope","nc":"美国","ne":"American","b":"1995","d":"","i":"大卫·科普是一位开创性的作曲家和教育家，以算法作曲领域的突破性工作著称。他开发的《音乐智能实验》（EMI）和《艾米丽·豪威尔》等系统拓展了创造力与作者身份的传统观念，对音乐和技术留下了深远影响。","bi":"大卫·科普1941年生于旧金山，在亚利桑那州立大学和南加州大学学习音乐作曲，师从乔治·珀尔、英格尔夫·达尔和哈尔西·史蒂文斯等作曲家。早期从事作曲后，科普进入加州大学圣克鲁斯分校执教，任职逾四十年，帮助发展了学校的音乐理论与作曲项目。\n\n1980年代，他开始开发《音乐智能实验》（EMI），这是一个分析巴赫、肖邦、斯特拉文斯基等作曲家风格并生成新作品的计算机程序。EMI的作品曾在公开音乐会上演奏，观众往往难以将其与人类作曲家的真迹区分，引发了广泛的音乐与哲学讨论。他后来开发了后继系统《艾米丽·豪威尔》，能够更自主地进行音乐创作。科普的工作持续引发关于创造力、作者身份与音乐本质的根本性讨论。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Visions_Music_for_Orchestra_2_Pianos_and_Computer_Generated_Tape_David_Cope_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059096&s=3ea012ec938fb6bbcdc93b134debbaac","l":["Visions Music for Orchestra 2 Pianos and Computer Generated Tape","David Cope"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bach_by_Design_David_Cope_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805050&s=62820d43d2929110d4c5102ce59bc431","l":["Bach by Design","David Cope","1994"]}]},"waldemar-cordeiro":{"n":"Waldemar Cordeiro","nc":"意大利/巴西","ne":"Italian/Brazilian","b":"1925","d":"1973","i":"瓦尔德马尔·科尔德罗发展出以具体艺术及其理论关切为基础的艺术实践，后来扩展到新材料与系统领域。1968年起，他成为巴西与拉丁美洲计算机艺术的先驱，使用大型机将摄影图像转化为数字结构，将计算视为组织与转化视觉信息的方法。","bi":"瓦尔德马尔·科尔德罗1925年生于罗马，1940年代初在意大利美术学院学习。二战后移居巴西圣保罗，后入籍巴西。在圣保罗，他担任主要报纸的记者与艺术评论员，并继续在出版界从事插画创作。这一时期他积极参与当地艺术运动，成为1952年创立的圣保罗具体艺术小组「鲁普图拉」的核心人物。\n\n1968年，他成为巴西和拉丁美洲计算机艺术的先驱。与工程师豪尔赫·安图内斯合作，他使用IBM 360大型机将摄影图像转化为数字像素网格，创作了《艾美利亚2》《可口可乐》等开创性作品——这些用字符构成的图像是拉丁美洲最早的计算机生成艺术之一。科尔德罗将计算视为组织与转化视觉信息的方法，而非仅仅是工具，在巴西艺术史上留下了持久的先驱印记。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/cordeiro-noise.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1769998804&s=1fd98846186a5a6a2186ea55785c7c56","l":["noise","Waldemar Cordeiro","1971","Plotter Drawing"]}]},"chris-crabtree":{"n":"Chris Crabtree","nc":"英国","ne":"British","b":"1972","d":"","i":"克里斯·克拉布特里在1970年代于斯莱德艺术学院从事计算机生成图像的创作，将编程与版画技术相结合。他的作品见于当代实验性出版物，并被UCL艺术收藏馆收藏。","bi":"克里斯·克拉布特里就读于斯莱德艺术学院，1972年进入蚀刻版画系，接受传统版画技术培训后先后担任学院技师和版画研究助理。1970年代，他与斯莱德实验与计算部门产生关联，在那里艺术家在科学领域以外的技术访问极为稀缺的时代使用计算机系统工作。他将计算机程序与版画技法相融合，创作的作品见于当代实验性出版物并被UCL艺术收藏馆收藏，是英国早期计算机艺术史上不可忽视的参与者。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/H18799-L422756655_original.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975562&s=c9873bed11cdb6b2ea9e97b97c527b74","l":["Multiple Artists","1978","Book"]}]},"charles-chuck-csuri":{"n":"Charles \"Chuck\" Csuri","nc":"美国","ne":"American","b":"1922","d":"2022","i":"查尔斯·「卡克」·楚里是一位融合深厚美术背景与技术创新的全能型人物，成为数字艺术的奠基性人物。从1960年代起，他的开创性工作证明了计算机不仅能成为工具，更能成为一种真正的艺术媒介。","bi":"查尔斯·「卡克」·楚里（1922—2022），被誉为「数字艺术与计算机动画之父」，是数字媒体演化史上最重要的人物之一。他站在美术、计算机科学与技术创新的交汇点，职业生涯体现了现代艺术概念化、创作与传播方式的深刻转变。\n\n他出生于西弗吉尼亚州格兰特镇，父母是匈牙利移民。在俄亥俄州立大学学习艺术，因出色的橄榄球技术而成为全美明星球员，后在二战期间服役。战后在俄亥俄州立大学取得学士和硕士学位，在那里度过了整个学术生涯，成为终身教授。\n\n1960年代，楚里开始探索计算机作为艺术媒介的可能性，创作了将数学算法转化为视觉图像的开创性作品，包括以ASCII字符重新演绎的《蒙娜丽莎》。1988年，他在俄亥俄州立大学创建了高级计算中心艺术与设计系，成为推动数字艺术与计算机动画学术化的关键力量，培养了一代数字艺术家。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Hummingbird_II_1967_Charles_Chuck_Csuri_James_Shaffer_11202025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058728&s=057f1bf787556ebdf8cabe59c33857a5","l":["Charles &quot;Chuck&quot; Csuri / James Shaffer","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Flies_Charles_Chuck_Csuri_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805261&s=693eff93d8488da5912ee4a149484171","l":["Charles &quot;Chuck&quot; Csuri","1967","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Flies_plotter_drawing_Charles_Chuck_Csuri_11202025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059312&s=0088ad8ec6f88818f34b4c749341c037","l":["Charles &quot;Chuck&quot; Csuri","1967","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cybernetic_Serendipity-11112025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762916733&s=17529014d65f032f82d3baf78373d087","l":["Multiple Artists","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Random_War_Charles_Chuck_Csuri_James_Shaffer_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059133&s=302567344d2daab03ae324e4d59b06c7","l":["Charles &quot;Chuck&quot; Csuri / James Shaffer","1968","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bearded_Man_Charles_Chuck_Csuri_James_Shaffer_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059518&s=5807c9092a2cab78e469b6c6b469d50d","l":["Charles &quot;Chuck&quot; Csuri / James Shaffer","1968","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Bearded_Man_generative_series_Charles_Chuck_Csuri_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059435&s=d073e800caf0dbf090d27a25862da9a9","l":["Charles &quot;Chuck&quot; Csuri","1969","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/19th_Century_Space_Station_Charles_Chuck_Csuri_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762804934&s=2adb41f9892c348e2e196a09ff078139","l":["Charles &quot;Chuck&quot; Csuri","2001","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Emilys_Scribbles_Charles_Chuck_Csuri_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058921&s=bf74f9c467bd47423e7b8ba960c1b301","l":["Charles &quot;Chuck&quot; Csuri","2005","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Rising_Charles_Chuck_Csuri_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805169&s=92dd25883eece2576306b58c5bea708a","l":["Charles &quot;Chuck&quot; Csuri","2018","Print"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Mosaic_Line_Abstract_Charles_Chuck_Csuri_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805431&s=08724293b65e70aeda406ef7724903d2","l":["Charles &quot;Chuck&quot; Csuri","2021","Print (Digital)"]}]},"jeff-davis":{"n":"Jeff Davis","nc":"美国","ne":"American","b":"1972","d":"","i":"杰夫·戴维斯是一位生成艺术家，其作品以规则系统与大胆色彩相融合，探索数学、结构与偶然性的交汇点。他是Art Blocks的创始人物，2020年以《Construction Token》帮助启动了这一平台。","bi":"杰夫·戴维斯1972年生于伊利诺伊州阿灵顿高地，现定居亚利桑那州坦佩。他在劳伦斯大学学习数学与工作室艺术，后在芝加哥艺术学院获得绘画与素描艺术硕士学位。\n\n他的作品通过构建在设定参数内探索结构、色彩和随机性的生成系统，将传统艺术与技术相结合，根植于数学背景又深受绘画与素描传统的影响。2020年，他以《Construction Token》作为Art Blocks平台的首批发布作品之一，帮助开创了链上生成艺术的新时代。他的作品以大胆的色彩搭配和对系统规则的严谨把控著称。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Color_Study_995_Jeff_Davis_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059231&s=276d7d92e2801d42b74ae4aa787a17e2","l":["Color Study 995","Jeff Davis","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Color_Study_468_Jeff_Davis_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059359&s=9c88b7ce76df40651704f3e0b40e8e64","l":["Color Study 468","Jeff Davis","2021","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/LED_27_Jeff_Davis_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058709&s=95410debe9c7a10cf9ca043988f7a341","l":["LED 27","Jeff Davis","2023","NFT/Digital"]}]},"ernesto-deira":{"n":"Ernesto Deira","nc":"阿根廷","ne":"Argentinian","b":"1965","d":"","i":"埃内斯托·德伊拉在抽象艺术主导的时代，以具象绘画探索暴力与战争的主题。1969年，他加入布宜诺斯艾利斯艺术与控制论小组，创作了将计算机辅助技术应用于具象图像的丝网版画。","bi":"埃内斯托·德伊拉1928年生于阿根廷布宜诺斯艾利斯，在布宜诺斯艾利斯大学学习法律，1950年毕业。1950年代中期，在阿根廷文化与政治动荡时期，他开始全身心投入绘画。进入1960年代，在抽象艺术主导的时代，「新具象主义」运动将人体重新带回画布，德伊拉成为这一运动的核心人物。\n\n他的绘画以暴力与战争为主题，以强烈的表现性笔触和对人物形象的扭曲处理，在政治动荡的年代探索人类苦难。1969年，他加入布宜诺斯艾利斯艺术与控制论小组，创作了使用算法与绘图仪辅助过程生成具象图像的计算机丝网版画，成为拉丁美洲早期计算机艺术史上的重要参与者。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Deira-untitled.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1769998494&s=d60cc479c70741026e2a080a9ddf5ce8","l":["untitled","Ernesto Deira","1970","Print"]}]},"gary-alfred-demos":{"n":"Gary Alfred Demos","nc":"美国","ne":"American","b":"1950","d":"","i":"加里·阿尔弗雷德·德莫斯将计算机图形学应用于电影制作，开发了使数字图像生成和合成成为电影核心技术的工具与方法，展示了算法系统如何服务于叙事与美学目的，奠定了现代视觉特效的基础。","bi":"加里·阿尔弗雷德·德莫斯1950年生于洛杉矶县，1970年代初在加州理工学院学习工程和应用科学。1970年校园放映的约翰·惠特尼Sr.计算机生成电影激发了他对计算机图形学的兴趣。1972年他加入Evans & Sutherland，在那里参与早期帧缓冲系统的开发，并结识了约翰·惠特尼Jr.。1974年底，他们在信息国际公司（III）建立了动态图像产品组，开发了使数字图像生成和合成成为电影核心技术的工具，后来为《星球大战》《特龙》等影片制作了开创性的计算机生成图像，奠定了现代视觉特效的基础。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Plotter_Drawing_1_Gary_Alfred_Demos_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762803310&s=7d439120b6cae9137631c76e85cc36ba","l":["Untitled Plotter Drawing 1","Gary Alfred Demos","1970","Plotter Drawing"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Untitled_Plotter_Drawing_2_Gary_Alfred_Demos_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1762805068&s=aa47ab4bc78191b40eec9670ae22e64f","l":["Untitled Plotter Drawing 2","Gary Alfred Demos","1970","Plotter Drawing"]}]},"disruptedstar":{"n":"DisruptedStar","nc":"法国","ne":"French","b":"1980","d":"","i":"DisruptedStar是法国艺术家兼天体物理学家，其生成艺术将复杂的宇宙现象转化为沉浸式的视觉体验。凭借科学专业知识，他创作受黑洞潮汐瓦解等事件启发的算法作品，将物理学、诗意与互动探索融合，揭示宇宙的隐秘之美。","bi":"DisruptedStar是法国艺术家兼天体物理学家，拥有专注于高能现象（中子星、恒星级黑洞和超大质量黑洞）的博士学位。他的艺术名源于一个壮观的宇宙事件——恒星靠近超大质量黑洞后被其巨大引力撕碎，这一现象成为生成艺术对他创作影响的恰切隐喻。\n\n他以科学专业知识为基础创作算法作品，将宇宙现象转化为沉浸式视觉体验，融合物理学、诗意与互动探索，揭示宇宙隐秘之美。他的工作体现了科学严谨性与艺术表达之间令人着迷的张力——这两种认识世界的方式在他的生成系统中相互滋养。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cables_and_Clouds_46_DisruptedStar_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058677&s=3e6201da635f7a0a2e19302a9196788a","l":["Cables and Clouds 46","DisruptedStar","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cables_and_Clouds_82_DisruptedStar_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058821&s=ce37d1a06ab18dfabd1e662ea7a93980","l":["Cables and Clouds 82","DisruptedStar","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cables_and_Clouds_174_DisruptedStar_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058890&s=24374d4dcaf35881c59a2ff1aa20f8c0","l":["Cables and Clouds 174","DisruptedStar","2022","NFT/Digital"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Cables_and_Clouds_152_DisruptedStar_11102025.png?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774059407&s=78f7b0f69b58b94e9952117a1aa337de","l":["Cables and Clouds 152","DisruptedStar","2022","NFT/Digital"]}]},"charles-dodge":{"n":"Charles Dodge","nc":"美国","ne":"American","b":"1942","d":"","i":"查尔斯·道奇是美国作曲家，将计算机视为作曲的核心乐器，创作了探索声音化、语音合成和语言向音乐转化的里程碑性作品，展示了技术如何扩展音乐作曲的表达范围与概念边界。","bi":"查尔斯·道奇1942年生于爱荷华州埃姆斯，在爱荷华大学学习作曲，1964年获学士学位，后在哥伦比亚大学深造，1966年获硕士学位，1970年获音乐艺术博士学位。这期间他深入参与哥伦比亚-普林斯顿电子音乐中心的工作，接触到早期电子作曲技术。\n\n道奇的代表作《地球的磁场》（1970）对太阳风数据进行声音化处理，将科学数据转化为音乐形式。《语音/幻想》（1974）以对作曲家父亲声音的分析合成为基础，探索语音合成的美学潜力。他的作品持续探索技术如何扩展音乐的表达范围与概念边界，使他成为美国计算机音乐史上最重要的人物之一。","aw":[{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/Earths_Magnetic_Field_Charles_Dodge_11102025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1774058735&s=7870e15aef378ea533f0357df6168173","l":["Earths Magnetic Field","Charles Dodge","1970"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/dodge.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.5&fp-y=0.5&dm=1764975769&s=563a054d27e113cc2f7599fbf4bfcad1","l":["Charles Dodge"]},{"s":"https://ragnar-digital.transforms.svdcdn.com/production/images/artwork/charles-dodge_synthesized-voices_11162025.jpg?w=400&q=80&auto=format&fit=crop&crop=focalpoint&fp-x=0.07&fp-y=0.4401&dm=1763298736&s=7537f341c29f834feb567e9191ed6489","l":["synthesized-voices","Charles Dodge","1975"]}]},"jean-jacques-duclaux":{"n":"Jean-Jacques Duclaux","nc":"瑞士","ne":"aka Eko33","b":"1980","d":"","i":"让-雅克·迪克洛（笔名Eko33）通过自学编程并将其与对创意的终身热情相结合，开始探索生成艺术。他不断演化的实践融合了代码、声音、传感器与人工智能，创造出在精确几何与有机不可预测形态之
